<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>웹툰 프로덕션</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ag-psd@20.0.0/dist/bundle.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Do+Hyeon&family=Gaegu:wght@400;700&family=Gasoek+One&family=Gothic+A1:wght@400;700&family=Gugi&family=Jua&family=Nanum+Brush+Script&family=Nanum+Pen+Script&family=Nanum+Gothic:wght@400;700&family=Nanum+Myeongjo:wght@400;700&family=Single+Day&family=Sunflower:wght@300;500;700&family=Noto+Sans+JP:wght@400;500;700;900&family=Noto+Serif+JP:wght@400;700&family=Shippori+Mincho:wght@400;700&family=Shippori+Antique&family=Mochiy+Pop+One&family=Mochiy+Pop+P+One&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
--bg:#f5f5fa;--surface:#ffffff;--surface2:#f0f0f8;--surface3:#e8e8f0;
--border:#d0d0e0;--text:#1a1a2e;--text2:#666688;
--accent:#6c5ce7;--accent2:#7c6cf7;
--success:#00a8a8;--warn:#d4a017;--err:#e74c3c;
--radius:12px;--shadow:0 2px 12px rgba(0,0,0,0.08);
}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.app-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;position:sticky;top:0;z-index:100;box-shadow:var(--shadow);}
.app-logo{font-size:20px;font-weight:800;background:linear-gradient(135deg,var(--accent),#e0457b);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.nav-tabs{display:flex;gap:4px;margin-left:24px;flex:1;}
.nav-tab{padding:8px 16px;border-radius:8px;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.nav-tab:hover{background:var(--surface2);color:var(--text);}
.nav-tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.api-key-btn{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;display:flex;align-items:center;gap:6px;transition:all .2s;}
.api-key-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:var(--surface2);color:var(--text2);}
.status-badge.running{background:#fff3cd;color:#856404;}
.status-badge.done{background:#d4edda;color:#155724;}
.status-badge.error{background:#f8d7da;color:#721c24;}
.main-content{max-width:1400px;margin:0 auto;padding:20px;display:flex;flex-direction:column;height:calc(100vh - 140px);}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;box-shadow:var(--shadow);}
.btn{padding:10px 20px;border-radius:8px;border:none;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;gap:6px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 2px 8px rgba(108,92,231,.3);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(108,92,231,.4);}
.btn-primary:disabled{opacity:.5;transform:none;cursor:not-allowed;}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text2);}
.btn-outline:hover{border-color:var(--accent);color:var(--accent);}
.btn-danger{background:#e74c3c;color:#fff;}
.btn-success{background:#27ae60;color:#fff;}
.form-input,.form-textarea,.form-select{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);color:var(--text);transition:border-color .2s;}
.form-input:focus,.form-textarea:focus,.form-select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(108,92,231,.1);}
.form-textarea{resize:vertical;min-height:200px;font-family:inherit;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px;}
.log-panel{background:#1a1a2e;color:#a0a0cc;padding:12px 16px;border-radius:8px;font-family:'Fira Code',monospace;font-size:12px;max-height:180px;overflow-y:auto;line-height:1.6;}
.log-entry{white-space:pre-wrap;word-break:break-all;}
.log-entry.error{color:#e74c3c;}.log-entry.success{color:#27ae60;}.log-entry.info{color:#3498db;}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal-box{background:var(--surface);border-radius:16px;padding:32px;max-width:480px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);}
.modal-title{font-size:18px;font-weight:700;margin-bottom:8px;}
.modal-desc{color:var(--text2);font-size:13px;margin-bottom:20px;}
.modal-input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;font-size:14px;background:var(--surface);margin-bottom:4px;}
.modal-input:focus{outline:none;border-color:var(--accent);}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{padding:8px 20px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-weight:600;}
.btn-save{padding:8px 20px;border-radius:8px;border:none;background:var(--accent);color:#fff;cursor:pointer;font-weight:600;}
.key-status{display:flex;align-items:center;gap:8px;padding:8px 0;font-size:12px;color:var(--text2);}
.dot{width:8px;height:8px;border-radius:50%;background:#ccc;}.dot.on{background:#27ae60;}
/* Step indicator */
.step-bar{display:flex;gap:2px;margin-bottom:16px;}
.step-item{flex:1;text-align:center;padding:10px 4px;font-size:12px;font-weight:600;border-radius:8px;background:var(--surface2);color:var(--text2);cursor:pointer;transition:all .2s;position:relative;}
.step-item.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;}
.step-item.done{background:#d4edda;color:#155724;}
.step-item.current{background:#fff3cd;color:#856404;animation:pulse 1.5s infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.7;}}
/* Grid layouts */
.ref-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;}
.ref-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;}
.ref-card:hover{border-color:var(--accent);box-shadow:0 4px 16px rgba(108,92,231,.15);}
.ref-card img{width:100%;aspect-ratio:1;object-fit:cover;}
.ref-card-info{padding:10px;font-size:12px;}
.ref-card-name{font-weight:700;margin-bottom:2px;}
.ref-card-desc{color:var(--text2);font-size:11px;line-height:1.4;max-height:44px;overflow:hidden;}
/* Panel grid */
.panel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.panel-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;position:relative;}
.panel-card img{width:100%;aspect-ratio:3/4;object-fit:cover;}
.panel-card .panel-num{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.panel-card .panel-info{padding:8px;font-size:11px;color:var(--text2);line-height:1.4;}
.panel-placeholder{aspect-ratio:3/4;background:var(--surface2);display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:12px;}
/* Webtoon preview */
.webtoon-strip{max-width:600px;margin:0 auto;display:flex;flex-direction:column;gap:4px;}
.webtoon-strip img{width:100%;display:block;}
.placeholder{padding:40px;text-align:center;color:var(--text2);font-size:13px;}
/* Tag */
.tag{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;margin-right:4px;}
.tag-mood{background:#e8d5f5;color:#6c3483;}
.tag-char{background:#d5e8f5;color:#2471a3;}
.tag-loc{background:#d5f5e3;color:#1e8449;}
/* Episode Bar */
.episode-bar{display:flex;align-items:center;gap:8px;padding:12px 0;overflow-x:auto;white-space:nowrap;}
.episode-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;display:inline-flex;align-items:center;gap:4px;position:relative;min-width:0;}
.episode-rename-input{background:transparent;border:none;border-bottom:1.5px solid #fff;color:inherit;font:inherit;font-size:12px;width:60px;outline:none;padding:0 2px;text-align:center;}
.episode-pill:hover{border-color:var(--accent);color:var(--accent);}
.episode-pill.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;}
.episode-pill.complete{border-color:var(--success);color:var(--success);}
.episode-pill.active.complete{background:linear-gradient(135deg,var(--success),#00c9a7);color:#fff;}
.episode-add{padding:6px 14px;border-radius:20px;border:1px dashed var(--border);background:transparent;color:var(--text2);cursor:pointer;font-size:12px;font-weight:600;transition:all .2s;}
.episode-add:hover{border-color:var(--accent);color:var(--accent);}
.project-title-bar{font-weight:700;font-size:14px;color:var(--text);margin-right:12px;display:flex;align-items:center;gap:8px;}
.episode-delete{position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--err);color:#fff;border:none;font-size:10px;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1;}
.episode-pill:hover .episode-delete{display:flex;}
.episode-rename-btn{opacity:0!important;transition:opacity .2s;}
.episode-pill:hover .episode-rename-btn{opacity:0.7!important;}
/* Unified Storyboard + Panel */
.sb-unified-list{display:flex;flex-direction:column;gap:0;}
.sb-unified-card{display:flex;gap:12px;padding:12px;background:var(--surface);border:1px solid var(--border);border-radius:12px;transition:all .2s;position:relative;}
.sb-unified-card:hover{border-color:var(--accent);box-shadow:0 2px 12px rgba(108,92,231,.08);}
.sb-unified-card.dragging{opacity:.4;border-style:dashed;}
.sb-card-handle{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:36px;cursor:grab;user-select:none;}
.sb-card-handle:active{cursor:grabbing;}
.sb-panel-num{width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}
.sb-drag-icon{font-size:12px;color:var(--text2);opacity:.4;letter-spacing:-2px;}
.sb-card-info{flex:1;min-width:0;}
.sb-card-image{width:160px;flex-shrink:0;display:flex;flex-direction:column;gap:6px;}
.sb-card-image img{width:100%;border-radius:8px;object-fit:cover;max-height:220px;cursor:pointer;}
.sb-img-placeholder{width:100%;height:120px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--text2);border:1px dashed var(--border);}
.sb-img-actions{display:flex;gap:4px;flex-wrap:wrap;}
.sb-drop-zone{height:8px;display:flex;align-items:center;justify-content:center;transition:all .2s;position:relative;margin:2px 0;}
.sb-drop-zone.active{height:40px;background:rgba(108,92,231,.08);border:2px dashed var(--accent);border-radius:8px;}
.sb-insert-btn{position:absolute;opacity:0;width:24px;height:24px;border-radius:50%;border:1px dashed var(--border);background:var(--surface);color:var(--text2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:2;}
.sb-drop-zone:hover .sb-insert-btn,.sb-drop-zone.active .sb-insert-btn{opacity:1;}
.sb-insert-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.sb-insert-end{position:relative;opacity:1;width:auto;padding:6px 16px;border-radius:20px;font-size:12px;font-weight:600;}
.sb-edit-form{display:flex;flex-direction:column;gap:6px;}
.sb-edit-row{display:flex;gap:8px;align-items:flex-start;font-size:12px;}
.sb-edit-row label{min-width:80px;font-weight:600;color:var(--text2);padding-top:4px;flex-shrink:0;}
.sb-edit-row input,.sb-edit-row textarea,.sb-edit-row select{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;font-size:12px;color:var(--text);font-family:inherit;}
.sb-edit-row textarea{resize:vertical;min-height:48px;}
.sb-edit-row select{max-width:180px;}
@media(max-width:700px){.sb-card-image{width:100px;}.sb-unified-card{flex-wrap:wrap;}}
/* Batch Run */
.batch-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:300;display:flex;align-items:center;justify-content:center;}
.batch-modal{background:var(--surface);border-radius:16px;width:min(500px,90vw);max-height:80vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.4);}
.batch-modal-header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.batch-modal-body{padding:20px;overflow-y:auto;flex:1;display:flex;flex-direction:column;gap:16px;}
.batch-modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:16px 20px;border-top:1px solid var(--border);}
.batch-config-section{display:flex;flex-direction:column;gap:6px;}
.batch-config-label{font-size:12px;font-weight:600;color:var(--text2);}
.batch-episode-list{display:flex;flex-direction:column;gap:4px;max-height:200px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:8px;}
.batch-episode-item{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:6px;cursor:pointer;font-size:13px;transition:background .15s;}
.batch-episode-item:hover{background:var(--surface2);}
.batch-episode-item.selected{background:rgba(108,92,231,.1);}
.batch-episode-item input[type=checkbox]{accent-color:var(--accent);}
.batch-ep-num{font-weight:700;min-width:36px;}
.batch-ep-title{flex:1;color:var(--text2);font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.batch-ep-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:#d5f5e3;color:#1e8449;font-weight:600;}
.batch-progress-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:250;background:var(--surface);border:1px solid var(--accent);border-radius:12px;box-shadow:0 8px 32px rgba(108,92,231,.3);padding:12px 20px;min-width:360px;max-width:90vw;}
.batch-progress-inner{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.batch-progress-text{font-size:13px;font-weight:700;color:var(--text);white-space:nowrap;}
.batch-progress-step{font-size:11px;color:var(--accent);font-weight:600;white-space:nowrap;}
.batch-progress-track{flex:1;min-width:80px;height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.batch-progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .5s ease;}
/* Asset Library */
.asset-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:200;display:flex;}
.asset-panel{width:min(90vw,800px);margin:auto;background:var(--surface);border-radius:16px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:24px;}
.asset-tabs{display:flex;gap:4px;margin-bottom:16px;border-bottom:2px solid var(--border);padding-bottom:8px;}
.asset-tab{padding:6px 16px;border-radius:8px 8px 0 0;border:none;background:transparent;color:var(--text2);cursor:pointer;font-size:13px;font-weight:600;transition:all .2s;}
.asset-tab.active{background:var(--accent);color:#fff;}
.asset-item{display:flex;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;align-items:flex-start;transition:all .2s;}
.asset-item:hover{border-color:var(--accent);box-shadow:0 2px 8px rgba(108,92,231,.1);}
.asset-item img{width:80px;height:80px;object-fit:cover;border-radius:8px;flex-shrink:0;}
.asset-item-info{flex:1;min-width:0;}
.asset-item-name{font-weight:700;font-size:14px;margin-bottom:2px;}
.asset-item-desc{font-size:12px;color:var(--text2);line-height:1.4;max-height:36px;overflow:hidden;}
.asset-item-meta{font-size:11px;color:var(--text2);margin-top:4px;display:flex;gap:8px;flex-wrap:wrap;}
.asset-item-actions{display:flex;gap:4px;flex-shrink:0;align-items:center;}
.asset-badge{display:inline-block;padding:2px 8px;border-radius:6px;font-size:10px;font-weight:700;background:#e8f4e8;color:#1e8449;}
.asset-badge.prop{background:#ffeaa7;color:#636e72;}
.asset-badge.bg{background:#dfe6e9;color:#2d3436;}
.asset-placeholder{width:80px;height:80px;background:var(--surface2);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:11px;flex-shrink:0;}
.outfit-tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#fff3cd;color:#856404;margin-left:4px;}
.img-modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.8);z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.img-modal-content{max-width:90vw;max-height:90vh;position:relative;}
.img-modal-content img{max-width:90vw;max-height:85vh;object-fit:contain;border-radius:8px;}
.img-modal-title{color:#fff;text-align:center;padding:8px;font-size:14px;}
.img-modal-close{position:absolute;top:-12px;right:-12px;background:#fff;border:none;border-radius:50%;width:28px;height:28px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.clickable-img{cursor:pointer;transition:opacity 0.2s;}
.clickable-img:hover{opacity:0.85;}
.prompt-editor-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:9998;display:flex;align-items:center;justify-content:center;}
.prompt-editor-box{background:var(--surface);border-radius:12px;padding:20px;width:90%;max-width:700px;max-height:80vh;display:flex;flex-direction:column;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.prompt-editor-box h3{margin:0;font-size:16px;color:var(--text);}
.prompt-editor-box textarea{width:100%;min-height:180px;padding:12px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:monospace;resize:vertical;line-height:1.6;background:var(--surface2);color:var(--text);}
.prompt-editor-box .btn-row{display:flex;gap:8px;justify-content:flex-end;}
.prompt-badge{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:var(--surface2);color:var(--accent);cursor:pointer;border:1px solid var(--border);transition:all 0.2s;}
.prompt-badge:hover{background:var(--accent);color:#fff;}
/* Refactoring classes */
.flex-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.flex-col{display:flex;flex-direction:column;gap:16px;}
.flex-wrap{flex-wrap:wrap;}
.section-title{font-weight:700;font-size:14px;margin-bottom:12px;}
.text-muted{font-size:12px;color:var(--text2);}
.text-xs{font-size:11px;color:var(--text2);}
.btn-xs{padding:2px 8px;font-size:10px;}
.toolbar{background:var(--surface2);border-bottom:1px solid var(--border);padding:8px 24px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.toolbar label{font-size:11px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;}
.toolbar select,.toolbar input{padding:6px 10px;font-size:12px;}
.log-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:6px;padding:6px 12px;background:var(--surface2);border-radius:8px;border:1px solid var(--border);font-size:12px;font-weight:600;color:var(--text2);}

<body>
<div id="root"></div>
<script type="text/babel">

// ============================================================
// Firebase / Firestore Project Management (Enhanced for Episodes)
// ============================================================
// Suppress noisy Firestore internal warnings (Listen stream 404 etc.)
try { firebase.firestore.setLogLevel && firebase.firestore.setLogLevel('error'); } catch(e) {}

let _db = null;
function getFirebaseConfig() { try { const raw = localStorage.getItem('firebase_config'); if (raw) return JSON.parse(raw); } catch(e) {} return null; }
function saveFirebaseConfig(cfg) { localStorage.setItem('firebase_config', JSON.stringify(cfg)); _db = null; initFirebase(); }
function initFirebase() { const cfg = getFirebaseConfig(); if (!cfg || !cfg.apiKey || !cfg.projectId) return null; try { if (!firebase.apps.length) firebase.initializeApp(cfg); _db = firebase.firestore(); _db.settings({ experimentalAutoDetectLongPolling: false, experimentalForceLongPolling: false, merge: true }); return _db; } catch(e) { return null; } }
function getDb() { if (_db) return _db; return initFirebase(); }

async function fbListProjects() { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const snap = await db.collection('webtoon_projects').orderBy('updatedAt','desc').get(); return snap.docs.map(d => ({id: d.id, ...d.data()})); }
async function fbSaveProject(projectId, data) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); await db.collection('webtoon_projects').doc(projectId).set({...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); return projectId; }
async function fbLoadProject(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const doc = await db.collection('webtoon_projects').doc(projectId).get(); if (!doc.exists) throw new Error('Not found'); return {id:doc.id,...doc.data()}; }
async function fbDeleteProject(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const episodes = await db.collection('webtoon_projects').doc(projectId).collection('episodes').get(); const batch = db.batch(); episodes.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection('webtoon_projects').doc(projectId)); await batch.commit(); }

// API Keys sync via Firestore
async function fbSaveApiKeys(keys) {
  const db = getDb(); if (!db) return;
  await db.collection('webtoon_config').doc('api_keys').set({...keys, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
}
async function fbLoadApiKeys() {
  const db = getDb(); if (!db) return null;
  try {
    const doc = await db.collection('webtoon_config').doc('api_keys').get();
    if (!doc.exists) return null;
    return doc.data();
  } catch(e) { return null; }
}

// Episode-level CRUD
async function fbListEpisodes(projectId) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const snap = await db.collection('webtoon_projects').doc(projectId).collection('episodes').orderBy('number','asc').get(); return snap.docs.map(d => ({number: d.id, ...d.data()})); }
async function fbSaveEpisode(projectId, episodeNum, data) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); await db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).set({...data, number: episodeNum, updatedAt: firebase.firestore.FieldValue.serverTimestamp()}, {merge:true}); }
async function fbDeleteEpisode(projectId, episodeNum) { const db = getDb(); if (!db) throw new Error('Firebase not configured'); const phases = await db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').get(); const batch = db.batch(); phases.docs.forEach(d => batch.delete(d.ref)); batch.delete(db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum))); await batch.commit(); }

// Global write queue: ensures only one fbSavePhase runs at a time
let _saveQueue = Promise.resolve();
function fbSavePhaseQueued(projectId, episodeNum, phaseName, phaseData, skipImages, onProgress) {
  _saveQueue = _saveQueue.then(() => _fbSavePhaseInner(projectId, episodeNum, phaseName, phaseData, skipImages, onProgress)).catch(e => { console.error('[fbSavePhaseQueued]', e); throw e; });
  return _saveQueue;
}

// Phase-level with episode support (skipImages: save metadata only, no base64 images)
// onProgress(current, total, message) — optional callback for progress tracking
async function _fbSavePhaseInner(projectId, episodeNum, phaseName, phaseData, skipImages, onProgress) {
  const db = getDb(); if (!db) return;
  // Invalidate cache for this phase
  clearPhaseCache(projectId, episodeNum, phaseName);
  const ref = db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').doc(phaseName);
  const imgs = []; const safe = stripBase64(phaseData, imgs);
  const retryWrite = async (fn, attempts) => {
    for (let a = 0; a < (attempts||3); a++) {
      try { await fn(); return; } catch(e) {
        const retryable = e.code === 'resource-exhausted' || e.code === 'unavailable' || e.message?.includes('exhausted') || e.message?.includes('queued writes');
        if (a < (attempts||3)-1 && retryable) {
          const wait = 5000 * (a + 1); // 5s, 10s, 15s, 20s
          console.warn(`[fbSavePhase] ${e.code || 'error'}, retry ${a+1}/${attempts||3} after ${wait/1000}s...`);
          if (onProgress) onProgress(-1, imgs.length, `재시도 대기 ${wait/1000}초...`);
          await new Promise(r => setTimeout(r, wait));
        } else throw e;
      }
    }
  };
  if (onProgress) onProgress(0, imgs.length + 1, '메타데이터 저장 중...');
  await retryWrite(() => ref.set({...safe, imageCount: skipImages ? 0 : imgs.length, savedAt: firebase.firestore.FieldValue.serverTimestamp()}));
  if (skipImages || imgs.length === 0) { if (onProgress) onProgress(1, 1, '완료'); return; }
  const imgColl = ref.collection('images');
  // Delete old images in parallel batches (max 500 per batch, Firestore limit)
  try {
    const old = await imgColl.get();
    if (old.docs.length > 0) {
      const delBatches = [];
      for (let d = 0; d < old.docs.length; d += 400) {
        const b = db.batch();
        old.docs.slice(d, d + 400).forEach(doc => b.delete(doc.ref));
        delBatches.push(b.commit());
      }
      await Promise.all(delBatches);
    }
  } catch(e) { console.warn('[fbSavePhase] old image cleanup failed:', e.message); }
  // Save images sequentially to avoid Firestore write stream exhaustion
  const CHUNK_SIZE = 800000;
  for (let i = 0; i < imgs.length; i++) {
    const im = imgs[i];
    await retryWrite(async () => {
      if (im.data.length > 900000) {
        const cn = Math.ceil(im.data.length / CHUNK_SIZE);
        await imgColl.doc(im.id).set({key: im.key, chunks: cn});
        // Save chunks one at a time to prevent write queue overflow
        for (let c = 0; c < cn; c++) {
          await imgColl.doc(im.id + '_c' + c).set({data: im.data.substring(c * CHUNK_SIZE, (c + 1) * CHUNK_SIZE), idx: c});
        }
      } else {
        await imgColl.doc(im.id).set({key: im.key, data: im.data});
      }
    }, 4);
    console.log(`[fbSavePhase] 이미지 ${i + 1}/${imgs.length} 저장 완료`);
    if (onProgress) onProgress(i + 1, imgs.length, `이미지 ${i + 1}/${imgs.length}`);
  }
}

// In-memory cache for fbLoadPhase (cleared on save)
const _phaseCache = {};
function _phaseCacheKey(pid, ep, phase) { return `${pid}/${ep}/${phase}`; }
function clearPhaseCache(pid, ep, phase) {
  if (phase) { delete _phaseCache[_phaseCacheKey(pid, ep, phase)]; }
  else { Object.keys(_phaseCache).forEach(k => { if (k.startsWith(`${pid}/${ep}/`)) delete _phaseCache[k]; }); }
}

// metadataOnly: skip loading images subcollection (fast, for status checks)
// useCache: use in-memory cache (default true)
async function fbLoadPhase(projectId, episodeNum, phaseName, metadataOnly, useCache) {
  const db = getDb(); if (!db) return null;
  const cacheKey = _phaseCacheKey(projectId, episodeNum, phaseName) + (metadataOnly ? ':meta' : '');
  if (useCache !== false && _phaseCache[cacheKey]) return _phaseCache[cacheKey];
  const ref = db.collection('webtoon_projects').doc(projectId).collection('episodes').doc(String(episodeNum)).collection('phases').doc(phaseName);
  // Parallel: load doc and images subcollection at the same time
  const [doc, snap] = await Promise.all([
    ref.get(),
    metadataOnly ? Promise.resolve(null) : ref.collection('images').get()
  ]);
  if (!doc.exists) return null;
  const d = doc.data();
  if (metadataOnly) { _phaseCache[cacheKey] = d; return d; }
  const map={}, cmeta={}, cdata={}, keyMap={};
  if (snap && snap.docs) {
    snap.docs.forEach(s=>{const sd=s.data();if(s.id.includes('_c')){const pid=s.id.split('_c')[0];if(!cdata[pid])cdata[pid]={};cdata[pid][sd.idx]=sd.data;}else if(sd.chunks)cmeta[s.id]=sd;else{if(sd.data)map[s.id]=sd.data;if(sd.key)keyMap[sd.key]=s.id;}});
    for(const [id,m] of Object.entries(cmeta)){let a='';for(let i=0;i<m.chunks;i++)a+=(cdata[id]?.[i]||'');if(a)map[id]=a;const km=snap.docs.find(s=>s.id===id)?.data()?.key;if(km)keyMap[km]=id;}
  }
  const imgCount = d.imageCount || 0;
  const mapSize = Object.keys(map).length;
  if (imgCount > 0 && mapSize === 0) {
    console.error(`[fbLoadPhase] ${phaseName}: 이미지 ${imgCount}개 예상, images 서브컬렉션 0개 — 이미지 복원 불가!`);
  } else if (imgCount > 0) {
    console.log(`[fbLoadPhase] ${phaseName}: 이미지 map ${mapSize}개 로드 (doc.imageCount=${imgCount}, keyMap=${Object.keys(keyMap).length}개)`);
  }
  // 0.5차: key → deterministic token ID alias 추가 (ep*_o* 형식 토큰 복원용)
  // 새 포맷 키(p0_o5_src) → 결정적 토큰 ID(ep0_o5)로 매핑하여 map에 추가
  for (const [key, imgId] of Object.entries(keyMap)) {
    const km = key.match(/^p(\d+)_o(\d+)_/);
    if (km && map[imgId]) {
      const detId = `ep${km[1]}_o${km[2]}`;
      if (!map[detId]) { map[detId] = map[imgId]; console.log(`[fbLoadPhase] key alias: ${key} → ${detId}`); }
    }
  }
  // 1차: ID 기반 복원
  const result = restoreBase64(d, map);
  // 2차: key 기반 + 인덱스 기반 fallback 복구 (동시 저장으로 ID 불일치 시)
  if (mapSize > 0 && result && typeof result === 'object') {
    // 사용되지 않은 이미지를 인덱스 순서로 정렬 (최후 수단 복구용)
    const usedIds = new Set();
    const collectUsed = (obj) => {
      if (!obj || typeof obj !== 'object') return;
      if (typeof obj === 'string' && obj.startsWith('data:')) return; // 복원 성공한 것
      if (Array.isArray(obj)) obj.forEach(collectUsed);
      else Object.values(obj).forEach(collectUsed);
    };
    // ID 기반으로 복원된 이미지 추적
    Object.keys(map).forEach(id => {
      // map에서 result 트리에 복원된 ID 추적은 복잡하므로, keyMap의 사용된 key를 추적
    });

    // keyMap에서 key → base64 데이터로 직접 매핑
    const keyDataMap = {};
    for (const [key, imgId] of Object.entries(keyMap)) {
      if (map[imgId]) keyDataMap[key] = map[imgId];
    }
    console.log(`[fbLoadPhase] keyDataMap: ${Object.keys(keyDataMap).length}개, keys 샘플:`, Object.keys(keyDataMap).slice(0, 5));

    const tryKeyFallback = (obj, parentKey) => {
      if (!obj || typeof obj !== 'object') return obj;
      if (Array.isArray(obj)) return obj.map((item, i) => {
        if (item === null) {
          // 여러 key 패턴 시도 (panels_0, panel_0, arr_0)
          const candidates = [
            (parentKey || 'arr') + '_' + i,
            (parentKey === 'panels' ? 'panel' : parentKey || 'arr') + '_' + i,
            'arr_' + i,
          ];
          for (const key of candidates) {
            if (keyDataMap[key]) {
              console.log(`[fbLoadPhase] key fallback 복구 [${i}]: ${key}`);
              return keyDataMap[key];
            }
          }
          console.warn(`[fbLoadPhase] key fallback 실패 [${i}]: 시도한 keys=${candidates.join(', ')}`);
        }
        if (item && typeof item === 'object') return tryKeyFallback(item, (parentKey || 'arr') + '_' + i);
        return item;
      });
      const out = {};
      for (const [k, v] of Object.entries(obj)) out[k] = tryKeyFallback(v, k);
      return out;
    };
    const recovered = tryKeyFallback(result, null);
    if (useCache !== false) _phaseCache[cacheKey] = recovered;
    return recovered;
  }
  if (useCache !== false) _phaseCache[cacheKey] = result;
  return result;
}

function stripBase64(obj, imgs, parentKey) {
  // Handle bare strings (e.g. array elements that are data URLs)
  if (typeof obj === 'string' && obj.startsWith('data:') && obj.length > 500) {
    const id = 'img_' + Math.random().toString(36).slice(2, 10);
    if (imgs) imgs.push({id, data: obj, key: parentKey || id});
    return '[img:' + id + ']';
  }
  if (!obj || typeof obj !== 'object') return obj;
  if (Array.isArray(obj)) return obj.map((item, i) => stripBase64(item, imgs, (parentKey || 'arr') + '_' + i));
  const out = {};
  for (const [k, v] of Object.entries(obj)) {
    out[k] = stripBase64(v, imgs, k);
  }
  return out;
}
function restoreBase64(obj, map) {
  if (!obj || typeof obj !== 'object') {
    if (typeof obj === 'string' && obj.startsWith('[img:') && obj.endsWith(']')) {
      const id = obj.slice(5,-1);
      if (map[id]) return map[id];
      console.warn('[restoreBase64] 이미지 복원 실패 — 토큰:', id, '(map 크기:', Object.keys(map).length, ')');
      return obj; // 원래 토큰 문자열 유지 (openBubbleEditor panelIndex fallback에서 복구 가능)
    }
    return obj;
  }
  if (Array.isArray(obj)) return obj.map(item => restoreBase64(item, map));
  const out = {}; for (const [k,v] of Object.entries(obj)) out[k] = restoreBase64(v, map); return out;
}

// Strip base64 from editor pages using deterministic IDs (pageIdx_objIdx based)
function stripEditorImages(editorPages) {
  const imgs = [];
  const stripped = editorPages.map((page, pi) => ({
    ...page,
    objects: (page.objects || []).map((obj, oi) => {
      if (obj.src && typeof obj.src === 'string' && obj.src.startsWith('data:') && obj.src.length > 500) {
        const id = `ep${pi}_o${oi}`;
        imgs.push({ id, data: obj.src, key: `p${pi}_o${oi}_src` });
        return { ...obj, src: '[img:' + id + ']' };
      }
      return obj;
    })
  }));
  return { stripped, imgs };
}

// Fingerprint: quick comparison string (length + first 80 chars)
function imgFingerprint(data) {
  return data.length + '|' + data.substring(0, 80);
}

// Global ref for saved image fingerprints (populated on load, updated on save)
let _editorSavedFingerprints = {}; // { imgId: fingerprint }

// Optimized editor save: only writes changed images to Firestore
// IMPORTANT: Images are saved BEFORE metadata to prevent token/doc ID mismatch on interruption
async function fbSaveEditorOptimized(projectId, episodeNum, editorPages, currentPageIdx, onProgress) {
  const db = getDb(); if (!db) return;
  const phaseName = 'step5_editor';
  clearPhaseCache(projectId, episodeNum, phaseName);
  const ref = db.collection('webtoon_projects').doc(projectId)
    .collection('episodes').doc(String(episodeNum))
    .collection('phases').doc(phaseName);
  const imgColl = ref.collection('images');

  // 1. Strip images with deterministic IDs
  const { stripped, imgs } = stripEditorImages(editorPages);

  // 2. Compute fingerprints and classify: changed vs unchanged
  const newFingerprints = {};
  const changedImgs = [];
  const unchangedIds = new Set();
  const newImgIds = new Set();

  for (const img of imgs) {
    const fp = imgFingerprint(img.data);
    newFingerprints[img.id] = fp;
    newImgIds.add(img.id);
    if (_editorSavedFingerprints[img.id] === fp) {
      unchangedIds.add(img.id);
    } else {
      changedImgs.push(img);
    }
  }

  const totalSteps = changedImgs.length + 2;
  console.log(`[fbSaveEditorOpt] 총 이미지 ${imgs.length}개: 변경 ${changedImgs.length}개, 유지 ${unchangedIds.size}개`);

  const retryWrite = async (fn, attempts) => {
    for (let a = 0; a < (attempts||3); a++) {
      try { await fn(); return; } catch(e) {
        const retryable = e.code === 'resource-exhausted' || e.code === 'unavailable' || e.message?.includes('exhausted');
        if (a < (attempts||3)-1 && retryable) {
          const wait = 5000 * (a + 1);
          if (onProgress) onProgress(-1, totalSteps, `재시도 대기 ${wait/1000}초...`);
          await new Promise(r => setTimeout(r, wait));
        } else throw e;
      }
    }
  };

  // === STEP A: Write changed images FIRST (before metadata) ===
  if (onProgress) onProgress(0, totalSteps, '이미지 저장 중...');
  const CHUNK_SIZE = 800000;
  for (let i = 0; i < changedImgs.length; i++) {
    const im = changedImgs[i];
    await retryWrite(async () => {
      if (im.data.length > 900000) {
        const cn = Math.ceil(im.data.length / CHUNK_SIZE);
        await imgColl.doc(im.id).set({ key: im.key, chunks: cn });
        for (let c = 0; c < cn; c++) {
          await imgColl.doc(im.id + '_c' + c).set({ data: im.data.substring(c * CHUNK_SIZE, (c + 1) * CHUNK_SIZE), idx: c });
        }
      } else {
        await imgColl.doc(im.id).set({ key: im.key, data: im.data });
      }
    }, 4);
    console.log(`[fbSaveEditorOpt] 이미지 ${i+1}/${changedImgs.length} 저장`);
    if (onProgress) onProgress(i + 1, totalSteps, `이미지 ${i+1}/${changedImgs.length}`);
  }

  // === STEP B: Save metadata AFTER all images are written ===
  if (onProgress) onProgress(changedImgs.length + 1, totalSteps, '메타데이터 저장 중...');
  await retryWrite(() => ref.set({
    editorPages: stripped, currentPageIdx,
    imageCount: imgs.length,
    savedAt: firebase.firestore.FieldValue.serverTimestamp()
  }));

  // === STEP C: Delete old/stale image docs (safe — metadata already points to new IDs) ===
  try {
    const old = await imgColl.get();
    const docsToDelete = old.docs.filter(d => {
      const baseId = d.id.includes('_c') ? d.id.substring(0, d.id.lastIndexOf('_c')) : d.id;
      // Delete if: not in new set, or was changed (already re-written above)
      return !newImgIds.has(baseId) || !unchangedIds.has(baseId);
    });
    if (docsToDelete.length > 0) {
      console.log(`[fbSaveEditorOpt] 오래된 이미지 문서 ${docsToDelete.length}개 삭제`);
      const delBatches = [];
      for (let d = 0; d < docsToDelete.length; d += 400) {
        const b = db.batch();
        docsToDelete.slice(d, d + 400).forEach(doc => b.delete(doc.ref));
        delBatches.push(b.commit());
      }
      await Promise.all(delBatches);
    }
  } catch(e) { console.warn('[fbSaveEditorOpt] cleanup fail:', e.message); }

  // 6. Update saved fingerprints
  _editorSavedFingerprints = newFingerprints;
  if (onProgress) onProgress(totalSteps, totalSteps, '완료');
}

async function fbSaveAsset(projectId, assetType, assetId, data) {
  const db = getDb(); if (!db) return;
  const docId = assetType + '_' + assetId;
  const ref = db.collection('webtoon_projects').doc(projectId).collection('shared_assets').doc(docId);
  const imgs = []; const safe = stripBase64({...data, type: assetType, assetId}, imgs);
  await ref.set({...safe, updatedAt: firebase.firestore.FieldValue.serverTimestamp()});
  const imgColl = ref.collection('images');
  const old = await imgColl.get(); if(old.docs.length>0){const b=db.batch();old.docs.forEach(d=>b.delete(d.ref));await b.commit();}
  for(let i=0;i<imgs.length;i++){const b=db.batch();const im=imgs[i];
    if(im.data.length>900000){const cs=800000,cn=Math.ceil(im.data.length/cs);b.set(imgColl.doc(im.id),{key:im.key,chunks:cn});for(let c=0;c<cn;c++)b.set(imgColl.doc(im.id+'_c'+c),{data:im.data.substring(c*cs,(c+1)*cs),idx:c});}
    else b.set(imgColl.doc(im.id),{key:im.key,data:im.data});await b.commit();}
}

async function fbLoadAllAssets(projectId) {
  const db = getDb(); if (!db) return {characters:{}, backgrounds:{}, props:{}};
  const snap = await db.collection('webtoon_projects').doc(projectId).collection('shared_assets').get();
  const result = {characters:{}, backgrounds:{}, props:{}};
  // Load all asset images in parallel
  const assetResults = await Promise.all(snap.docs.map(async (doc) => {
    const d = doc.data();
    const imgSnap = await doc.ref.collection('images').get();
    const map={}, cmeta={}, cdata={};
    imgSnap.docs.forEach(s=>{const sd=s.data();if(s.id.includes('_c')){const pid=s.id.split('_c')[0];if(!cdata[pid])cdata[pid]={};cdata[pid][sd.idx]=sd.data;}else if(sd.chunks)cmeta[s.id]=sd;else if(sd.data)map[s.id]=sd.data;});
    for(const [id,m] of Object.entries(cmeta)){let a='';for(let i=0;i<m.chunks;i++)a+=(cdata[id]?.[i]||'');if(a)map[id]=a;}
    return restoreBase64(d, map);
  }));
  assetResults.forEach(restored => {
    const t = restored.type || 'characters';
    if (result[t]) result[t][restored.assetId] = restored;
  });
  return result;
}

async function fbDeleteAsset(projectId, assetType, assetId) {

  const imgs = await ref.collection('images').get();
  const batch = db.batch(); imgs.docs.forEach(d => batch.delete(d.ref)); batch.delete(ref); await batch.commit();
}

async function callGemini(systemPrompt, userPrompt, opts={}) {
  const model=opts.model||'gemini-2.5-flash'; const {projectId,location,accessToken}=await getVertexConfig();
  // Gemini 3.x models require global endpoint
  const isGlobal = model.startsWith('gemini-3');
  const loc = isGlobal ? 'global' : location;
  const host = isGlobal ? 'aiplatform.googleapis.com' : `${location}-aiplatform.googleapis.com`;
  const url=`https://${host}/v1/projects/${projectId}/locations/${loc}/publishers/google/models/${model}:generateContent`;
  const body={systemInstruction:{parts:[{text:systemPrompt}]},contents:[{role:'user',parts:[{text:userPrompt}]}],generationConfig:{temperature:opts.temperature||0.7,topP:opts.topP||0.9,maxOutputTokens:opts.maxTokens||8192,thinkingConfig:{thinkingBudget:opts.thinkBudget??0}}};
  const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.text();throw new Error('Gemini '+res.status+': '+e.substring(0,200));}
  const data=await res.json();
  if (!data.candidates?.length) {
    console.error('[callGemini] No candidates in response:', JSON.stringify(data).substring(0, 500));
    const blockReason = data.promptFeedback?.blockReason || data.candidates?.[0]?.finishReason;
    throw new Error('Gemini 응답 없음' + (blockReason ? ` (이유: ${blockReason})` : '') + '. 프롬프트가 너무 길거나 안전 필터에 차단되었을 수 있습니다.');
  }
  const parts=data.candidates[0]?.content?.parts||[];
  const textParts = parts.filter(p=>p.text&&!p.thought);
  if (textParts.length === 0) {
    console.error('[callGemini] No text parts in response. All parts:', parts.map(p => ({hasText:!!p.text, thought:!!p.thought, keys:Object.keys(p)})));
    const finishReason = data.candidates[0]?.finishReason;
    throw new Error('Gemini 텍스트 응답 없음 (finishReason: ' + (finishReason||'unknown') + '). 토큰 제한 초과 또는 응답이 잘렸을 수 있습니다.');
  }
  return textParts.map(p=>p.text).join('');
}

async function callImagen(prompt, opts={}) {
  const {projectId,location,accessToken}=await getVertexConfig();

  const url=`https://${location}-aiplatform.googleapis.com/v1/projects/${projectId}/locations/${location}/publishers/google/models/${model}:predict`;
  const params={sampleCount:opts.sampleCount||1,aspectRatio:opts.aspectRatio||'3:4',personGeneration:'allow_all'};
  const tryReq = async (p) => {
    const body={instances:[{prompt:p}],parameters:params};
    for (let attempt = 0; attempt < 3; attempt++) {
      const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(body)});
      if (res.status === 429) {
        const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
        console.warn('Imagen 429 rate limit, waiting '+wait/1000+'s (attempt '+(attempt+1)+'/3)...');
        await new Promise(r => setTimeout(r, wait));
        continue;
      }
      if(!res.ok){const e=await res.text();throw new Error('Imagen '+res.status+': '+e.substring(0,300));}
      const data=await res.json(); if(!data.predictions?.length)throw new Error('No predictions'); return data.predictions.map(p2=>`data:image/png;base64,${p2.bytesBase64Encoded}`);
    }
    throw new Error('Imagen 429: Rate limit exceeded after 3 retries');
  };
  const safePrompt = prompt.substring(0, 2000);
  try { return await tryReq(safePrompt); } catch(e1) {
    console.warn('Imagen attempt 1 failed (prompt len='+safePrompt.length+'):', e1.message);
    if (safePrompt.length > 480) {
      try { return await tryReq(safePrompt.substring(0, 480)); } catch(e2) {
        console.warn('Imagen attempt 2 failed (truncated 480):', e2.message);
      }
    }
    throw e1;
  }
}

        console.log(`[NanoBanana] ✓ base64 추출 성공 (${isCharRef?'캐릭터':'기타'}, b64 length=${b.length})`);
      } else if(typeof imgSrc === 'string' && imgSrc.startsWith('http')){
        // 2) HTTP URL — try direct fetch first, fallback to server proxy for CORS-blocked URLs
        try{
          let blob;
          try {
            const resp=await fetch(imgSrc);
            blob=await resp.blob();
          } catch(corsErr) {
            // Direct fetch failed (likely CORS) — use server-side proxy
            console.log(`[NanoBanana] 직접 fetch 실패, 프록시 사용: ${imgSrc.substring(0,60)}...`);
            const proxyResp = await fetch('/api/proxy-image?url=' + encodeURIComponent(imgSrc));
            const proxyData = await proxyResp.json();
            if (proxyData.dataUri) {
              const proxyB64 = extractBase64(proxyData.dataUri);
              if (proxyB64) {
                const mime = proxyData.dataUri.match(/^data:([^;]+);/)?.[1] || 'image/png';
                parts.push({inlineData:{mimeType:mime,data:proxyB64}});
                if(desc)parts.push({text:'[Asset: '+desc.substring(0,400)+']'});
                refCount++;
                if(isCharRef) charRefCount++;
                console.log(`[NanoBanana] 프록시 경유 변환 성공 (${isCharRef?'캐릭터':'기타'}): ${imgSrc.substring(0,60)}...`);
                continue;
              }
            }
            throw new Error('Proxy failed: ' + (proxyData.error || 'unknown'));
          }
          const arrayBuf=await blob.arrayBuffer();
          const uint8=new Uint8Array(arrayBuf);
          let binary='';for(let i=0;i<uint8.length;i++)binary+=String.fromCharCode(uint8[i]);
          const b64=btoa(binary);
          const mime=blob.type||'image/png';
          parts.push({inlineData:{mimeType:mime,data:b64}});
          if(desc)parts.push({text:'[Asset: '+desc.substring(0,400)+']'});
          refCount++;
          if(isCharRef) charRefCount++;
          console.log(`[NanoBanana] URL 레퍼런스 → base64 변환 성공 (${isCharRef?'캐릭터':'기타'}): ${imgSrc.substring(0,80)}...`);
        }catch(e){
          console.warn(`[NanoBanana] URL 레퍼런스 변환 실패: ${imgSrc.substring(0,80)}`, e.message);
        }
      } else {
        console.warn(`[NanoBanana] 레퍼런스 이미지 무시 (형식 불명):`, typeof imgSrc, imgSrc?.substring?.(0,50));
      }
    }
    if(refCount > 0) parts.push({text:'END OF REFERENCES. Now generate the following scene using EXACTLY these character/prop designs:'});
    console.log(`[NanoBanana] 레퍼런스 전달 완료: ${opts.referenceImages.length}개 중 ${refCount}개 성공 (캐릭터: ${charRefCount}개)`);
    if(charRefCount === 0 && opts.referenceImages.some(r => (r.description||'').toLowerCase().startsWith('character:'))) {
      console.error(`[NanoBanana] ⚠️ 캐릭터 레퍼런스가 있지만 전달 실패! 이미지 형식을 확인하세요.`);
    }
  }
  parts.push({text:prompt});
  // Gemini 지원 비율: 1:1, 3:2, 2:3, 3:4, 4:3, 4:5, 5:4, 9:16, 16:9, 21:9
  const GEMINI_AR_MAP = {'1:1':'1:1','3:2':'3:2','2:3':'2:3','3:4':'3:4','4:3':'4:3','16:9':'16:9','9:16':'9:16','4:5':'4:5','5:4':'5:4','21:9':'21:9'};
  const geminiAR = GEMINI_AR_MAP[opts.aspectRatio] || '3:4';
  const genConfig = {responseModalities:['TEXT','IMAGE'],temperature:1.0};
  if (geminiAR) genConfig.imageConfig = {aspectRatio: geminiAR};
  console.log(`[NanoBanana] 비율: ${opts.aspectRatio} → Gemini: ${geminiAR}`);
  const body={contents:[{role:'user',parts}],generationConfig:genConfig};
  const maxRetries = 6;
  for (let attempt = 0; attempt < maxRetries; attempt++) {
    const res=await fetch(url,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+accessToken},body:JSON.stringify(body)});
    if (res.status === 429 || res.status === 503) {
      const wait = Math.min(10000 * Math.pow(2, attempt), 120000);
      console.warn(`NanoBanana ${res.status} rate limit, waiting ${wait/1000}s (attempt ${attempt+1}/${maxRetries})...`);
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if(!res.ok)throw new Error('NanoBanana '+res.status+': '+(await res.text()).substring(0,200));
    const data=await res.json(); const rp=(data.candidates?.[0]?.content?.parts)||[]; const ip=rp.filter(p=>p.inlineData?.mimeType?.startsWith('image/'));
    if(!ip.length)throw new Error('No image generated'); return ip.filter(p=>p.inlineData?.data).map(p=>`data:${p.inlineData.mimeType};base64,${p.inlineData.data}`);
  }
  throw new Error('NanoBanana 429: Rate limit exceeded after '+maxRetries+' retries');
}

async function callGrokImage(prompt, opts={}) {
  const apiKey = getXaiKey();
  const model = opts.model || 'grok-imagine-image-pro';
  const url = 'https://api.x.ai/v1/images/generations';
  const body = {
    model: model,
    prompt: prompt.substring(0, 4000),
    n: opts.n || 1,
    response_format: 'b64_json',
  };
  // aspect ratio 지원 — xAI는 size 대신 aspect_ratio 사용 (예: "3:4", "16:9")
  // grok-2-image 지원 비율: 1:1, 16:9, 9:16, 4:3, 3:4, 3:2, 2:3, 2:1, 1:2 등
  if (opts.aspectRatio) {
    body.aspect_ratio = opts.aspectRatio;
  }
  const maxRetries = 3;
  for (let attempt = 0; attempt < maxRetries; attempt++) {
    const res = await fetch(url, {
      method: 'POST',
      headers: {'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey},
      body: JSON.stringify(body)
    });
    if (res.status === 429) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('Grok 429 rate limit, waiting '+wait/1000+'s (attempt '+(attempt+1)+'/'+maxRetries+')...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) {
      const errText = await res.text();
      throw new Error('Grok Image ' + res.status + ': ' + errText.substring(0, 300));
    }
    const data = await res.json();
    if (!data.data?.length) throw new Error('Grok: 이미지가 생성되지 않았습니다.');
    return data.data.map(img => {
      const b64 = img.b64_json || '';
      // xAI may return with or without data URI prefix
      if (b64.startsWith('data:')) return b64;
      return 'data:image/png;base64,' + b64;
    });
  }
  throw new Error('Grok Image: Rate limit exceeded after ' + maxRetries + ' retries');
}

// STABLE DIFFUSION API (Stability AI)
// ============================================================
function getStabilityKey() { const k=localStorage.getItem('STABILITY_API_KEY'); if(!k)throw new Error('Stability AI API 키가 설정되지 않았습니다. 설정에서 입력해주세요.'); return k; }
function hasStabilityKey() { return !!localStorage.getItem('STABILITY_API_KEY'); }

async function callStableDiffusion(prompt, opts={}) {
  const apiKey = getStabilityKey();
  const model = opts.model || 'sd3.5-large-turbo';

  // Map aspect ratios - SD supports: 1:1, 16:9, 21:9, 2:3, 3:2, 4:5, 5:4, 9:16, 9:21
  const arMap = {'3:4':'2:3', '4:3':'3:2'};
  const aspectRatio = arMap[opts.aspectRatio] || opts.aspectRatio || '2:3';

  const formData = new FormData();
  formData.append('prompt', prompt.substring(0, 10000));
  formData.append('model', model);
  formData.append('output_format', 'png');

  // Image-to-image mode: use init_image as base for generation
  let url;
  if (opts.initImage && opts.initImage.startsWith('data:')) {
    url = 'https://api.stability.ai/v2beta/stable-image/generate/sd3';
    const b64match = opts.initImage.match(/^data:image\/\w+;base64,(.+)$/);
    if (b64match) {
      const byteString = atob(b64match[1]);
      const ab = new ArrayBuffer(byteString.length);
      const ia = new Uint8Array(ab);
      for (let i = 0; i < byteString.length; i++) ia[i] = byteString.charCodeAt(i);
      const blob = new Blob([ab], {type: 'image/png'});
      formData.append('image', blob, 'init_image.png');
      formData.append('strength', opts.strength || 0.65);
      formData.append('mode', 'image-to-image');
    } else {
      formData.append('aspect_ratio', aspectRatio);
    }
  } else {
    url = 'https://api.stability.ai/v2beta/stable-image/generate/sd3';
    formData.append('aspect_ratio', aspectRatio);
  }

  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + apiKey,
        'Accept': 'application/json'
      },
      body: formData
    });

    if (res.status === 429) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('StableDiffusion 429 rate limit, waiting '+wait/1000+'s (attempt '+(attempt+1)+'/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }

    if (!res.ok) {
      const e = await res.text();
      throw new Error('StableDiffusion ' + res.status + ': ' + e.substring(0, 300));
    }

    const data = await res.json();
    if (data.image) {
      return [`data:image/png;base64,${data.image}`];
    }
    throw new Error('No image in SD response');
  }
  throw new Error('StableDiffusion 429: Rate limit exceeded after 3 retries');
}
