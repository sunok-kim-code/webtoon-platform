function hasKieKey() { return !!localStorage.getItem('KIE_API_KEY'); }

// Kie.ai Seedream model registry
const KIE_SEEDREAM_MODELS = {
  '3.0':       { id: 'bytedance/seedream',                  label: '3.0',           format: 'v3',  hasEdit: false },
  '4.0-t2i':   { id: 'bytedance/seedream-v4-text-to-image', label: '4.0 T2I',       format: 'v4',  hasEdit: false },
  '4.0-edit':  { id: 'bytedance/seedream-v4-edit',          label: '4.0 Edit',      format: 'v4',  hasEdit: true },
  '4.5-t2i':   { id: 'seedream/4.5-text-to-image',          label: '4.5 T2I',       format: 'v45', hasEdit: false },
  '4.5-edit':  { id: 'seedream/4.5-edit',                    label: '4.5 Edit',      format: 'v45', hasEdit: true },
  '5.0-t2i':   { id: 'seedream/5-lite-text-to-image',        label: '5.0 Lite T2I',  format: 'v45', hasEdit: false },
  '5.0-i2i':   { id: 'seedream/5-lite-image-to-image',       label: '5.0 Lite I2I',  format: 'v45', hasEdit: true },
};

async function callKieSeedream(prompt, opts={}) {
  const apiKey = getKieKey();

  // Map aspect ratio to kie.ai image_size enum (v3/v4 format)
  const sizeMap = {
    '16:9': 'landscape_16_9', '9:16': 'portrait_16_9',
    '4:3': 'landscape_4_3', '3:4': 'portrait_4_3',
    '3:2': 'landscape_3_2', '2:3': 'portrait_3_2',
    '1:1': 'square_hd', '21:9': 'landscape_21_9'
  };

  // Collect reference image URLs (edit/i2i models support up to 14)
  const refUrls = [];
  if (opts.referenceImages?.length > 0) {
    for (const ref of opts.referenceImages.slice(0, 14)) {
      const imgData = ref.image || ref;
      if (typeof imgData === 'string' && imgData.startsWith('http')) {
        refUrls.push(imgData);
      } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
        try {
          const uploadRes = await fetch('https://kieai.redpandaai.co/api/file-base64-upload', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
            body: JSON.stringify({
              base64Data: imgData,
              uploadPath: 'webtoon-refs',
              fileName: 'ref_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + '.png'
            })
          });
          if (uploadRes.ok) {
            const uploadData = await uploadRes.json();
            const fileUrl = uploadData.data?.fileUrl || uploadData.data?.downloadUrl;
            if (fileUrl) {
              refUrls.push(fileUrl);
              console.log('[KieSeedream] Image uploaded to Kie.ai:', fileUrl.substring(0, 80));
            }
          } else {
            console.warn('[KieSeedream] Kie.ai upload failed:', uploadRes.status);
          }
        } catch(e) { console.warn('[KieSeedream] ref upload failed:', e.message); }
      }
    }
  }

  // Resolve model
  const subModel = opts.subModel || '4.0-t2i';
  const modelDef = KIE_SEEDREAM_MODELS[subModel] || KIE_SEEDREAM_MODELS['4.0-t2i'];
  const useEdit = modelDef.hasEdit && refUrls.length > 0;

  // If edit model selected but no refs, fall back to same-version t2i
  let effectiveModel = modelDef;
  if (modelDef.hasEdit && refUrls.length === 0) {
    const fallbackKey = subModel === '4.0-edit' ? '4.0-t2i' : subModel === '4.5-edit' ? '4.5-t2i' : subModel === '5.0-i2i' ? '5.0-t2i' : subModel;
    effectiveModel = KIE_SEEDREAM_MODELS[fallbackKey] || modelDef;
  }

  const model = effectiveModel.id;
  const fmt = effectiveModel.format;

  // Build request body based on format
  let body;
  if (fmt === 'v3') {
    // Seedream 3.0: image_size, guidance_scale
    body = {
      model,
      input: {
        prompt: prompt.substring(0, 5000),
        image_size: sizeMap[opts.aspectRatio] || 'portrait_4_3',
        guidance_scale: opts.guidanceScale || 2.5,
        enable_safety_checker: false
      }
    };
    if (opts.seed) body.input.seed = opts.seed;
  } else if (fmt === 'v4') {
    // Seedream 4.0: image_size, image_resolution
    body = {
      model,
      input: {
        prompt: prompt.substring(0, 5000),
        image_size: sizeMap[opts.aspectRatio] || 'portrait_4_3',
        image_resolution: opts.resolution || '1K',
        max_images: opts.n || 1,
        nsfw_checker: false
      }
    };
    if (opts.seed) body.input.seed = opts.seed;
    if (useEdit) body.input.image_urls = refUrls;
  } else {
    // Seedream 4.5 / 5.0 Lite: aspect_ratio, quality
    const quality = opts.quality === 'high' ? 'high' : 'basic';
    body = {
      model,
      input: {
        prompt: prompt.substring(0, 5000),
        aspect_ratio: opts.aspectRatio || '3:4',
        quality: quality,
        nsfw_checker: false
      }
    };
    if (useEdit && refUrls.length > 0) body.input.image_urls = refUrls;
  }

  console.log(`[KieSeedream] Creating task: ${effectiveModel.label}, model=${model}, refs=${refUrls.length}, prompt=${prompt.substring(0, 80)}...`);

  // 1) Create task
  const createRes = await fetch('https://api.kie.ai/api/v1/jobs/createTask', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify(body)
  });
  if (createRes.status === 402) throw new Error('Kie.ai: 크레딧 부족 — kie.ai 대시보드에서 충전해주세요.');
  if (createRes.status === 429) throw new Error('Kie.ai: 요청 빈도 제한 — 잠시 후 다시 시도해주세요.');
  if (!createRes.ok) {
    const errText = await createRes.text();
    throw new Error('Kie.ai Seedream ' + createRes.status + ': ' + errText.substring(0, 300));
  }
  const createData = await createRes.json();
  if (createData.code !== 200 || !createData.data?.taskId) {
    throw new Error('Kie.ai Seedream 오류: ' + (createData.msg || JSON.stringify(createData).substring(0, 300)));
  }
  const taskId = createData.data.taskId;
  console.log('[KieSeedream] Task created:', taskId);

  // 2) Poll for completion (3s intervals, max 3min)
  const maxPolls = 60;
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const pollRes = await fetch('https://api.kie.ai/api/v1/jobs/recordInfo?taskId=' + encodeURIComponent(taskId), {
        method: 'GET',
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      if (!pollRes.ok) { console.warn('[KieSeedream] Poll error:', pollRes.status); continue; }
      const pollData = await pollRes.json();
      if (pollData.code !== 200 || !pollData.data) continue;
      const task = pollData.data;
      const state = task.state;
      if (state === 'success') {
        let resultUrls = [];
        try {
          const rj = typeof task.resultJson === 'string' ? JSON.parse(task.resultJson) : task.resultJson;
          resultUrls = rj?.resultUrls || [];
        } catch(e) { console.warn('[KieSeedream] resultJson parse error:', e); }
        if (resultUrls.length === 0) throw new Error('Kie.ai Seedream: 이미지가 생성되지 않았습니다.');
        console.log(`[KieSeedream] Success: ${resultUrls.length} images in ${((i+1)*3)}s`);
        // Convert URLs to base64
        const images = [];
        for (const url of resultUrls) {
          try {
            const imgRes = await fetch(url);
            if (!imgRes.ok) { console.warn('[KieSeedream] Image fetch failed:', url); continue; }
            const blob = await imgRes.blob();
            const b64 = await new Promise(resolve => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
            images.push(b64);
          } catch(e) {
            console.warn('[KieSeedream] Image download error:', e.message);
            images.push(url); // fallback: return URL directly
          }
        }
        if (images.length === 0) throw new Error('Kie.ai Seedream: 이미지 다운로드 실패');
        return images;
      } else if (state === 'fail') {
        const failMsg = task.failMsg || 'unknown';
        // Edit model failed: 1) retry same model once, 2) then fall back to t2i
        if (useEdit && !opts._retryTxt2Img) {
          if (!opts._retryEditOnce) {
            console.warn(`[KieSeedream] Edit model failed (${failMsg}), retrying same edit model once...`);
            return await callKieSeedream(prompt, {...opts, _retryEditOnce: true});
          }
          const fallbackMap = {'4.0-edit':'4.0-t2i', '4.5-edit':'4.5-t2i', '5.0-i2i':'5.0-t2i'};
          const fallbackModel = fallbackMap[subModel] || '4.0-t2i';
          console.warn(`[KieSeedream] Edit model retry also failed (${failMsg}), falling back to ${fallbackModel}...`);
          return await callKieSeedream(prompt, {...opts, subModel: fallbackModel, referenceImages: undefined, _retryTxt2Img: true});
        }
        throw new Error('Kie.ai Seedream 생성 실패: ' + failMsg);
      }
      // waiting / queuing / generating — keep polling
      if (i % 5 === 4) console.log(`[KieSeedream] Still ${state}... (${(i+1)*3}s)`);
    } catch(pollErr) {
      if (pollErr.message.includes('Kie.ai')) throw pollErr;
      console.warn('[KieSeedream] Poll exception:', pollErr.message);
    }
  }
  throw new Error('Kie.ai Seedream: 시간 초과 (3분 이내 완료되지 않음)');
}

// ============================================================
// HIGGSFIELD API (Seedream 4.0 via platform.higgsfield.ai)
// ============================================================
function getHiggsKey() { const k=localStorage.getItem('HIGGSFIELD_CREDENTIALS'); if(!k)throw new Error('Higgsfield API 키가 설정되지 않았습니다. 설정에서 입력해주세요.'); return k; }
function hasHiggsKey() { return !!localStorage.getItem('HIGGSFIELD_CREDENTIALS'); }

async function callHiggsfieldSeedream(prompt, opts={}) {
  const credentials = getHiggsKey();

  // Map aspect ratio
  const arMap = {
    '1:1': '1:1', '16:9': '16:9', '9:16': '9:16',
    '4:3': '4:3', '3:4': '3:4', '3:2': '3:2', '2:3': '2:3', '21:9': '21:9'
  };
  const aspectRatio = arMap[opts.aspectRatio] || '3:4';
  const resolution = opts.resolution || '2K';

  // Determine sub-model: 't2i' or 'edit'
  const subModel = opts.subModel || 't2i';

  // Prepare reference image URLs for edit model
  const refUrls = [];
  if (opts.referenceImages?.length > 0 && subModel === 'edit') {
    for (const ref of opts.referenceImages.slice(0, 10)) {
      const imgData = ref.image || ref;
      if (typeof imgData === 'string' && imgData.startsWith('http')) {
        refUrls.push(imgData);
      } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
        // Upload base64 to Kie.ai for URL conversion (same as Siray)
        try {
          const kieKey = localStorage.getItem('KIE_API_KEY');
          if (kieKey) {
            const uploadRes = await fetch('https://kieai.redpandaai.co/api/file-base64-upload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + kieKey },
              body: JSON.stringify({
                base64Data: imgData,
                uploadPath: 'higgs-refs',
                fileName: 'href_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + '.png'
              })
            });
            if (uploadRes.ok) {
              const uploadData = await uploadRes.json();
              const fileUrl = uploadData.data?.fileUrl || uploadData.data?.downloadUrl;
              if (fileUrl) { refUrls.push(fileUrl); continue; }
            }
          }
          console.warn('[Higgsfield] No Kie key or upload failed, skipping ref');
        } catch(e) { console.warn('[Higgsfield] ref upload failed:', e.message); }
      }
    }
  }

  // Select model and endpoint
  const useEdit = subModel === 'edit' && refUrls.length > 0;
  const model = useEdit ? 'bytedance/seedream-v4-edit' : 'bytedance/seedream/v4/text-to-image';
  const endpoint = useEdit
    ? 'https://platform.higgsfield.ai/bytedance/seedream/v4/edit'
    : 'https://platform.higgsfield.ai/bytedance/seedream/v4/text-to-image';

  // Build request body — Higgsfield uses flat params (no 'input' wrapper)
  const body = useEdit
    ? {
        prompt: prompt.substring(0, 5000),
        image_urls: refUrls,
        strength: opts.strength || 0.75,
        num_images: opts.n || 1,
        resolution: resolution
      }
    : {
        prompt: prompt.substring(0, 5000),
        resolution: resolution,
        aspect_ratio: aspectRatio,
        camera_fixed: false
      };
  if (!useEdit && opts.seed) body.seed = opts.seed;

  console.log(`[Higgsfield] Creating task: model=${useEdit ? 'edit' : 't2i'}, refs=${refUrls.length}, aspect=${aspectRatio}, res=${resolution}, prompt=${prompt.substring(0, 80)}...`);

  // 1) Submit generation request
  const createRes = await fetch(endpoint, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Key ' + credentials
    },
    body: JSON.stringify(body)
  });
  if (createRes.status === 401 || createRes.status === 403) throw new Error('Higgsfield: 인증 실패 — API 자격증명을 확인해주세요.');
  if (createRes.status === 402) throw new Error('Higgsfield: 크레딧 부족 — Higgsfield 대시보드에서 충전해주세요.');
  if (createRes.status === 429) throw new Error('Higgsfield: 요청 빈도 제한 — 잠시 후 다시 시도해주세요.');
  if (!createRes.ok) {
    const errText = await createRes.text();
    throw new Error('Higgsfield Seedream ' + createRes.status + ': ' + errText.substring(0, 300));
  }
  const createData = await createRes.json();
  console.log('[Higgsfield] Submit response:', JSON.stringify(createData).substring(0, 400));

  // Check for direct completion (synchronous response)
  if (createData.status === 'completed' && createData.images?.length > 0) {
    console.log(`[Higgsfield] Direct result: ${createData.images.length} images`);
    return await _higgsDownloadImages(createData.images);
  }

  const requestId = createData.request_id;
  if (!requestId) {
    throw new Error('Higgsfield Seedream 오류: request_id 없음 — ' + JSON.stringify(createData).substring(0, 400));
  }
  console.log('[Higgsfield] Request submitted:', requestId);

  // 2) Poll for completion (2s intervals, max 5min)
  const maxPolls = 150;
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 2000));
    try {
      const pollRes = await fetch('https://platform.higgsfield.ai/requests/' + encodeURIComponent(requestId) + '/status', {
        method: 'GET',
        headers: { 'Authorization': 'Key ' + credentials }
      });
      if (!pollRes.ok) { console.warn('[Higgsfield] Poll error:', pollRes.status); continue; }
      const pollData = await pollRes.json();
      const status = pollData.status;

      if (status === 'completed') {
        const imgs = pollData.images || [];
        if (imgs.length === 0) throw new Error('Higgsfield Seedream: 이미지가 생성되지 않았습니다.');
        console.log(`[Higgsfield] Completed: ${imgs.length} images in ${((i+1)*2)}s`);
        return await _higgsDownloadImages(imgs);
      } else if (status === 'failed') {
        const failMsg = pollData.error || 'unknown';
        // If edit model failed, retry as t2i
        if (useEdit && !opts._retryT2i) {
          console.warn(`[Higgsfield] Edit model failed (${failMsg}), retrying as t2i...`);
          return await callHiggsfieldSeedream(prompt, {...opts, subModel: 't2i', referenceImages: undefined, _retryT2i: true});
        }
        throw new Error('Higgsfield Seedream 생성 실패: ' + failMsg);
      } else if (status === 'nsfw') {
        // If edit model got nsfw, retry as t2i
        if (useEdit && !opts._retryT2i) {
          console.warn('[Higgsfield] Edit model NSFW rejected, retrying as t2i...');
          return await callHiggsfieldSeedream(prompt, {...opts, subModel: 't2i', referenceImages: undefined, _retryT2i: true});
        }
        throw new Error('Higgsfield Seedream: NSFW 콘텐츠 필터에 의해 거부됨');
      }
      // queued / in_progress — keep polling
      if (i % 10 === 9) console.log(`[Higgsfield] Still ${status}... (${(i+1)*2}s)`);
    } catch(pollErr) {
      if (pollErr.message.includes('Higgsfield')) throw pollErr;
      console.warn('[Higgsfield] Poll exception:', pollErr.message);
    }
  }
  throw new Error('Higgsfield Seedream: 시간 초과 (5분 이내 완료되지 않음)');
}

// Helper: download Higgsfield image URLs to base64
async function _higgsDownloadImages(imgs) {
  const images = [];
  for (const img of imgs) {
    const url = img.url || img;
    if (typeof url !== 'string') continue;
    try {
      const imgRes = await fetch(url);
      if (!imgRes.ok) { console.warn('[Higgsfield] Image fetch failed:', url); continue; }
      const blob = await imgRes.blob();
      const b64 = await new Promise(resolve => {
        const reader = new FileReader();
        reader.onloadend = () => resolve(reader.result);
        reader.readAsDataURL(blob);
      });
      images.push(b64);
    } catch(e) {
      console.warn('[Higgsfield] Image download error:', e.message);
      images.push(url); // fallback
    }
  }
  if (images.length === 0) throw new Error('Higgsfield Seedream: 이미지 다운로드 실패');
  return images;
}

// ============================================================
// SIRAY.AI API (Seedream 4.0 — t2i / ref2i / i2i)
// ============================================================
function getSirayKey() { const k=localStorage.getItem('SIRAY_API_KEY'); if(!k)throw new Error('Siray.AI API 키가 설정되지 않았습니다. 설정에서 입력해주세요.'); return k; }
function hasSirayKey() { return !!localStorage.getItem('SIRAY_API_KEY'); }

async function callSiraySeedream(prompt, opts={}) {
  const apiKey = getSirayKey();

  // Map aspect ratio to Siray size string (WxH)
  const sizeMap = {
    '1:1': '2048x2048',
    '16:9': '2560x1440', '9:16': '1440x2560',
    '4:3': '2304x1728', '3:4': '1728x2304',
    '3:2': '2496x1664', '2:3': '1664x2496',
    '21:9': '3024x1296'
  };
  const imageSize = sizeMap[opts.aspectRatio] || '1728x2304'; // default 3:4

  // Sub-model: 't2i' (text-to-image), 'ref2i' (reference-to-image), 'i2i' (image-to-image)
  const subModel = opts.subModel || 't2i';

  // Prepare reference images (ref2i supports up to 10, i2i supports 1)
  // base64 data URLs are uploaded to temporary hosting first (Siray may reject large inline base64)
  const refImages = [];
  if (opts.referenceImages?.length > 0 && (subModel === 'ref2i' || subModel === 'i2i')) {
    const maxRefs = subModel === 'i2i' ? 1 : 10;
    for (const ref of opts.referenceImages.slice(0, maxRefs)) {
      const imgData = ref.image || ref;
      if (typeof imgData === 'string' && imgData.startsWith('http')) {
        refImages.push(imgData);
      } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
        // Upload base64 to Kie.ai file storage (free, 3-day expiry) for URL conversion
        // Falls back to Siray's own upload proxy if Kie key available
        try {
          const kieKey = localStorage.getItem('KIE_API_KEY');
          if (kieKey) {
            const uploadRes = await fetch('https://kieai.redpandaai.co/api/file-base64-upload', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + kieKey },
              body: JSON.stringify({
                base64Data: imgData,
                uploadPath: 'siray-refs',
                fileName: 'sref_' + Date.now() + '_' + Math.random().toString(36).slice(2,6) + '.png'
              })
            });
            if (uploadRes.ok) {
              const uploadData = await uploadRes.json();
              const fileUrl = uploadData.data?.fileUrl || uploadData.data?.downloadUrl;
              if (fileUrl) {
                refImages.push(fileUrl);
                console.log('[SiraySeedream] Ref uploaded via Kie.ai:', fileUrl.substring(0, 80));
                continue;
              }
            }
          }
          // Fallback: try sending data URL directly (may fail for large images)
          console.warn('[SiraySeedream] No Kie key or upload failed, sending data URL directly');
          refImages.push(imgData);
        } catch(e) {
          console.warn('[SiraySeedream] ref upload failed:', e.message);
          refImages.push(imgData); // fallback to data URL
        }
      }
    }
    console.log(`[SiraySeedream] Prepared ${refImages.length} ref images (${refImages.map(r => r.startsWith('http') ? 'URL' : 'dataURL').join(',')})`);
  }

  // Determine model name
  let model;
  if (subModel === 'ref2i' && refImages.length > 0) {
    model = 'bytedance/seedream-4.0-ref2i';
  } else if (subModel === 'i2i' && refImages.length > 0) {
    model = 'bytedance/seedream-4.0-i2i';
  } else {
    model = 'bytedance/seedream-4.0-t2i';
  }

  // Build request body
  const body = {
    model,
    prompt: prompt.substring(0, 5000),
    size: imageSize
  };
  if (subModel === 'ref2i' && refImages.length > 0) {
    body.images = refImages;
  } else if (subModel === 'i2i' && refImages.length > 0) {
    body.image = refImages[0];
  }

  console.log(`[SiraySeedream] Creating task: model=${model}, refs=${refImages.length}, size=${imageSize}, bodySize=${JSON.stringify(body).length} bytes, prompt=${prompt.substring(0, 80)}...`);

  // 1) Create async task
  const createRes = await fetch('https://api.siray.ai/v1/images/generations/async', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify(body)
  });
  if (createRes.status === 401 || createRes.status === 403) throw new Error('Siray.AI: 인증 실패 — API 키를 확인해주세요.');
  if (createRes.status === 402) throw new Error('Siray.AI: 크레딧 부족 — Siray 대시보드에서 충전해주세요.');
  if (createRes.status === 429) throw new Error('Siray.AI: 요청 빈도 제한 — 잠시 후 다시 시도해주세요.');
  if (!createRes.ok) {
    const errText = await createRes.text();
    throw new Error('Siray.AI Seedream ' + createRes.status + ': ' + errText.substring(0, 300));
  }
  const createData = await createRes.json();
  console.log('[SiraySeedream] Create response:', JSON.stringify(createData).substring(0, 500));
  // Accept various response formats: {code:'success', data:{task_id:...}} or {data:{task_id:...}} or {task_id:...}
  const taskId = createData.data?.task_id || createData.data?.taskId || createData.task_id || createData.taskId;
  if (!taskId) {
    // Check if response contains image directly (synchronous mode)
    const directOutputs = createData.data?.outputs || createData.outputs || createData.data?.images || createData.images;
    if (directOutputs?.length > 0) {
      console.log(`[SiraySeedream] Direct result: ${directOutputs.length} images`);
      const images = [];
      for (const item of directOutputs) {
        if (typeof item === 'string' && item.startsWith('data:')) { images.push(item); }
        else if (typeof item === 'string' && item.startsWith('http')) {
          try {
            const imgRes = await fetch(item);
            if (!imgRes.ok) { images.push(item); continue; }
            const blob = await imgRes.blob();
            const b64 = await new Promise(resolve => { const reader = new FileReader(); reader.onloadend = () => resolve(reader.result); reader.readAsDataURL(blob); });
            images.push(b64);
          } catch(e) { images.push(item); }
        }
      }
      if (images.length > 0) return images;
    }
    throw new Error('Siray.AI Seedream 오류: task_id 없음 — ' + JSON.stringify(createData).substring(0, 400));
  }
  console.log('[SiraySeedream] Task created:', taskId);

  // 2) Poll for completion (3s intervals, max 3min)
  const maxPolls = 60;
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 3000));
    try {
      const pollRes = await fetch('https://api.siray.ai/v1/images/generations/async/' + encodeURIComponent(taskId), {
        method: 'GET',
        headers: { 'Authorization': 'Bearer ' + apiKey }
      });
      if (!pollRes.ok) { console.warn('[SiraySeedream] Poll error:', pollRes.status); continue; }
      const pollData = await pollRes.json();
      if (pollData.code !== 'success' || !pollData.data) continue;
      const task = pollData.data;
      const status = task.status;

      if (status === 'SUCCESS') {
        const outputUrls = task.outputs || [];
        if (outputUrls.length === 0) throw new Error('Siray.AI Seedream: 이미지가 생성되지 않았습니다.');
        console.log(`[SiraySeedream] Success: ${outputUrls.length} images in ${((i+1)*3)}s`);
        // Convert URLs to base64
        const images = [];
        for (const url of outputUrls) {
          try {
            const imgRes = await fetch(url);
            if (!imgRes.ok) { console.warn('[SiraySeedream] Image fetch failed:', url); continue; }
            const blob = await imgRes.blob();
            const b64 = await new Promise(resolve => {
              const reader = new FileReader();
              reader.onloadend = () => resolve(reader.result);
              reader.readAsDataURL(blob);
            });
            images.push(b64);
          } catch(e) {
            console.warn('[SiraySeedream] Image download error:', e.message);
            images.push(url); // fallback: return URL directly
          }
        }
        if (images.length === 0) throw new Error('Siray.AI Seedream: 이미지 다운로드 실패');
        return images;
      } else if (status === 'FAILURE') {
        const failMsg = task.fail_reason || 'unknown';
        console.warn(`[SiraySeedream] Task failed: ${failMsg}`);

        // If ref2i/i2i failed, retry as t2i
        if (subModel !== 't2i' && !opts._retryT2i) {
          console.warn(`[SiraySeedream] ${model} failed (${failMsg}), retrying as t2i...`);
          return await callSiraySeedream(prompt, {...opts, subModel: 't2i', referenceImages: undefined, _retryT2i: true});
        }
        throw new Error('Siray.AI Seedream 생성 실패: ' + failMsg);
      }
      // NOT_START / SUBMITTED / QUEUED / IN_PROGRESS — keep polling
      if (i % 5 === 4) console.log(`[SiraySeedream] Still ${status} (${task.progress || ''})... (${(i+1)*3}s)`);
    } catch(pollErr) {
      if (pollErr.message.includes('Siray.AI')) throw pollErr;
      console.warn('[SiraySeedream] Poll exception:', pollErr.message);
    }
  }
  throw new Error('Siray.AI Seedream: 시간 초과 (3분 이내 완료되지 않음)');
}

// ============================================================
// A2E IMAGE API (video.a2e.ai)
// ============================================================
function getA2eKey() { const k=localStorage.getItem('A2E_API_KEY'); if(!k)throw new Error('A2E API 키가 설정되지 않았습니다. 설정에서 입력해주세요.'); return k.replace(/^Bearer\s+/i, '').trim(); }
function hasA2eKey() { return !!localStorage.getItem('A2E_API_KEY'); }

async function callA2eImage(prompt, opts={}) {
  const apiKey = getA2eKey();
  const baseUrl = 'https://video.a2e.ai/api/v1/userText2image';

  // Determine dimensions from aspect ratio
  let width = 768, height = 1024; // default 3:4
  const ar = opts.aspectRatio || '3:4';
  if (ar === '1:1') { width = 1024; height = 1024; }
  else if (ar === '16:9') { width = 1024; height = 576; }
  else if (ar === '9:16') { width = 576; height = 1024; }
  else if (ar === '4:3') { width = 1024; height = 768; }
  else if (ar === '3:4') { width = 768; height = 1024; }
  else if (ar === '3:2') { width = 1024; height = 683; }
  else if (ar === '2:3') { width = 683; height = 1024; }

  // model_type: 'a2e' (default) or 'seedream' (Seedream 5.0)
  const modelType = opts.modelType || 'a2e';

  // req_key: 'high_aes_general_v21_L' (General/Realistic) or 'high_aes' (Manga)
  const reqKey = opts.reqKey || 'high_aes'; // default to Manga style for webtoon

  // Upload reference images to A2E R2 (max 2 for Text to Image)
  const inputImages = [];
  if (opts.referenceImages?.length > 0) {
    console.log('[A2E T2I] Uploading', opts.referenceImages.length, 'reference images to R2 (max 2)...');
    for (const ref of opts.referenceImages.slice(0, 2)) {
      try {
        const imgData = ref.image || ref;
        if (typeof imgData === 'string' && imgData.startsWith('http')) {
          inputImages.push(imgData);
        } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
          const url = await uploadImageToA2eR2(imgData);
          if (url) inputImages.push(url);
        }
      } catch (e) { console.warn('[A2E T2I] ref upload failed:', e.message); }
    }
    console.log('[A2E T2I] Uploaded', inputImages.length, 'reference images:', inputImages);
  }

  // 1) Start task — send full prompt, let A2E backend handle its own limits
  const finalPrompt = prompt;
  console.log('[A2E T2I] Prompt length:', finalPrompt.length);

  const startBody = {
    name: 'webtoon_panel_' + Date.now(),
    prompt: finalPrompt,
    model_type: modelType,
    width: width,
    height: height
  };
  // Seedream uses aspect_ratio string instead of width/height
  if (modelType.startsWith('seedream')) {
    startBody.aspect_ratio = ar;
  }
  // Only add req_key if not seedream and no reference images
  if (!modelType.startsWith('seedream') && inputImages.length === 0) {
    startBody.req_key = reqKey;
  }
  if (inputImages.length > 0) {
    startBody.input_images = inputImages;
  }

  console.log('[A2E T2I] Request:', JSON.stringify({...startBody, prompt: startBody.prompt.substring(0, 80) + '...', input_images: startBody.input_images?.map(u => u.substring(0, 80) + '...')}));

  const startRes = await fetch(baseUrl + '/start', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + apiKey
    },
    body: JSON.stringify(startBody)
  });

  if (!startRes.ok) {
    const errText = await startRes.text();
    console.error('[A2E T2I] Start failed:', startRes.status, errText.substring(0, 500));
    throw new Error('A2E Start ' + startRes.status + ': ' + errText.substring(0, 300));
  }

  const startData = await startRes.json();
  console.log('[A2E T2I] start response:', JSON.stringify(startData).substring(0, 500));

  // code can be number 0 or string "0" — treat both as success
  if (startData.code != 0) {
    throw new Error('A2E 에러 (code=' + startData.code + '): ' + (startData.msg || JSON.stringify(startData).substring(0, 300)));
  }

  // data can be an object {_id,...} or an array [{_id,...}] — normalize
  let taskObj = startData.data;
  if (Array.isArray(taskObj)) taskObj = taskObj[0];
  if (!taskObj || !taskObj._id) {
    throw new Error('A2E: task ID 없음 — ' + JSON.stringify(startData).substring(0, 300));
  }

  const taskId = taskObj._id;
  console.log('[A2E] task started:', taskId, 'status:', taskObj.current_status);

  // If start response already has completed images, return immediately
  if (taskObj.current_status === 'completed' && taskObj.image_urls?.length > 0) {
    return taskObj.image_urls;
  }

  // 2) Poll for completion
  const maxPolls = 60; // up to 5 minutes (5s intervals)
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 5000));

    const pollRes = await fetch(baseUrl + '/' + taskId, {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });

    if (!pollRes.ok) {
      console.warn('A2E poll error:', pollRes.status);
      continue;
    }

    const pollData = await pollRes.json();
    if (pollData.code !== 0 || !pollData.data) continue;

    const pollObj = Array.isArray(pollData.data) ? pollData.data[0] : pollData.data;
    if (!pollObj) continue;

    const status = pollObj.current_status;
    if (status === 'completed') {
      const urls = pollObj.image_urls || [];
      if (urls.length === 0) throw new Error('A2E: 이미지가 생성되지 않았습니다.');
      return urls; // Return array of image URLs
    } else if (status === 'failed') {
      const failMsg = pollObj.failed_message || 'unknown';
      console.error('[A2E T2I] Task failed:', JSON.stringify(pollObj).substring(0, 500));
      // Don't silently retry without refs — let caller decide
      if (inputImages.length > 0) {
        console.error('[A2E T2I] ⚠️ FAILED with reference images:', failMsg);
      }
      throw new Error('A2E 생성 실패: ' + failMsg);
    }
    // else: still processing, continue polling
  }
  throw new Error('A2E: 시간 초과 (5분 이내 완료되지 않음)');
}

// ============================================================
// A2E NANO BANANA (Gemini-2.5-Flash via A2E — supports reference images)
// ============================================================
async function uploadImageToA2eR2(base64Data) {
  const apiKey = getA2eKey();
  const filename = 'ref_' + Date.now() + '_' + Math.random().toString(36).slice(2,8) + '.png';
  // 1) Get presigned URL
  const presignRes = await fetch('https://video.a2e.ai/api/v1/r2/get_upload_presigned_url', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
    body: JSON.stringify({ key: filename })
  });
  if (!presignRes.ok) throw new Error('A2E R2 presigned URL 실패: ' + presignRes.status);
  const presignData = await presignRes.json();
  console.log('[A2E R2] presign response:', JSON.stringify(presignData).substring(0, 500));
  if (presignData.code != 0) throw new Error('A2E R2 에러: ' + (presignData.msg || JSON.stringify(presignData).substring(0, 200)));
  const data = presignData.data;
  const uploadUrl = data.uploadUrl || data.upload_url || data.presigned_url || data.url;
  if (!uploadUrl) throw new Error('A2E R2: uploadUrl 필드 없음: ' + JSON.stringify(data).substring(0, 300));
  // 2) Convert base64 to blob and upload via PUT
  const b64 = base64Data.replace(/^data:[^;]+;base64,/, '');
  const binary = atob(b64);
  const bytes = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'image/png' });
  const putRes = await fetch(uploadUrl, { method: 'PUT', body: blob, headers: { 'Content-Type': 'image/png' } });
  if (!putRes.ok) throw new Error('A2E R2 업로드 실패: ' + putRes.status + ' ' + (await putRes.text()).substring(0, 200));
  // 3) Return public URL — prefer explicit public/download URL from response, fallback to key-based
  const publicUrl = data.publicUrl || data.public_url || data.downloadUrl || data.download_url || data.fileUrl || data.file_url;
  if (publicUrl) {
    console.log('[A2E R2] using publicUrl from response:', publicUrl);
    return publicUrl;
  }
  // Fallback: construct URL using key field if available
  if (data.key || data.file_key) {
    const key = data.key || data.file_key;
    // If key is not a full URL, prefix with A2E CDN
    if (!key.startsWith('http')) {
      const cdnUrl = 'https://30days.ai2everyone.com/' + key;
      console.log('[A2E R2] using CDN URL from key:', cdnUrl);
      return cdnUrl;
    }
    console.log('[A2E R2] using key-based URL:', key);
    return key;
  }
  // Last resort: strip query params from presigned URL
  const stripped = uploadUrl.split('?')[0];
  console.log('[A2E R2] using stripped presigned URL:', stripped);
  return stripped;
}

// Vertex AI NanoBanana model variants (used by Gemini provider)
const NB_VERTEX_MODELS = {
  'gemini-2.5-flash': { name: 'Gemini 2.5 Flash (기본)', vertexModel: 'gemini-2.5-flash-image', maxRefs: 6 },
  'gemini-3.1-flash': { name: 'Gemini 3.1 Flash', vertexModel: 'gemini-3.1-flash-image-preview', maxRefs: 10 },
  'gemini-3-pro':     { name: 'Gemini 3 Pro (고품질)', vertexModel: 'gemini-3-pro-image-preview', maxRefs: 14 },
};

async function callA2eNanoBanana(prompt, opts={}) {
  const apiKey = getA2eKey();
  const maxRefs = 4; // A2E NanoBanana supports up to 4 reference images

  // Upload reference images to A2E R2 if provided
  const inputImages = [];
  if (opts.referenceImages?.length > 0) {
    console.log('[A2E NanoBanana] Uploading', opts.referenceImages.length, 'reference images to R2...');
    for (const ref of opts.referenceImages.slice(0, maxRefs)) {
      try {
        const imgData = ref.image || ref;
        if (imgData.startsWith('http')) {
          inputImages.push(imgData);
        } else if (imgData.startsWith('data:')) {
          const url = await uploadImageToA2eR2(imgData);
          if (url) inputImages.push(url);
        }
      } catch (e) { console.warn('[A2E NanoBanana] ref upload failed:', e.message); }
    }
    console.log('[A2E NanoBanana] Uploaded', inputImages.length, 'reference images:', inputImages);
  }

  // 1) Start task — NanoBanana (Gemini), 2000 char UI limit
  console.log('[A2E NanoBanana] Prompt length:', prompt.length, ', refs:', inputImages.length);
  const startBody = {
    name: 'webtoon_ref_' + Date.now(),
    prompt: prompt.substring(0, 2000)
  };
  if (inputImages.length > 0) {
    startBody.input_images = inputImages;
    // quality_settings: lower creativity = closer to references
    startBody.quality_settings = {
      creativity_level: 'low',
      detail_level: 'detailed',
      style_consistency: true
    };
    startBody.composition_mode = 'blend';
  }

  const baseUrl = 'https://video.a2e.ai/api/v1/userNanoBanana';
  let startData = null;
  let usedBaseUrl = baseUrl;
  {
    const body = {...startBody};
    console.log('[A2E NanoBanana] trying endpoint:', baseUrl + '/start', JSON.stringify({...body, prompt: body.prompt.substring(0, 80) + '...'}));

    try {
      const startRes = await fetch(baseUrl + '/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey },
        body: JSON.stringify(body)
      });
      if (!startRes.ok) {
        const errText = await startRes.text();
        throw new Error('A2E NanoBanana ' + startRes.status + ': ' + errText.substring(0, 200));
      }
      startData = await startRes.json();
      console.log('[A2E NanoBanana] start response:', JSON.stringify(startData).substring(0, 500));
      if (startData.code != 0) {
        throw new Error('A2E NanoBanana 오류: ' + (startData.msg || 'code ' + startData.code));
      }
    } catch (fetchErr) {
      throw new Error('A2E NanoBanana 연결 실패: ' + fetchErr.message);
    }
  }

  let taskObj = startData.data;
  if (Array.isArray(taskObj)) taskObj = taskObj[0];
  if (!taskObj || !taskObj._id) {
    throw new Error('A2E NanoBanana: task ID 없음 — ' + JSON.stringify(startData).substring(0, 300));
  }
  const taskId = taskObj._id;
  console.log('[A2E NanoBanana] task started:', taskId);

  // If already completed
  if (taskObj.current_status === 'completed' && taskObj.image_urls?.length > 0) {
    return taskObj.image_urls;
  }

  // 2) Poll for completion (5s intervals, max 5min)
  const maxPolls = 60;
  for (let i = 0; i < maxPolls; i++) {
    await new Promise(r => setTimeout(r, 5000));
    const pollRes = await fetch(usedBaseUrl + '/detail/' + taskId, {
      method: 'GET',
      headers: { 'Authorization': 'Bearer ' + apiKey }
    });
    if (!pollRes.ok) { console.warn(`A2E NanoBanana poll error:`, pollRes.status); continue; }
    const pollData = await pollRes.json();
    if (pollData.code != 0 || !pollData.data) continue;
    const pollObj = Array.isArray(pollData.data) ? pollData.data[0] : pollData.data;
    if (!pollObj) continue;
    if (pollObj.current_status === 'completed') {
      const urls = pollObj.image_urls || [];
      if (urls.length === 0) throw new Error(`A2E NanoBanana: 이미지가 생성되지 않았습니다.`);
      return urls;
    } else if (pollObj.current_status === 'failed') {
      const failMsg = pollObj.failed_message || 'unknown';
      // If failed due to reference image issue, retry without references
      if (inputImages.length > 0 && (failMsg.includes('400') || failMsg.includes('Bad Request') || failMsg.includes('r2') || failMsg.includes('image'))) {
        console.warn('[A2E NanoBanana] Failed with references, retrying without:', failMsg);
        return await callA2eNanoBanana(prompt, {...opts, referenceImages: undefined, _retryNoRef: true});
      }
      throw new Error(`A2E NanoBanana 실패: ` + failMsg);
    }
  }
  throw new Error(`A2E NanoBanana: 시간 초과 (5분 이내 완료되지 않음)`);
}

// ============================================================
// FLUX 2 PRO — fal.ai (reference images via /edit endpoint)
// ============================================================
async function callFlux2Pro(prompt, opts={}) {
  const apiKey = getFalKey();
  if (!apiKey) throw new Error('fal.ai API 키가 필요합니다. 설정에서 입력해주세요.');

  const refs = opts.referenceImages || [];
  const hasRefs = refs.length > 0;

  // Upload reference images: convert data URIs to fal.ai CDN URLs if needed
  const imageUrls = [];
  if (hasRefs) {
    for (const ref of refs.slice(0, 8)) { // Flux 2 Pro supports up to 9 refs
      const imgData = ref.image || ref;
      if (typeof imgData === 'string' && imgData.startsWith('http')) {
        imageUrls.push(imgData);
      } else if (typeof imgData === 'string' && imgData.startsWith('data:')) {
        imageUrls.push(imgData); // fal.ai accepts data URIs directly
      }
    }
    console.log('[Flux2Pro] Reference images:', imageUrls.length);
  }

  // Choose endpoint: edit (with refs) or generate (text-only)
  const endpoint = hasRefs && imageUrls.length > 0
    ? 'https://fal.run/fal-ai/flux-2-pro/edit'
    : 'https://fal.run/fal-ai/flux-2-pro';

  // Build request body
  const body = { prompt: prompt.substring(0, 4000) };

  if (hasRefs && imageUrls.length > 0) {
    // Edit endpoint uses image_urls array
    body.image_urls = imageUrls;
  }

  // Image size
  const ar = opts.aspectRatio || '3:4';
  if (ar === '1:1') body.image_size = { width: 1024, height: 1024 };
  else if (ar === '16:9') body.image_size = { width: 1024, height: 576 };
  else if (ar === '9:16') body.image_size = { width: 576, height: 1024 };
  else if (ar === '4:3') body.image_size = { width: 1024, height: 768 };
  else if (ar === '3:2') body.image_size = { width: 1024, height: 683 };
  else body.image_size = { width: 768, height: 1024 }; // 3:4 default

  body.num_images = 1;
  body.output_format = 'png';
  body.safety_tolerance = 6; // relaxed for creative content

  console.log(`[Flux2Pro] Endpoint: ${endpoint.split('/').slice(-2).join('/')}, refs: ${imageUrls.length}, size: ${body.image_size.width}x${body.image_size.height}`);

  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Authorization': 'Key ' + apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.status === 429 || res.status === 503) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('[Flux2Pro] ' + res.status + ', waiting ' + wait/1000 + 's (attempt ' + (attempt+1) + '/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) {
      const errText = await res.text();
      console.error('[Flux2Pro] Error:', errText.substring(0, 500));
      // 403 = billing/balance issue
      if (res.status === 403) {
        throw new Error('Flux 2 Pro: fal.ai 잔액 부족 — fal.ai/dashboard/billing 에서 충전해주세요');
      }
      // If edit endpoint fails, retry without references as text-to-image
      if (hasRefs && imageUrls.length > 0 && (res.status === 422 || res.status === 400)) {
        console.warn('[Flux2Pro] Edit failed, retrying as text-to-image...');
        return await callFlux2Pro(prompt, {...opts, referenceImages: undefined});
      }
      throw new Error('Flux 2 Pro ' + res.status + ': ' + errText.substring(0, 300));
    }

    const data = await res.json();
    if (data.images?.length > 0) {
      const imgUrl = data.images[0].url;
      try {
        const imgRes = await fetch(imgUrl);
        const blob = await imgRes.blob();
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        return [dataUrl];
      } catch (fetchErr) {
        console.warn('[Flux2Pro] Image fetch failed, returning URL:', fetchErr.message);
        return [imgUrl];
      }
    }
    throw new Error('Flux 2 Pro: 이미지가 생성되지 않았습니다.');
  }
  throw new Error('Flux 2 Pro: 재시도 초과');
}

  if (refImageUrl) body.image = refImageUrl;

  console.log(`[NinjaChat] Model: ${model}, size: ${size}, has_ref: ${!!refImageUrl}`);

  for (let attempt = 0; attempt < 3; attempt++) {

        'Content-Type': 'application/json',
        'X-Api-Key': apiKey
      },
      body: JSON.stringify({...body, _apiKey: apiKey})
    });

    if (res.status === 429) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('[NinjaChat] Rate limited, waiting ' + wait/1000 + 's (attempt ' + (attempt+1) + '/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (res.status === 402) {
      throw new Error('NinjaChat: 잔액 부족 — API 계정을 확인해주세요');
    }
    if (!res.ok) {
      const errText = await res.text();
      console.error('[NinjaChat] Error:', errText.substring(0, 500));
      throw new Error('NinjaChat ' + res.status + ': ' + errText.substring(0, 300));

    if (data._refUploadStatus) console.log('[NinjaChat] Ref upload status:', data._refUploadStatus);

      const imgUrl = data.images[0].url;
      return [imgUrl];
    }
    throw new Error('NinjaChat: 이미지가 생성되지 않았습니다.');
  }
  throw new Error('NinjaChat: 재시도 초과');
}

async function callFalAI(prompt, opts={}) {

  // Choose endpoint:
  // - flux-lora: when LoRAs are provided
  // - flux-general: when IP-Adapter or ControlNet is needed (requires flux-general)
  // - flux/dev: default text-to-image (fewer content restrictions than flux-general)
  const endpoint = hasLoras
    ? 'https://fal.run/fal-ai/flux-lora'
    : (hasRefImages || opts.controlNetImage)
      ? 'https://fal.run/fal-ai/flux-general'
      : 'https://fal.run/fal-ai/flux/dev';

  // Build request body
  const body = {
    prompt: prompt.substring(0, 4000),
    num_inference_steps: opts.steps || 28,
    guidance_scale: opts.guidanceScale || 3.5,
    num_images: 1,
    enable_safety_checker: false,
    output_format: 'png',
    image_size: opts.imageSize || {width: 768, height: 1024}
  };

  // LoRA support — for character/style consistency (flux-lora endpoint)
  if (hasLoras) {
    body.loras = opts.loras.map(l => ({
      path: l.path || l.url,
      scale: l.scale || 0.8
    }));
    console.log(`[callFalAI] flux-lora 엔드포인트: LoRA ${body.loras.length}개 적용`, body.loras.map(l => l.path.split('/').pop()));
  }

  // IP-Adapter v2: reference images (only with flux-general, not supported by flux-lora)
  if (hasRefImages && !hasLoras) {
    body.ip_adapters = validRefImages.map(img => ({
      path: 'XLabs-AI/flux-ip-adapter-v2',
      weight_name: 'ip_adapter.safetensors',
      image_encoder_path: 'openai/clip-vit-large-patch14',
      image_url: img.url || img,
      scale: 0.6
    }));
    console.log(`[callFalAI] IP-Adapter v2: ${validRefImages.length}개 레퍼런스, scale=0.6`);
  }

  // ControlNet (OpenPose) — for dynamic poses (flux-general only)
  if (opts.controlNetImage && !hasLoras) {
    body.controlnet_unions = [{
      control_image_url: opts.controlNetImage.url || opts.controlNetImage,
      control_mode: opts.controlNetMode || 'openpose',
      conditioning_scale: opts.controlNetScale || 0.7
    }];
  }

  console.log(`[callFalAI] Endpoint: ${endpoint.split('/').pop()}, body keys:`, Object.keys(body));

  for (let attempt = 0; attempt < 3; attempt++) {
    const res = await fetch(endpoint, {
      method: 'POST',
      headers: {
        'Authorization': 'Key ' + apiKey,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(body)
    });

    if (res.status === 429 || res.status === 503) {
      const wait = Math.min(15000 * Math.pow(2, attempt), 60000);
      console.warn('fal.ai ' + res.status + ', waiting ' + wait/1000 + 's (attempt ' + (attempt+1) + '/3)...');
      await new Promise(r => setTimeout(r, wait));
      continue;
    }
    if (!res.ok) {
      const e = await res.text();
      console.error('[callFalAI] Error response:', e.substring(0, 500));
      // 422 fallback: step 1) remove IP-Adapter, keep image-to-image
      // 422 fallback: remove IP-Adapter, retry as pure text-to-image
      if (res.status === 422) {
        // Step 1: remove IP-Adapter
        if (body.ip_adapters) {
          console.warn('[callFalAI] 422 — IP-Adapter 제거 후 재시도...');
          delete body.ip_adapters;
          continue;
        }
        // Step 2: remove LoRAs
        if (body.loras) {
          console.warn('[callFalAI] 422 — LoRA 제거 후 재시도...');
          delete body.loras;
          continue;
        }
      }
      throw new Error('fal.ai ' + res.status + ': ' + e.substring(0, 300));
    }

    const data = await res.json();
    // Check for NSFW flag in response (fal.ai returns has_nsfw_concepts array)
    if (data.has_nsfw_concepts && data.has_nsfw_concepts.some(v => v === true)) {
      console.warn('[callFalAI] NSFW flag detected in response — image may be black/blank');
    }
    if (data.images?.length > 0) {
      // fal.ai returns image URLs, need to fetch and convert to data URL
      const imgUrl = data.images[0].url;
      try {
        const imgRes = await fetch(imgUrl);
        const blob = await imgRes.blob();
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(blob);
        });
        // Detect black/blank images by checking pixel data
        const isBlack = await new Promise((resolve) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            const sz = 64; // sample at small size for speed
            canvas.width = sz; canvas.height = sz;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, sz, sz);
            const pixels = ctx.getImageData(0, 0, sz, sz).data;
            let totalBrightness = 0;
            for (let i = 0; i < pixels.length; i += 4) {
              totalBrightness += pixels[i] + pixels[i+1] + pixels[i+2]; // R+G+B
            }
            const avgBrightness = totalBrightness / (sz * sz * 3); // avg per channel
            resolve(avgBrightness < 5); // nearly all black if avg < 5/255
          };
          img.onerror = () => resolve(false);
          img.src = dataUrl;
        });
        if (isBlack) {
          console.warn('[callFalAI] Black/blank image detected (content filter likely applied)');
          throw new Error('fal.ai: 블랙 이미지 감지됨 (콘텐츠 필터 적용). 다른 모델을 시도하세요.');
        }
        return [dataUrl];
      } catch(fetchErr) {
        if (fetchErr.message?.includes('블랙 이미지')) throw fetchErr;
        // If can't fetch image, return URL directly
        return [imgUrl];
      }
    }
    throw new Error('No image in fal.ai response');
  }
  throw new Error('fal.ai: Rate limit exceeded after 3 retries');
}

// Helper: upload base64 image to fal.ai CDN via server proxy (uses fal SDK server-side)
async function uploadToFalCDN(base64DataUrl) {
  const apiKey = getFalKey();
  // Extract base64 data and mime type
  const match = base64DataUrl.match(/^data:(image\/\w+);base64,(.+)$/);
  if (!match) return null;
  const mimeType = match[1];
  const base64Data = match[2];

  try {

    const res = await fetch('/api/fal-upload', {

      headers: {
        'Content-Type': 'application/json',
        'X-Fal-Key': apiKey
      },
      body: JSON.stringify({ base64: base64Data, mimeType })
    });
    if (res.ok) {
      const data = await res.json();
      const url = data.url || data.file_url;
      if (url) {
        console.log(`[uploadToFalCDN] ✓ Upload succeeded: ${url.substring(0, 80)}...`);
        return url;
      }
    }
    const errText = await res.text().catch(() => '');
    console.warn(`[uploadToFalCDN] Proxy returned ${res.status}: ${errText.substring(0, 200)}`);
  } catch(e) {
    console.warn('[uploadToFalCDN] Proxy failed:', e.message);

}

async function createTrainingZip(base64Images) {
  // Create a zip file containing training images
  const zip = new JSZip();
  for (let i = 0; i < base64Images.length; i++) {
    const match = base64Images[i].match(/^data:image\/(\w+);base64,(.+)$/);
    if (!match) continue;
    const ext = match[1] === 'jpeg' ? 'jpg' : match[1];
    const byteChars = atob(match[2]);
    const byteArr = new Uint8Array(byteChars.length);
    for (let j = 0; j < byteChars.length; j++) byteArr[j] = byteChars.charCodeAt(j);
    zip.file(`image_${i}.${ext}`, byteArr);
  }
  return await zip.generateAsync({type: 'blob'});
}

async function uploadTrainingZipToFal(zipBlob) {
  const apiKey = getFalKey();
  // Step 1: Initiate upload — get presigned upload_url and final file_url
  const initRes = await fetch('https://rest.fal.ai/storage/upload/initiate?storage_type=fal-cdn-v3', {
    method: 'POST',
    headers: {
      'Authorization': 'Key ' + apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify({
      content_type: 'application/zip',
      file_name: 'training_images.zip'
    })
  });
  if (!initRes.ok) throw new Error('Upload initiate failed: ' + initRes.status + ' ' + await initRes.text().catch(()=>''));
  const { upload_url, file_url } = await initRes.json();
  if (!upload_url || !file_url) throw new Error('Upload initiate returned no URLs');

  // Step 2: PUT the actual file to the presigned URL
  const putRes = await fetch(upload_url, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/zip' },
    body: zipBlob
  });
  if (!putRes.ok) throw new Error('Upload PUT failed: ' + putRes.status);
  return file_url;
}

async function submitLoraTraining(imagesUrl, triggerWord, opts={}) {
  const apiKey = getFalKey();
  // Submit to queue endpoint for async training
  const body = {
    images_data_url: imagesUrl,
    trigger_word: triggerWord || 'ohwx',
    steps: opts.steps || 1000,
    is_style: false,
    create_masks: true,
    rank: opts.rank || 16
  };
  const res = await fetch('https://queue.fal.run/fal-ai/flux-lora-fast-training', {
    method: 'POST',
    headers: {
      'Authorization': 'Key ' + apiKey,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!res.ok) {
    const e = await res.text();
    throw new Error('LoRA training submit failed: ' + res.status + ' ' + e.substring(0, 200));
  }
  return await res.json(); // {request_id, ...}
}

async function pollLoraTraining(requestId, onProgress) {
  const apiKey = getFalKey();
  const statusUrl = `https://queue.fal.run/fal-ai/flux-lora-fast-training/requests/${requestId}/status?logs=1`;
  const resultUrl = `https://queue.fal.run/fal-ai/flux-lora-fast-training/requests/${requestId}`;

  // Poll every 10 seconds for up to 15 minutes
  let lastLogIdx = 0;
  for (let i = 0; i < 90; i++) {
    await new Promise(r => setTimeout(r, 10000));
    try {
      const sRes = await fetch(statusUrl, {
        headers: { 'Authorization': 'Key ' + apiKey }
      });
      if (!sRes.ok) {
        if (onProgress) onProgress({status: 'POLL_ERROR', httpStatus: sRes.status, attempt: i});
        continue;
      }
      const data = await sRes.json();
      // Forward new logs if available
      if (data.logs?.length > lastLogIdx) {
        for (let li = lastLogIdx; li < data.logs.length; li++) {
          if (onProgress) onProgress({status: data.status, logMessage: data.logs[li]?.message || data.logs[li]});
        }
        lastLogIdx = data.logs.length;
      } else {
        if (onProgress) onProgress(data);
      }
      if (data.status === 'COMPLETED') {
        const rRes = await fetch(resultUrl, {
          headers: { 'Authorization': 'Key ' + apiKey }
        });
        if (!rRes.ok) throw new Error('Failed to fetch training result: ' + rRes.status);
        return await rRes.json();
      }
      if (data.status === 'FAILED') {
        throw new Error('LoRA training failed: ' + (data.error || JSON.stringify(data).substring(0,200)));
      }
    } catch(e) {
      if (e.message.includes('LoRA training failed')) throw e;
      if (onProgress) onProgress({status: 'POLL_EXCEPTION', error: e.message, attempt: i});
    }
  }
  throw new Error('LoRA training timed out (15 minutes)');
}

      const tag = document.activeElement?.tagName;
      if (tag === 'TEXTAREA' || tag === 'INPUT' || document.activeElement?.contentEditable === 'true') return;
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        e.preventDefault();
        undo();
      } else if ((e.ctrlKey || e.metaKey) && e.key === 'z' && e.shiftKey) {
        e.preventDefault();
        redo();
      } else if ((e.ctrlKey || e.metaKey) && e.key === 'y') {

  // Save character edits to Firebase (analysis + sharedAssets)
  // Sync outfit/accessories edits into refPrompt text
  const syncOutfitToRefPrompt = (char) => {
    let rp = char.refPrompt || '';
    // Replace Outfit section
    const outfitRegex = /Outfit:\s*\[[^\]]*\]/i;
    const outfitRegex2 = /Outfit:\s*[^.]*\./i;
    const newOutfit = char.outfit || '';
    const newAcc = (char.accessories && char.accessories !== 'none') ? char.accessories : '';
    const outfitStr = `Outfit: [${newOutfit}${newAcc ? '. Accessories: ' + newAcc : ''}]`;

    if (outfitRegex.test(rp)) {
      rp = rp.replace(outfitRegex, outfitStr);
    } else if (outfitRegex2.test(rp)) {
      rp = rp.replace(outfitRegex2, outfitStr + '.');
    }
    return rp;
  };

  // After saving character edits, update storyboard imagePrompts that reference this character
  // Respects per-panel outfitOverride: if a panel has an explicit override for this character,
  // that override takes priority over the base/episode outfit (scene-specific costumes preserved).
  const refreshPanelPromptsForChar = (charId, char) => {
    if (!storyboard || storyboard.length === 0) return;
    const charName = char.name;
    if (!charName) return;

    const appearance = char.appearance || '';
    const baseOutfit = char.outfit || '';
    const baseAccessories = char.accessories && char.accessories !== 'none' ? char.accessories : '';

    // Use buildCharacterStates to get accumulated outfit state per panel (respects outfitOverride persistence)
    let updatedCount = 0;
    const newSb = storyboard.map((panel, idx) => {
      // Check if this panel references the character
      const pc = panel.characters?.find(p => (p.id || p) === charId);
      if (!pc || !panel.imagePrompt) return panel;

      // Determine outfit for THIS specific panel:
      // 1. Panel-level outfitOverride (scene-specific costume change) — highest priority
      // 2. Accumulated state from previous panels' outfitOverrides (costume persists)
      // 3. Episode outfit (화차별 의상)
      // 4. Base character outfit
      let panelOutfit = baseOutfit;
      let panelAccessories = baseAccessories;

      // Walk panels up to current to accumulate outfitOverride state
      let accumulatedOutfit = null;
      let accumulatedAccessories = null;
      for (let i = 0; i <= idx; i++) {
        const p = storyboard[i];
        const pChar = p?.characters?.find(c => (c.id || c) === charId);
        if (pChar?.outfitOverride) accumulatedOutfit = pChar.outfitOverride;
        if (pChar?.accessoriesOverride) accumulatedAccessories = pChar.accessoriesOverride;
      }
      if (accumulatedOutfit) panelOutfit = accumulatedOutfit;
      if (accumulatedAccessories) panelAccessories = accumulatedAccessories;

      let prompt = panel.imagePrompt;
      const nameEscaped = charName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

      // Build replacement description
      const outfitDesc = panelOutfit ? `wearing ${panelOutfit}` : '';
      const accDesc = panelAccessories ? `, with ${panelAccessories}` : '';
      const newCharDesc = `${appearance ? appearance + ', ' : ''}${outfitDesc}${accDesc}`.replace(/,\s*$/, '') + '.';

      // Try pattern: "CharName: [appearance], [outfit/wearing/dressed...], ..."
      const charBlockRegex = new RegExp(
        `(${nameEscaped}[:\\s,]+)([^.]*?(?:wearing|wears|dressed in|outfit|clothing|attire|shirt|jacket|coat|dress|suit|uniform|blouse|pants|skirt|jeans|hoodie|sweater)[^.]*?\\.?)`,
        'i'
      );

      if (charBlockRegex.test(prompt)) {
        prompt = prompt.replace(charBlockRegex, (match, prefix) => `${prefix}${newCharDesc}`);
        updatedCount++;
      } else {
        // Fallback: find "CharName" and append updated description in parentheses
        const simpleNameRegex = new RegExp(`(${nameEscaped})(?=\\s*[,:])`, 'i');
        if (simpleNameRegex.test(prompt)) {
          const appendDesc = [appearance, outfitDesc, panelAccessories ? `with ${panelAccessories}` : ''].filter(Boolean).join(', ');
          if (appendDesc) {
            prompt = prompt.replace(simpleNameRegex, `${charName} (${appendDesc})`);
            updatedCount++;
          }
        }
      }

      if (prompt !== panel.imagePrompt) {
        return {...panel, imagePrompt: prompt};
      }
      return panel;
    });

    if (updatedCount > 0) {
      setStoryboard(newSb);
      log(`${charName} 특징 변경 → ${updatedCount}개 패널 프롬프트 업데이트됨 (씬별 의상변경 유지)`, 'success');
      // Auto-save storyboard
      if (projectId && currentEpisode) {

    }

  const clipboardRef = React.useRef([]); // copied objects for paste

  const isObjectSelected = (objId) => {

  };

  // Copy selected objects to clipboard
  const copySelectedObjects = React.useCallback(() => {
    const ids = selectedObjectIds.length > 0 ? selectedObjectIds : (selectedObjectId ? [selectedObjectId] : []);
    if (ids.length === 0) { console.log('[Copy] No objects selected'); return; }
    const copied = [];
    editorPages.forEach(page => {
      (page.objects || []).forEach(o => {
        if (ids.includes(o.id)) copied.push(JSON.parse(JSON.stringify(o)));
      });
    });
    if (copied.length > 0) {
      clipboardRef.current = copied;
      setClipboardCount(copied.length);
      log(`${copied.length}개 객체 복사됨`, 'info');
    } else {
      console.log('[Copy] Selected ids not found in pages:', ids);
    }
  }, [selectedObjectId, selectedObjectIds, editorPages]);

  // Paste objects from clipboard to current page
  const pasteObjects = React.useCallback(() => {
    const items = clipboardRef.current;
    if (!items || items.length === 0) { console.log('[Paste] Clipboard empty'); return; }
    const ts = Date.now();
    const newObjs = items.map((o, i) => {
      const clone = JSON.parse(JSON.stringify(o));
      const prefix = (clone.type || 'obj') + '_paste_';
      clone.id = prefix + (ts + i);
      clone.x = (clone.x || 0) + 20;
      clone.y = (clone.y || 0) + 20;
      return clone;
    });
    setEditorPages(prev => {
      const next = [...prev];
      const pi = currentPageIdx;
      if (!next[pi]) return prev;
      next[pi] = {...next[pi], objects: [...next[pi].objects, ...newObjs]};
      return next;
    });
    // Select pasted objects
    if (newObjs.length === 1) {
      setSelectedObjectId(newObjs[0].id);
      setSelectedObjectType(newObjs[0].type);
      setSelectedObjectIds([]);
    } else {
      setSelectedObjectIds(newObjs.map(o => o.id));
    }
    log(`${newObjs.length}개 객체 붙여넣기 완료`, 'success');
  }, [currentPageIdx]);

  // Duplicate selected objects (copy + paste in one step)
  const duplicateSelectedObjects = React.useCallback(() => {
    const ids = selectedObjectIds.length > 0 ? selectedObjectIds : (selectedObjectId ? [selectedObjectId] : []);
    if (ids.length === 0) return;
    const ts = Date.now();
    const newObjs = [];
    editorPages.forEach(page => {
      (page.objects || []).forEach(o => {
        if (ids.includes(o.id)) {
          const clone = JSON.parse(JSON.stringify(o));
          const prefix = (clone.type || 'obj') + '_dup_';
          clone.id = prefix + (ts + newObjs.length);
          clone.x = (clone.x || 0) + 20;
          clone.y = (clone.y || 0) + 20;
          newObjs.push(clone);
        }
      });
    });
    if (newObjs.length === 0) return;
    setEditorPages(prev => {
      const next = [...prev];
      const pi = currentPageIdx;
      if (!next[pi]) return prev;
      next[pi] = {...next[pi], objects: [...next[pi].objects, ...newObjs]};
      return next;
    });
    if (newObjs.length === 1) {
      setSelectedObjectId(newObjs[0].id);
      setSelectedObjectType(newObjs[0].type);
      setSelectedObjectIds([]);
    } else {
      setSelectedObjectIds(newObjs.map(o => o.id));

    log(`${newObjs.length}개 객체 복제됨`, 'success');
  }, [selectedObjectId, selectedObjectIds, editorPages, currentPageIdx]);

  // Keyboard: arrow keys (move), Ctrl+C/V/D (copy/paste/duplicate), Delete
  React.useEffect(() => {
    const handleKeyDown = (e) => {
      const inTextInput = ['INPUT','TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.isContentEditable;

      const ids = selectedObjectIds.length > 0 ? selectedObjectIds : (selectedObjectId ? [selectedObjectId] : []);

      // Ctrl+D / Cmd+D — duplicate (works even in textarea — always duplicates the selected object)
      if ((e.ctrlKey || e.metaKey) && e.key === 'd') {
        if (ids.length === 0) return;
        e.preventDefault();
        duplicateSelectedObjects();
        return;
      }
      // Ctrl+C / Cmd+C — copy object (only when textarea has no text selection)
      if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
        if (ids.length === 0) return;
        // If user is in a textarea and has selected text, let browser handle it (text copy)
        if (inTextInput) {
          const sel = window.getSelection();
          if (sel && sel.toString().length > 0) return; // let browser copy text
        }
        e.preventDefault();
        copySelectedObjects();
        return;
      }
      // Ctrl+V / Cmd+V — paste object (only when not in text input, or clipboard has objects)
      if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
        if (clipboardRef.current.length === 0) return; // no objects to paste, let browser handle
        if (inTextInput) return; // let browser paste text in textarea
        e.preventDefault();
        pasteObjects();
        return;
      }

      // For non-Ctrl shortcuts, don't capture if user is typing in an input
      if (inTextInput) return;

      // Delete / Backspace — delete selected objects
      if (e.key === 'Delete' || e.key === 'Backspace') {
        if (ids.length === 0) return;
        e.preventDefault();
        ids.forEach(objId => {
          const pageIdx = editorPages.findIndex(p => p.objects.some(o => o.id === objId));
          if (pageIdx >= 0) deletePageObject(pageIdx, objId);
        });
        setSelectedObjectId(null);
        setSelectedObjectIds([]);
        return;
      }
      // Arrow keys — move
      if (!['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) return;
      if (ids.length === 0) return;
      e.preventDefault();
      const step = e.shiftKey ? 10 : 1; // shift+arrow = 10px step
      const dx = e.key === 'ArrowLeft' ? -step : e.key === 'ArrowRight' ? step : 0;
      const dy = e.key === 'ArrowUp' ? -step : e.key === 'ArrowDown' ? step : 0;
      setEditorPages(prev => {
        const next = [...prev];
        for (let pi = 0; pi < next.length; pi++) {
          let changed = false;
          const newObjs = next[pi].objects.map(o => {
            if (ids.includes(o.id)) {
              changed = true;
              return {...o, x: Math.max(0, o.x + dx), y: Math.max(0, o.y + dy)};
            }
            return o;
          });
          if (changed) next[pi] = {...next[pi], objects: newObjs};
        }
        return next;
      });
    };
    window.addEventListener('keydown', handleKeyDown);
    return () => window.removeEventListener('keydown', handleKeyDown);
  }, [selectedObjectId, selectedObjectIds, editorPages, copySelectedObjects, pasteObjects, duplicateSelectedObjects]);

  // Helper: get display text for current language

  const cropDragRef = React.useRef(null);

  // Unified drag handler using ref to avoid stale closures
  const autoScrollTimerRef = React.useRef(null);
  useEffect(() => {
    const SCROLL_EDGE = 60; // px from edge to trigger auto-scroll
    const SCROLL_SPEED = 12; // px per frame

    const doAutoScroll = () => {
      const d = dragRef.current;
      if (!d || d.type !== 'move' || !d.crossPage) { autoScrollTimerRef.current = null; return; }
      const canvas = editorCanvasRef.current;
      if (!canvas) { autoScrollTimerRef.current = null; return; }
      const rect = canvas.getBoundingClientRect();
      const mouseY = d.lastClientY || d.startY;
      let scrolled = false;
      if (mouseY > rect.bottom - SCROLL_EDGE && canvas.scrollTop < canvas.scrollHeight - canvas.clientHeight) {
        canvas.scrollTop += SCROLL_SPEED;
        scrolled = true;
      } else if (mouseY < rect.top + SCROLL_EDGE && canvas.scrollTop > 0) {
        canvas.scrollTop -= SCROLL_SPEED;
        scrolled = true;
      }
      if (scrolled) {
        autoScrollTimerRef.current = requestAnimationFrame(doAutoScroll);
      } else {
        autoScrollTimerRef.current = null;

        if (!overlay) { cropDragRef.current = null; return; }
        const rect = overlay.getBoundingClientRect();
        const mx = Math.max(0, Math.min(100, ((e.clientX - rect.left) / rect.width) * 100));
        const my = Math.max(0, Math.min(100, ((e.clientY - rect.top) / rect.height) * 100));
        if (cd.type === 'draw') {
          setCropRect({
            x: Math.min(cd.startX, mx), y: Math.min(cd.startY, my),
            w: Math.abs(mx - cd.startX), h: Math.abs(my - cd.startY)
          });
        } else if (cd.type === 'move_region') {
          setCropRect(prev => {
            if (!prev) return prev;
            const dx = mx - cd.lastX, dy = my - cd.lastY;
            cd.lastX = mx; cd.lastY = my;
            return {
              ...prev,
              x: Math.max(0, Math.min(100 - prev.w, prev.x + dx)),
              y: Math.max(0, Math.min(100 - prev.h, prev.y + dy)),

        } else if (cd.type === 'resize_crop') {
          setCropRect(prev => {
            if (!prev) return prev;
            let nr = {...prev};

            if (cd.corner.includes('l')) { nr.x = Math.min(mx, o.x + o.w - 5); nr.w = o.x + o.w - nr.x; }

          if (hoverPage !== null && hoverPage !== d.pageIdx) {
            setDropTargetPageIdx(hoverPage);

          }

        if (d.aspectRatio) {

          updatePageObject(d.pageIdx, d.objId, {w: newW, h: Math.max(30, newH)});

        updatePageObject(d.pageIdx, d.objId, {tailWidth: newWidth});

        }

      dragRef.current = null;

    window.addEventListener('mouseup', onMouseUp);
    return () => {
      window.removeEventListener('mousemove', onMouseMove);
      window.removeEventListener('mouseup', onMouseUp);
      if (autoScrollTimerRef.current) cancelAnimationFrame(autoScrollTimerRef.current);

  // [WebtoonSFX] 붓글씨 스타일 SFX 프리셋 (CSS filter 기반)
  const SFX_PRESETS = {
