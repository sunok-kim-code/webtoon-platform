  // CSS filter 생성 함수 (붓글씨 효과음용)
  const getSfxCssFilter = (filterType, strokeColor, color) => {
    const filters = {
      'shake':   `drop-shadow(2px 2px 0 ${strokeColor})`,
      'motion':  `drop-shadow(4px 0 3px ${strokeColor}66)`,
      'glow':    `drop-shadow(0 0 8px ${color})`,
      'outline': `drop-shadow(3px 3px 0 ${strokeColor})`,
      '':        '',
    };
    return filters[filterType] || '';
  };
  const [sfxPanelOpen, setSfxPanelOpen] = useState(false);
  const [sfxPreset, setSfxPreset] = useState('impact');
  const [sfxText, setSfxText] = useState('쾅!');
  const [sfxColor, setSfxColor] = useState('#cc2200');
  const [sfxStroke, setSfxStroke] = useState('#5c0000');
  const [sfxFontSize, setSfxFontSize] = useState(48);
  const [sfxRotate, setSfxRotate] = useState(-5);
  const [sfxSkew, setSfxSkew] = useState(0);
  const sfxPanelRef = React.useRef(null);

  // [WebtoonSFX 추가] SFX 오브젝트를 현재 페이지에 추가
  const addSfxToPage = (overrideText) => {
    if (editorPages.length === 0) return;
    const pageIdx = Math.min(currentPageIdx, editorPages.length - 1);
    const preset = SFX_PRESETS[sfxPreset] || SFX_PRESETS.impact;
    const page = editorPages[pageIdx];
    if (!page || !page.objects) return;
    const pos = getInsertPosition();
    const text = (typeof overrideText === 'string' ? overrideText : '') || sfxText || preset.examples[0];
    const newSfx = {
      id: 'sfx_' + Date.now(), type: 'sfx',
      text: text,
      x: pos.x, y: pos.y,
      w: Math.max(120, text.length * sfxFontSize * 0.7),
      h: sfxFontSize * 1.6,
      fontSize: sfxFontSize,
      fontFamily: preset.fontFamily,
      color: sfxColor,
      stroke: sfxStroke,
      strokeWidth: preset.strokeWidth || 1.5,
      rotate: sfxRotate,
      skew: sfxSkew,
      filterType: preset.filterType || 'outline',
      presetKey: sfxPreset,
      zIndex: Math.max(...page.objects.map(o => o.zIndex || 1), 10) + 1
    };
    setEditorPages(prev => {
      const next = [...prev];
      const pi = Math.min(currentPageIdx, next.length - 1);
      if (!next[pi]) return prev;
      next[pi] = {...next[pi], objects: insertObjectAfterSelected(next[pi].objects || [], newSfx)};
      return next;
    });
    // [FigmaSync] 새 SFX를 Figma에 동기화
    figmaQueueSync('create', newSfx, pageIdx);
    setSfxPanelOpen(false);
  };

  // [WebtoonSFX 추가] 프리셋 선택 시 기본값 업데이트
  const selectSfxPreset = (key) => {
    const p = SFX_PRESETS[key];
    setSfxPreset(key);
    setSfxColor(p.color);
    setSfxStroke(p.stroke);
    setSfxRotate(p.rotate || 0);
    setSfxSkew(p.skew || 0);
    setSfxText(p.examples[0]);
  };

  // Initialize single long page from panels (no page splits, webtoon-style layout)
  const PANEL_GAP = 300; // Gap between panels
  const initEditorPages = async (overridePanels, overrideStoryboard) => {
    const validPanels = (overridePanels || panels).filter(Boolean);
    const effectiveSb = overrideStoryboard || storyboard;
    if (validPanels.length === 0) return [];
    const pageObj = {id:'p_'+Date.now(), width:PAGE_W, height:PAGE_H_MAX, objects:[]};
    let yPos = 0; // No top margin — panels start from top
    for (let i = 0; i < validPanels.length; i++) {
      const panelSrc = validPanels[i];
      console.log(`[initEditor] Panel ${i}: type=${typeof panelSrc}, len=${(panelSrc||'').length}, starts=${(panelSrc||'').substring(0,40)}`);
      // Full-width panel — no side margins
      const panelW = PAGE_W;
      let panelH = 960; // default 4:3 for 720px width
      try {
        const img = await loadImage(panelSrc);
        const ratio = img.height / img.width;
        panelH = Math.round(panelW * ratio);
        console.log(`[initEditor] Panel ${i}: measured ${img.width}x${img.height} → ${panelW}x${panelH}`);
      } catch(e) { console.warn('[initEditor] Failed to measure panel', i, ':', e.message); }

      const sbPanel = effectiveSb[i] || {};
      const dialogues = sbPanel.dialogue || [];
      const narrationText = sbPanel.narration || '';

      const ts = Date.now();
      const objId = 'obj_'+i+'_'+ts;
      pageObj.objects.push({
        id: objId, type: 'panel', src: panelSrc,
        x: 0, y: yPos, w: panelW, h: panelH,
        zIndex: 1, panelIndex: i
      });

      // Auto-add speech bubbles for dialogue lines (패널 상단부터 배치)
      let bubbleY = yPos + 20;
      const bubbleSpacing = 85;
      dialogues.forEach((d, di) => {
        const speakerText = d.speaker ? `${d.speaker}: ${d.text}` : d.text;
        const bw = Math.min(280, panelW * 0.6);
        const bh = 70;
        const bx = di % 2 === 0 ? panelW * 0.05 : panelW - bw - panelW * 0.05;
        pageObj.objects.push({
          id: 'b_'+i+'_d'+di+'_'+ts, type: 'bubble', bubbleStyle: 'speechWide',
          text: speakerText, x: bx, y: bubbleY,
          w: bw, h: bh, fontSize: 25,
          fontFamily: "'Noto Sans KR',sans-serif",
          tailPos: di % 2 === 0 ? 0.3 : 0.7, tailSize: 1.0,
          tailStyle: 'straight', textOffsetX: 0, textOffsetY: 0,
          zIndex: 10 + di
        });
        bubbleY += bubbleSpacing;
      });

      // Auto-add SFX from storyboard soundEffects
      const sfxList = sbPanel.soundEffects || [];
      sfxList.forEach((sfxTxt, si) => {
        if (!sfxTxt || !sfxTxt.trim()) return;
        let bestPreset = 'impact';
        for (const [key, preset] of Object.entries(SFX_PRESETS)) {
          if (preset.examples.some(ex => sfxTxt.includes(ex.replace('!','')) || ex.replace('!','').includes(sfxTxt.replace('!','')))) {
            bestPreset = key;
            break;
          }
        }
        const preset = SFX_PRESETS[bestPreset];
        const sfxFs = 42;
        const sfxW = Math.max(120, sfxTxt.length * sfxFs * 0.7);
        const sfxH = sfxFs * 1.6;
        const sfxX = panelW * (0.5 + (si % 2 === 0 ? 0.2 : -0.2)) - sfxW / 2;
        const sfxY = yPos + panelH * (0.2 + si * 0.15);
        pageObj.objects.push({
          id: 'sfx_'+i+'_s'+si+'_'+ts, type: 'sfx',
          text: sfxTxt, x: sfxX, y: sfxY,
          w: sfxW, h: sfxH, fontSize: sfxFs,
          fontFamily: preset.fontFamily,
          color: preset.color, stroke: preset.stroke,
          strokeWidth: preset.strokeWidth || 1.5,
          rotate: preset.rotate || 0,
          skew: preset.skew || 0,
          filterType: preset.filterType || 'outline',
          presetKey: bestPreset,
          zIndex: 8 + si
        });
      });

      yPos += panelH;

      // Auto-add narration box BETWEEN panels (in the gap area)
      if (narrationText) {
        const nw = Math.min(500, panelW * 0.85);
        const lineCount = Math.ceil(narrationText.length / 20);
        const nh = Math.max(50, lineCount * 36 + 20);
        const nx = (panelW - nw) / 2;
        const narrationGap = nh + 40; // total space: narration height + padding
        const actualGap = Math.max(PANEL_GAP, narrationGap);
        pageObj.objects.push({
          id: 'n_'+i+'_'+ts, type: 'bubble', bubbleStyle: 'narration',
          text: narrationText, x: nx, y: yPos + Math.round((actualGap - nh) / 2),
          w: nw, h: nh, fontSize: 28,
          fontFamily: "'Noto Sans KR',sans-serif",
          tailPos: 0.3, tailSize: 1.0,
          zIndex: 10 + dialogues.length
        });
        yPos += actualGap;
      } else {
        yPos += PANEL_GAP;
      }
    }
    // Set actual page height to fit all content
    pageObj.height = yPos > 0 ? yPos : PAGE_H_MAX;
    return [pageObj]; // Always single page
  };

  // Auto-compact: remove empty space between objects by collapsing gaps
  const compactEditorLayout = () => {
    setEditorPages(prev => {
      if (!prev.length || !prev[0]?.objects?.length) return prev;
      const page = {...prev[0]};
      const objects = [...page.objects];

      // Group objects by panel (panel + its associated bubbles/sfx at similar y)
      // Sort all objects by y position
      const sorted = [...objects].sort((a, b) => (a.y || 0) - (b.y || 0));
      if (sorted.length < 2) return prev;

      // Find panels and calculate their occupied ranges [top, bottom]
      const panels = sorted.filter(o => o.type === 'panel' || o.type === 'image');
      if (panels.length < 2) return prev;

      let totalShift = 0;
      let changed = false;

      for (let i = 1; i < panels.length; i++) {
        const prevPanel = panels[i - 1];
        const currPanel = panels[i];
        const prevBottom = prevPanel.y + prevPanel.h;

        // Find all objects between these two panels
        const objectsBetween = sorted.filter(o =>
          o.id !== currPanel.id && o.y >= prevBottom && o.y < currPanel.y
        );
        const actualBottom = objectsBetween.length > 0
          ? Math.max(prevBottom, ...objectsBetween.map(o => o.y + (o.h || 0)))
          : prevBottom;

        const gap = currPanel.y - actualBottom;
        const targetGap = PANEL_GAP;

        if (gap > targetGap + 50) { // Only compact if gap is significantly larger than target
          const shift = gap - targetGap;
          totalShift += shift;
          changed = true;

          // Shift this panel and all objects at or below it
          objects.forEach(o => {
            if (o.y >= currPanel.y) {
              o.y -= shift;
            }
          });
          // Update panels array reference for next iteration
          panels[i] = {...currPanel, y: currPanel.y - shift};
        }
      }

      if (!changed) return prev;

      // Recalculate page height
      let maxBottom = 0;
      objects.forEach(o => {
        const bottom = (o.y || 0) + (o.h || 0);
        if (bottom > maxBottom) maxBottom = bottom;
      });
      page.objects = objects;
      page.height = maxBottom + 20;

      log(`빈 공간 정리: ${Math.round(totalShift)}px 축소됨`, 'success');
      return [page];
    });
  };

  // Save editor layout to Firebase
  const [isSavingEditor, setIsSavingEditor] = useState(false);

  const saveEditorLayout = async (andClose) => {

    try {
      setIsSavingEditor(true);
      setSaveProgress('준비 중...');
      log(`${currentEpisode}화 에디터 배치 저장 중...`, 'info');
      // Use optimized incremental save (only writes changed images), queued to prevent concurrent writes
      _saveQueue = _saveQueue.then(() => fbSaveEditorOptimized(projectId, currentEpisode, editorPages, currentPageIdx, (done, total, msg) => {
        setSaveProgress(msg);
      })).catch(e => { console.error('[saveEditorLayout queued]', e); throw e; });
      await _saveQueue;
      setSaveProgress('');
      log(`✅ ${currentEpisode}화 에디터 배치 저장 완료!`, 'success');
      if (andClose) closeBubbleEditor();
    } catch(e) {
      console.error('[saveEditorLayout]', e);
      log('에디터 배치 저장 실패: ' + e.message, 'error');
    } finally {
      setIsSavingEditor(false);
      setSaveProgress('');
    }
  };

  // Load saved editor layout from Firebase
  const loadEditorLayout = async (overrideEpisode) => {
    const ep = overrideEpisode || currentEpisode;
    if (!projectId || !ep) return null;
    try {
      const data = await fbLoadPhase(projectId, ep, 'step5_editor');
      if (data && data.editorPages && data.editorPages.length > 0) {
        return data;
      }
    } catch(e) {
      console.warn('[loadEditorLayout] failed:', e.message);
    }
    return null;
  };

  const openBubbleEditor = async (directPanels, directEpisode, directStoryboard) => {
    // Use direct data if provided (bypasses React state timing issues), otherwise fall back to state
    const effectivePanels = (directPanels && directPanels.length > 0) ? directPanels : panels;
    const effectiveSb = (directStoryboard && directStoryboard.length > 0) ? directStoryboard : storyboard;
    const effectiveEpisode = directEpisode || currentEpisode;
    const validCount = effectivePanels.filter(Boolean).length;
    console.log('[BubbleEditor] openBubbleEditor called, episode:', effectiveEpisode, ', validPanels:', validCount, ', storyboard:', effectiveSb.length, ', directPanels:', !!directPanels);
    setBubbleEditorOpen(true);

    // Try loading saved layout for CURRENT episode from Firebase
    const saved = await loadEditorLayout(directEpisode);
    console.log('[BubbleEditor] loadEditorLayout result:', saved ? `${saved.editorPages?.length} pages` : 'null', ', episode:', currentEpisode);
    if (saved && saved.editorPages?.length > 0) {
      // Fix broken [img:] tokens — replace with actual panel data
      let unfixedCount = 0;
      const fixedPages = saved.editorPages.map(page => ({
        ...page,
        objects: (page.objects || []).map(obj => {
          if ((obj.type === 'panel' || obj.type === 'image') && (!obj.src || (typeof obj.src === 'string' && obj.src.startsWith('[img:')))) {
            // Try to restore from panels array using panelIndex (handles both [img:] tokens and null)
            const pi = obj.panelIndex;
            const actualSrc = (pi !== undefined && effectivePanels[pi]) ? effectivePanels[pi] : null;
            // Verify restored source is not itself an [img:] token
            if (actualSrc && !actualSrc.startsWith('[img:')) {
              console.log(`[BubbleEditor] Restored image token: ${obj.src || 'null'} → panels[${pi}]`);
              return {...obj, src: actualSrc};
            } else if (obj.src && obj.src.startsWith('[img:')) {
              unfixedCount++;
              console.warn(`[BubbleEditor] Could not restore image token: ${obj.src} (panelIndex: ${pi})`);
              return obj;
            } else {
              return obj; // src가 null이고 panelIndex도 없는 경우 그대로
            }
          }
          return obj;
        })
      }));
      if (unfixedCount > 0) {
        log(`⚠ ${unfixedCount}개 이미지 토큰 복원 실패 — 패널 데이터를 다시 불러와주세요`, 'error');
      }
      setEditorPages(fixedPages);
      setCurrentPageIdx(saved.currentPageIdx || 0);
      // Build fingerprints from loaded data for incremental save optimization
      _editorSavedFingerprints = {};
      fixedPages.forEach((page, pi) => {
        (page.objects || []).forEach((obj, oi) => {
          if (obj.src && typeof obj.src === 'string' && obj.src.startsWith('data:') && obj.src.length > 500) {
            _editorSavedFingerprints[`ep${pi}_o${oi}`] = imgFingerprint(obj.src);
          }
        });
      });
      console.log(`[BubbleEditor] 이미지 핑거프린트 ${Object.keys(_editorSavedFingerprints).length}개 초기화`);
      log(`${effectiveEpisode}화 저장된 배치 불러옴: ${saved.editorPages.length}페이지`, 'success');
    } else if (validCount > 0) {
      // No saved layout — initialize from current panels + storyboard (pass directly to bypass state timing)
      log(`${effectiveEpisode}화 에디터 초기화 중... 패널 크기 측정 (스토리보드 ${effectiveSb.length}개)`, 'info');
      const newPages = await initEditorPages(effectivePanels, effectiveSb);
      setEditorPages(newPages);
      // New pages — no saved fingerprints yet
      _editorSavedFingerprints = {};
      log(`${effectiveEpisode}화 에디터 준비 완료: ${newPages.length}페이지, ${validCount}개 패널`, 'success');
    } else {
      // No panels at all — empty editor
      log(`${effectiveEpisode}화 패널 없음 — 빈 에디터`, 'info');
      setEditorPages([{id:'p_'+Date.now(), width:PAGE_W, height:PAGE_H_MAX, objects:[]}]);
      _editorSavedFingerprints = {};
    }
    if (!saved) setCurrentPageIdx(0);
    if (!Array.isArray(bubbleOverlays)) setBubbleOverlays([]);
    // 첫 번째 페이지의 첫 패널을 자동 선택 (state 대신 로컬 데이터 사용)
    setTimeout(() => {
      setEditorPages(prev => {
        const fp = prev?.[0];
        const panel = fp?.objects?.find(o => o.type === 'panel' && !o.hidden);
        if (panel) { setSelectedObjectId(panel.id); setSelectedObjectType('panel'); }
        return prev;
      });
    }, 50);
  };

  const closeBubbleEditor = () => {
    console.log('[BubbleEditor] closing editor');
    setBubbleEditorOpen(false);
    setEditorPages([]);
    setCurrentPageIdx(0);
    setEditorLanguage('ko');
    _editorSavedFingerprints = {}; // Clear fingerprints on close
  };

  // ======== Figma Sync Module (Firestore 기반 — 서버 불필요) ========
  // Firestore 컬렉션을 실시간 통신 채널로 사용:
  //   webtoon_projects/{projectId}/figma_sync/queue    ← 웹앱이 쓰기
  //   webtoon_projects/{projectId}/figma_sync/status   ← 플러그인이 쓰기 (응답)
  // Figma 플러그인은 queue 문서를 onSnapshot으로 감시하여 노드 생성/업데이트
  const [figmaSyncEnabled, setFigmaSyncEnabled] = useState(false);
  const [figmaConnected, setFigmaConnected] = useState(false);
  const [figmaSyncStatus, setFigmaSyncStatus] = useState('idle'); // idle|syncing|error
  const [figmaProgress, setFigmaProgress] = useState(null);
  const figmaSyncQueueRef = React.useRef([]);
  const figmaDebounceRef = React.useRef(null);
  const figmaUnsubRef = React.useRef(null); // Firestore listener unsubscribe

  // Firestore 실시간 리스너 — 플러그인의 응답(status) 감시
  React.useEffect(() => {
    if (!figmaSyncEnabled || !bubbleEditorOpen || !projectId) {
      if (figmaUnsubRef.current) { figmaUnsubRef.current(); figmaUnsubRef.current = null; }
      setFigmaConnected(false);
      return;
    }
    const db = getDb();
    if (!db) return;
    // status 문서를 실시간 감시 — 플러그인이 연결되면 여기에 heartbeat를 씀
    const statusRef = db.collection('webtoon_projects').doc(projectId).collection('figma_sync').doc('status');
    const unsub = statusRef.onSnapshot(snap => {
      if (!snap.exists) { setFigmaConnected(false); return; }
      const data = snap.data();
      const isAlive = data.lastHeartbeat && (Date.now() - data.lastHeartbeat.toMillis() < 30000);
      setFigmaConnected(isAlive);
      if (data.syncResult === 'ok') { setFigmaSyncStatus('idle'); setFigmaProgress(null); }
      else if (data.syncResult === 'error') { setFigmaSyncStatus('error'); }
      if (data.progress) { setFigmaProgress(data.progress); }
      if (data.message) { log(data.message, data.syncResult === 'error' ? 'error' : 'success'); }
    }, err => { console.warn('[FigmaSync] status listener error:', err); });
    figmaUnsubRef.current = unsub;
    console.log('[FigmaSync] Firestore 리스너 시작, projectId:', projectId);
    return () => { unsub(); figmaUnsubRef.current = null; };
  }, [figmaSyncEnabled, bubbleEditorOpen, projectId]);

  // Firebase Storage에 base64 이미지 업로드 → 다운로드 URL 반환
  const uploadImageToStorage = async (base64Data, imagePath) => {
    try {
      const storage = firebase.storage();
      const ref = storage.ref().child(imagePath);
      let raw = base64Data;
      let contentType = 'image/png';

      // blob: URL이나 http(s): URL은 base64가 아님 → fetch로 변환
      if (raw.indexOf('blob:') === 0 || (raw.indexOf('http') === 0 && raw.indexOf('data:') !== 0)) {
        try {
          const resp = await fetch(raw);
          const blob = await resp.blob();
          contentType = blob.type || 'image/png';
          await ref.put(blob, { contentType });
          const url = await ref.getDownloadURL();
          console.log('[FigmaSync] 이미지 업로드 완료 (URL→blob):', imagePath);
          return url;
        } catch(fetchErr) {
          console.warn('[FigmaSync] URL fetch 실패:', raw.substring(0, 60), fetchErr);
          return null;
        }
      }

      // data: URI 접두사 분리
      if (raw.indexOf('data:') === 0) {
        const commaIdx = raw.indexOf(',');
        if (commaIdx > 0) {
          const header = raw.substring(0, commaIdx);
          const typeMatch = header.match(/data:([^;]+)/);
          if (typeMatch) contentType = typeMatch[1];
          raw = raw.substring(commaIdx + 1);
        }
      }

      // 공백/줄바꿈 제거
      raw = raw.replace(/\s/g, '');

      // base64 유효성 검사
      if (!raw || raw.length < 10 || !/^[A-Za-z0-9+/=]+$/.test(raw.substring(0, 100))) {
        console.warn('[FigmaSync] 유효하지 않은 base64 데이터, 건너뜀:', raw.substring(0, 60));
        return null;
      }

      const byteChars = atob(raw);
      const byteArr = new Uint8Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) byteArr[i] = byteChars.charCodeAt(i);
      await ref.put(byteArr, { contentType });
      const url = await ref.getDownloadURL();
      console.log('[FigmaSync] 이미지 업로드 완료:', imagePath);
      return url;
    } catch(e) { console.warn('[FigmaSync] Storage 업로드 실패:', e); return null; }
  };

  // 단일 이미지 데이터를 Storage에 업로드하고 URL로 교체
  const processOneImage = async (imgData, index) => {
    if (!imgData || !imgData.base64 || imgData.base64.length <= 10) return null;
    const path = 'figma_sync/' + projectId + '/img_' + (imgData.id || index) + '_' + Date.now() + '.png';
    const url = await uploadImageToStorage(imgData.base64, path);
    if (url) {
      return { id: imgData.id, pageIndex: imgData.pageIndex, base64: '', storageUrl: url, bounds: imgData.bounds };
    }
    return null;
  };

  // payload 내 모든 이미지를 Storage에 업로드하고 URL로 교체
  const processPayloadForFirestore = async (obj) => {
    if (!obj) return obj;
    const clone = JSON.parse(JSON.stringify(obj)); // undefined 제거
    // images 배열 처리 (새 형식)
    if (clone.images && Array.isArray(clone.images)) {
      const processed = [];
      for (let i = 0; i < clone.images.length; i++) {
        const result = await processOneImage(clone.images[i], i);
        if (result) processed.push(result);
      }
      clone.images = processed;
      console.log('[FigmaSync] 이미지 ' + processed.length + '장 업로드 완료');
    }
    // 하위 호환: 단일 image 필드
    if (clone.image && clone.image.base64 && clone.image.base64.length > 10) {
      const result = await processOneImage(clone.image, 0);
      if (result) clone.image = result;
      else delete clone.image;
    } else if (clone.image) {
      delete clone.image;
    }
    // base64 직접 필드 (UPDATE_IMAGE 타입)
    if (clone.base64 && clone.base64.length > 10) {
      const path = 'figma_sync/' + projectId + '/img_' + (clone.id || 'unknown') + '_' + Date.now() + '.png';
      const url = await uploadImageToStorage(clone.base64, path);
      if (url) { clone.base64 = ''; clone.storageUrl = url; }
      else { delete clone.base64; }
    }
    return clone;
  };

  // Figma로 메시지 전송 — 이미지는 Storage 경유, 텍스트는 Firestore
  const figmaSend = async (msg) => {
    const db = getDb();
    if (!db || !projectId) return;
    try {
      const queueRef = db.collection('webtoon_projects').doc(projectId).collection('figma_sync').doc('queue');
      let payload = msg.payload;
      if (Array.isArray(payload)) {
        payload = [];
        for (let i = 0; i < msg.payload.length; i++) {
          payload.push(await processPayloadForFirestore(msg.payload[i]));
        }
      } else if (payload && typeof payload === 'object') {
        payload = await processPayloadForFirestore(payload);
      }
      const safe = { type: msg.type, payload: payload, sentAt: firebase.firestore.FieldValue.serverTimestamp(), messageId: 'msg_' + Date.now() + '_' + Math.random().toString(36).substring(2, 8) };
      await queueRef.set(safe);
      console.log('[FigmaSync] 전송 성공:', safe.type);
    } catch(e) { console.warn('[FigmaSync] Firestore write error:', e); }
  };

  // 버블/오브젝트 데이터를 Figma 형식으로 변환
  const mapObjectToFigma = (obj, pageIndex) => {
    // CSS 폰트명 → Figma 폰트명 변환: "'Nanum Brush Script',cursive" → "Nanum Brush Script"
    const cleanFont = (f) => f ? f.split(',')[0].replace(/'/g, '').trim() : undefined;

    if (obj.type === 'bubble') {
      const bs = obj.bubbleStyle || 'speech';
      const bt = BUBBLE_TYPES[bs] || BUBBLE_TYPES.speech;
      // narration 스타일은 narration 타입으로 분류
      const figmaType = bs === 'narration' ? 'narration' : 'dialogue';
      // SVG path 기반 말풍선이면 path 데이터 생성
      var svgPathData = null;
      if (bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon]) {
        const sb = SVG_BALLOONS[bt.svgBalloon];
        const isFlipped = obj.flipBalloon || 'default';
        const bStrokeW = obj.strokeWidth != null ? obj.strokeWidth : (bt.borderWidth || 2.5);
        const bStrokeC = obj.strokeColor || bt.border || '#333';
        const bFillC = obj.fillColor || bt.bg || '#fff';
        const pathD = sb.path(bStrokeW, bStrokeC, bFillC, isFlipped);
        const pad = obj.bubblePadding != null ? obj.bubblePadding : (bt.defaultPadding || 0);
        const vbParts = sb.viewBox.split(' ').map(Number);
        const inset = pad * Math.max(vbParts[2], vbParts[3]) / 100;
        svgPathData = {
          pathD: pathD,
          viewBox: sb.viewBox,
          vbX: vbParts[0] + inset,
          vbY: vbParts[1] + inset,
          vbW: vbParts[2] - inset * 2,
          vbH: vbParts[3] - inset * 2,
          fillColor: bFillC,
          strokeColor: bStrokeC,
          strokeWidth: bStrokeW,
        };
      }
      return {
        id: obj.id, type: figmaType, text: obj.text || '',
        bubbleStyle: bs,
        svgPath: svgPathData,
        position: { x: obj.x || 0, y: obj.y || 0 },
        size: { w: obj.w || 200, h: obj.h || 100 },
        style: {
          fontSize: obj.fontSize || 14, fontFamily: cleanFont(obj.fontFamily),
          color: obj.fillColor === '#fff' ? '#000000' : (obj.strokeColor || bt.color || '#000000'),
          bgColor: bt.bg || '#fff',
          borderColor: bt.border || '#333',
          borderWidth: bt.borderWidth || 2,
          radius: bt.radius || 0,
          isEllipse: !!bt.ellipse,
          isBox: !!bt.boxShape,
          isDashed: !!bt.dashed,
          isConcentration: !!bt.concentrationLines,
          concentrationColor: obj.concentrationColor || bt.border || '#000',
          concentrationPadding: obj.concentrationPadding || 0,
          concentrationOuterMargin: obj.concentrationOuterMargin || 0,
          rotation: 0,
        },
        pageIndex, objectIndex: 0,
      };
    } else if (obj.type === 'sfx') {
      return {
        id: obj.id, type: 'sfx', text: obj.text || '',
        position: { x: obj.x || 0, y: obj.y || 0 },
        size: { w: obj.w || 150, h: obj.h || 60 },
        style: { fontSize: obj.fontSize || 32, fontFamily: cleanFont(obj.fontFamily) || 'Nanum Brush Script', color: obj.color || '#ff6b6b', rotation: obj.rotate || 0, strokeColor: obj.stroke, strokeWidth: obj.strokeWidth || 1.5, fontWeight: 900, skewX: obj.skew || 0 },
        pageIndex, objectIndex: 0,
      };
    } else if (obj.type === 'panel' || obj.type === 'image') {
      return {
        id: obj.id, type: 'image', pageIndex,
        base64: obj.src || '',
        bounds: { x: obj.x || 0, y: obj.y || 0, w: obj.w || 800, h: obj.h || 600 },
      };
    }
    return null;
  };

  // 개별 오브젝트 변경 시 디바운스 동기화
  const figmaQueueSync = (action, obj, pageIndex) => {
    if (!figmaSyncEnabled || !figmaConnected) return;
    const mapped = mapObjectToFigma(obj, pageIndex);
    if (!mapped) return;
    const q = figmaSyncQueueRef.current;
    const idx = q.findIndex(e => e.payload?.id === mapped.id);
    const msgType = mapped.type === 'image' ? 'UPDATE_IMAGE'
      : action === 'create' ? 'ADD_BUBBLE'
      : action === 'delete' ? 'DELETE_BUBBLE'
      : 'UPDATE_BUBBLE';
    const event = { type: msgType, payload: action === 'delete' ? { id: mapped.id, pageIndex } : mapped };
    if (idx >= 0) q[idx] = event; else q.push(event);
    clearTimeout(figmaDebounceRef.current);
    figmaDebounceRef.current = setTimeout(() => {
      const batch = [...figmaSyncQueueRef.current];
      figmaSyncQueueRef.current = [];
      batch.forEach(e => figmaSend(e));
    }, 500);
  };

  // 페이지의 실제 컨텐츠 크기 계산 (모든 오브젝트의 바운딩 박스)
  const getPageContentSize = (page) => {
    const objs = page.objects || [];
    if (objs.length === 0) return { w: PAGE_W, h: 1200 };
    let maxX = PAGE_W, maxY = 0;
    objs.forEach(o => {
      const right = (o.x || 0) + (o.w || 0);
      const bottom = (o.y || 0) + (o.h || 0);
      if (right > maxX) maxX = right;
      if (bottom > maxY) maxY = bottom;
    });
    return { w: Math.max(PAGE_W, maxX), h: Math.max(400, maxY + 50) };
  };

  // 페이지의 이미지 목록을 Figma 형식으로 변환
  const getPageImages = (page, pageIndex) => {
    return (page.objects || [])
      .filter(o => (o.type === 'panel' || o.type === 'image') && o.src && !o.hidden)
      .map(img => ({
        id: img.id, pageIndex: pageIndex,
        base64: img.src || '',
        bounds: { x: img.x || 0, y: img.y || 0, w: img.w || 800, h: img.h || 600 },
      }));
  };

  // 전체 에피소드를 Figma에 일괄 전송
  const figmaSyncFullEpisode = () => {
    if (!figmaSyncEnabled) { log('Figma Sync를 먼저 켜주세요.', 'error'); return; }
    setFigmaSyncStatus('syncing');
    const pages = editorPages.map((page, pi) => {
      const bubbles = (page.objects || []).filter(o => o.type === 'bubble' || o.type === 'sfx').map(o => mapObjectToFigma(o, pi)).filter(Boolean);
      const images = getPageImages(page, pi);
      const pageSize = getPageContentSize(page);
      return { pageIndex: pi, episodeNum: currentEpisode || 1, images: images, bubbles, pageSize };
    });
    figmaSend({ type: 'BATCH_SYNC', payload: pages });
    log(`Figma로 ${pages.length}페이지 전송 시작...`, 'info');
  };

  // 현재 페이지만 Figma에 전송
  const figmaSyncCurrentPage = () => {
    if (!figmaSyncEnabled) { log('Figma Sync를 먼저 켜주세요.', 'error'); return; }
    setFigmaSyncStatus('syncing');
    const pi = currentPageIdx;
    const page = editorPages[pi];
    if (!page) return;
    const bubbles = (page.objects || []).filter(o => o.type === 'bubble' || o.type === 'sfx').map(o => mapObjectToFigma(o, pi)).filter(Boolean);
    const images = getPageImages(page, pi);
    const pageSize = getPageContentSize(page);
    figmaSend({ type: 'SYNC_PAGE', payload: { pageIndex: pi, episodeNum: currentEpisode || 1, images: images, bubbles, pageSize }});
    log(`Figma로 페이지 ${pi + 1} 전송 중 (이미지 ${images.length}장)...`, 'info');
  };

  // ======== Batch Translation (Gemini) ========
  const translateAllTexts = async () => {
    if (isTranslating) return;
    if (!hasGeminiKey()) { log('Vertex AI / Gemini API 키를 먼저 설정해주세요.', 'error'); return; }

    // Collect all text objects across all pages
    const textItems = [];
    editorPages.forEach((page, pi) => {
      (page.objects || []).forEach(obj => {
        if ((obj.type === 'bubble' || obj.type === 'sfx') && obj.text && obj.text.trim()) {
          const bt = obj.type === 'bubble' ? (BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech) : null;
          const label = obj.type === 'sfx' ? '효과음' : (bt?.name || '말풍선');
          textItems.push({ pageIdx: pi, objId: obj.id, text: obj.text, type: obj.type, label });
        }
      });
    });

    if (textItems.length === 0) { log('번역할 텍스트가 없습니다.', 'info'); return; }

    setIsTranslating(true);
    log(`${textItems.length}개 텍스트 일본어 번역 중...`, 'info');

    try {
      // Build structured prompt for context-aware translation
      const textList = textItems.map((item, i) => `[${i}] (${item.label}) ${item.text}`).join('\n');
      const systemPrompt = `You are a professional Korean-to-Japanese webtoon translator. Translate the following Korean webtoon texts to natural Japanese.

Rules:
- For speech bubbles (말풍선, 나레이션, etc.): translate naturally as manga dialogue
- For sound effects (효과음/SFX): translate to common Japanese manga onomatopoeia (e.g., 쾅→ドカーン, 두근두근→ドキドキ, 콰광→ズドーン, 슈우→シュウ, 펑→バーン, 쿵→ドスン, 짠→ジャーン)
- Keep the tone and emotion of the original text
- Return ONLY a JSON array of translated strings in the same order, no explanation
- Example output: ["こんにちは", "ドキドキ", "何を言ってるの？"]`;

      const userPrompt = `Translate these ${textItems.length} Korean webtoon texts to Japanese:\n\n${textList}\n\nReturn ONLY a JSON array of ${textItems.length} translated strings.`;

      const result = await callGemini(systemPrompt, userPrompt, { temperature: 0.3, maxTokens: 4096 });

      // Parse JSON array from response
      const jsonMatch = result.match(/\[[\s\S]*\]/);
      if (!jsonMatch) throw new Error('번역 결과를 파싱할 수 없습니다.');
      const translations = JSON.parse(jsonMatch[0]);

      if (translations.length !== textItems.length) {
        console.warn(`[translate] Expected ${textItems.length} translations, got ${translations.length}`);
      }

      // Apply translations to editor pages
      setEditorPages(prev => {
        const next = prev.map(page => ({...page, objects: page.objects.map(o => ({...o}))}));
        textItems.forEach((item, i) => {
          if (i < translations.length && translations[i]) {
            const page = next[item.pageIdx];
            if (page) {
              const obj = page.objects.find(o => o.id === item.objId);
              if (obj) {
                obj.translations = { ...(obj.translations || {}), ja: translations[i] };
                // Set default JP font if not already set
                if (!obj.fontFamilyJa) {
                  if (item.type === 'sfx') {
                    obj.fontFamilyJa = "'Mochiy Pop One',sans-serif";
                  } else {
                    const bt = BUBBLE_TYPES[obj.bubbleStyle];
                    if (bt && (bt.name === '나레이션' || bt.plainText)) {
                      obj.fontFamilyJa = "'Shippori Mincho',serif";
                    } else {
                      obj.fontFamilyJa = "'Noto Sans JP',sans-serif";
                    }
                  }
                }
              }
            }
          }
        });
        return next;
      });

      setEditorLanguage('ja');
      log(`✓ ${translations.length}개 텍스트 일본어 번역 완료!`, 'success');
    } catch(e) {
      console.error('[translate]', e);
      log('번역 실패: ' + e.message, 'error');
    } finally {
      setIsTranslating(false);
    }
  };

  const addPage = () => {
    const newPage = {
      id: 'p_' + Date.now(),
      width: PAGE_W,
      height: PAGE_H,
      objects: []
    };
    setEditorPages(prev => [...prev, newPage]);
    setCurrentPageIdx(editorPages.length);
  };

  const deletePage = (idx) => {
    if (editorPages.length <= 1) {
      log('최소 1개 페이지는 필요합니다.', 'error');
      return;
    }
    if (confirm(`페이지 ${idx + 1}을 삭제하시겠습니까?`)) {
      setEditorPages(prev => prev.filter((_, i) => i !== idx));
      if (currentPageIdx >= idx) setCurrentPageIdx(Math.max(0, currentPageIdx - 1));
      log(`페이지 ${idx + 1} 삭제됨`);
    }
  };

  const addBubbleToPage = (bubbleStyle) => {
    console.log('[addBubble] bubbleStyle:', bubbleStyle, 'editorPages:', editorPages.length, 'currentPageIdx:', currentPageIdx);
    if (editorPages.length === 0) { console.warn('[addBubble] editorPages is empty!'); return; }
    const pageIdx = Math.min(currentPageIdx, editorPages.length - 1);
    const bt = BUBBLE_TYPES[bubbleStyle] || BUBBLE_TYPES.speech;
    console.log('[addBubble] bt:', bt.name, 'svgBalloon:', bt.svgBalloon, 'hasSVG:', !!(bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon]));
    const page = editorPages[pageIdx];
    if (!page || !page.objects) return;
    const pos = getInsertPosition();
    // Set default size from svgBalloon or fallback
    const sb = bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon];
    const defW = sb ? sb.baseW : (bubbleStyle === 'narration' ? 400 : 180);
    const defH = sb ? sb.baseH : (bubbleStyle === 'narration' ? 50 : 80);
    const newBubble = {
      id: 'b_' + Date.now(), type: 'bubble', bubbleStyle, text: '',
      x: pos.x, y: pos.y,
      w: defW, h: defH,
      fontSize: 25,
      fontWeight: bt.fontWeight || 500,
      fontFamily: "'Noto Sans KR',sans-serif",
      strokeWidth: bt.borderWidth || 2.5,
      strokeColor: bt.border || '#333',
      fillColor: bt.bg || '#fff',
      tailPos: 0.3,
      tailSize: 1.0,
      tailStyle: bt.defaultTailStyle || 'normal',
      textOffsetX: 0, textOffsetY: 0,
      flipBalloon: 'default',
      zIndex: Math.max(...page.objects.map(o => o.zIndex || 1), 10) + 1
    };
    setEditorPages(prev => {
      const next = [...prev];
      const pi = Math.min(currentPageIdx, next.length - 1);
      if (!next[pi]) return prev;
      next[pi] = {...next[pi], objects: insertObjectAfterSelected(next[pi].objects || [], newBubble)};
      return next;
    });
    // [FigmaSync] 새 말풍선을 Figma에 동기화
    figmaQueueSync('create', newBubble, pageIdx);
  };

  const addImageToPage = async (dataUrl) => {
    if (editorPages.length === 0) return;
    // Measure image to preserve aspect ratio
    let imgW = 300, imgH = 300;
    try {
      const img = await loadImage(dataUrl);
      const ratio = img.height / img.width;
      imgW = Math.min(img.width, PAGE_W - 40);
      imgH = Math.round(imgW * ratio);
    } catch(e) {}
    setEditorPages(prev => {
      const pi = Math.min(currentPageIdx, prev.length - 1);
      const page = prev[pi];
      if (!page || !page.objects) return prev;
      const pos = getInsertPosition();
      const newImage = {
        id: 'img_' + Date.now(), type: 'image', src: dataUrl, x: pos.x, y: pos.y, w: imgW, h: imgH,
        zIndex: Math.max(...page.objects.map(o => o.zIndex || 1), 5) + 1
      };
      const next = [...prev];
      next[pi] = {...next[pi], objects: insertObjectAfterSelected(next[pi].objects || [], newImage)};
      return next;
    });
    log('이미지가 현재 페이지에 추가되었습니다.', 'success');
  };

  // 선택된 객체 바로 뒤에 새 객체를 삽입하는 헬퍼
  const insertObjectAfterSelected = (objects, newObj) => {
    if (!selectedObjectId) return [...objects, newObj];
    const idx = objects.findIndex(o => o.id === selectedObjectId);
    if (idx === -1) return [...objects, newObj];
    const result = [...objects];
    result.splice(idx + 1, 0, newObj);
    return result;
  };

  const updatePageObject = (pageIdx, objId, updates) => {
    setEditorPages(prev => {
      const next = [...prev];
      next[pageIdx] = {
        ...next[pageIdx],
        objects: next[pageIdx].objects.map(o => o.id === objId ? {...o, ...updates} : o)
      };
      // [FigmaSync] 변경된 오브젝트를 Figma에 동기화
      const updatedObj = next[pageIdx].objects.find(o => o.id === objId);
      if (updatedObj) figmaQueueSync('update', updatedObj, pageIdx);
      return next;
    });
  };

  const deletePageObject = (pageIdx, objId) => {
    // [FigmaSync] 삭제 전에 오브젝트 정보 저장
    const deletingObj = editorPages[pageIdx]?.objects?.find(o => o.id === objId);
    setEditorPages(prev => {
      const next = [...prev];
      const obj = next[pageIdx].objects.find(o => o.id === objId);
      // 패널/이미지는 실제 삭제 대신 hidden 토글 (리스트에서 복원 가능)
      if (obj && (obj.type === 'panel' || obj.type === 'image')) {
        next[pageIdx] = {
          ...next[pageIdx],
          objects: next[pageIdx].objects.map(o => o.id === objId ? {...o, hidden: !o.hidden} : o)
        };
      } else {
        // 말풍선/SFX 등은 기존대로 실제 삭제
        next[pageIdx] = {
          ...next[pageIdx],
          objects: next[pageIdx].objects.filter(o => o.id !== objId)
        };
        // [FigmaSync] 실제 삭제된 경우만 Figma에서도 삭제
        if (deletingObj) figmaQueueSync('delete', deletingObj, pageIdx);
      }
      return next;
    });
    if (selectedObjectId === objId) setSelectedObjectId(null);
  };

  // Cross-page: move object from one page to another
  const moveObjectToPage = (fromPageIdx, objId, toPageIdx) => {
    setEditorPages(prev => {
      const next = [...prev];
      const fromPage = next[fromPageIdx];
      const obj = fromPage.objects.find(o => o.id === objId);
      if (!obj) return prev;
      next[fromPageIdx] = {...fromPage, objects: fromPage.objects.filter(o => o.id !== objId)};
      const movedObj = {...obj, y: 20}; // Reset y near top of target page
      next[toPageIdx] = {...next[toPageIdx], objects: [...next[toPageIdx].objects, movedObj]};
      return next;
    });
    setCurrentPageIdx(toPageIdx);
    log(`객체를 페이지 ${fromPageIdx+1} → ${toPageIdx+1}로 이동`, 'info');
  };

  // ---- Crop functions ----
  const startCrop = (pageIdx, objId) => {
    const page = editorPages[pageIdx];
    const obj = page?.objects?.find(o => o.id === objId);
    if (!obj) return;
    // Initialize crop rect from existing crop or full image
    const existing = obj.crop; // {x, y, w, h} in percent 0-100
    setCropMode({pageIdx, objId});
    setCropRect(existing || {x: 10, y: 10, w: 80, h: 80});
  };

  const applyCrop = () => {
    if (!cropMode || !cropRect) return;
    const {pageIdx, objId} = cropMode;
    updatePageObject(pageIdx, objId, {crop: {...cropRect}});
    setCropMode(null);
    setCropRect(null);
    log('이미지 잘라내기 적용됨', 'success');
  };

  const cancelCrop = () => {
    setCropMode(null);
    setCropRect(null);
  };

  const resetCrop = (pageIdx, objId) => {
    updatePageObject(pageIdx, objId, {crop: null});
    setCropMode(null);
    setCropRect(null);
    log('잘라내기 초기화됨', 'info');
  };

  // Detect which page the mouse is over for cross-page drop
  // Also handles gaps between pages by finding the nearest page vertically
  const detectDropPage = (d) => {
    if (!editorCanvasRef.current) return null;
    const pageDivs = editorCanvasRef.current.querySelectorAll('.be-page-canvas');
    const mouseY = d.lastClientY || d.startY;
    const mouseX = d.lastClientX || d.startX;
    let closestPage = null;
    let closestDist = Infinity;
    for (let i = 0; i < pageDivs.length; i++) {
      const rect = pageDivs[i].getBoundingClientRect();
      // Exact hit — mouse is inside this page canvas
      if (mouseY >= rect.top && mouseY <= rect.bottom && mouseX >= rect.left && mouseX <= rect.right) {
        return i;
      }
      // Track closest page by vertical distance (for gap handling)
      const distY = mouseY < rect.top ? rect.top - mouseY : mouseY > rect.bottom ? mouseY - rect.bottom : 0;
      const distX = mouseX < rect.left ? rect.left - mouseX : mouseX > rect.right ? mouseX - rect.right : 0;
      const dist = Math.sqrt(distX * distX + distY * distY);
      if (dist < closestDist && dist < 80) { // within 80px tolerance
        closestDist = dist;
        closestPage = i;
      }
    }
    return closestPage;
  };

  // Get position near currently selected object (for adding new items nearby)
  const getInsertPosition = () => {
    const page = editorPages[currentPageIdx];
    if (!page?.objects) return {x: 100, y: 30};
    const scale = editorPanelScale / 100;

    // 1) 선택된 패널 이미지의 상단에 배치
    const sel = selectedObjectId && page.objects.find(o => o.id === selectedObjectId);
    if (sel && (sel.type === 'panel' || sel.type === 'image')) {
      return {x: sel.x + sel.w / 2 - 100, y: sel.y + 20};
    }

    // 2) 스크롤 위치 기반으로 가장 가까운(화면에 보이는) 패널 찾기
    const panels = page.objects.filter(o => (o.type === 'panel' || o.type === 'image') && !o.hidden);
    if (panels.length > 0 && editorCanvasRef.current) {
      const container = editorCanvasRef.current;
      const scrollTop = container.scrollTop;
      const viewCenter = scrollTop + container.clientHeight / 2; // 화면 중앙의 스크롤 위치
      let closest = panels[0];
      let minDist = Infinity;
      panels.forEach(p => {
        const panelCenter = (p.y + p.h / 2) * scale;
        const dist = Math.abs(panelCenter - viewCenter);
        if (dist < minDist) { minDist = dist; closest = p; }
      });
      return {x: closest.x + closest.w / 2 - 100, y: closest.y + 20};
    }

    // 3) 패널이 없으면 기본 위치
    return {x: 100, y: 30};
  };

  const handleImageFileInsert = (e) => {
    const file = e.target.files?.[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      addImageToPage(ev.target.result);
    };
    reader.readAsDataURL(file);
    e.target.value = '';
  };

  // ── Shared helpers ──
  const loadImage = (src) => new Promise((res, rej) => {
    const im = new Image();
    im.crossOrigin = 'anonymous';
    im.onload = () => res(im);
    im.onerror = () => {
      // Retry without crossOrigin for external URLs (CORS may block anonymous)
      const im2 = new Image();
      im2.onload = () => res(im2);
      im2.onerror = rej;
      im2.src = src;
    };
    im.src = src;
  });

  // Convert external URL image to base64 data URI via proxy
  const urlToBase64 = async (url) => {
    if (!url || !url.startsWith('http') || url.startsWith('data:')) return url;
    try {
      const resp = await fetch('/api/proxy-image?url=' + encodeURIComponent(url));
      const data = await resp.json();
      if (data.dataUri) return data.dataUri;
    } catch(e) { console.warn('[urlToBase64] proxy failed:', e.message); }
    return url; // fallback to original URL
  };

  const downloadDataUrl = async (dataUrl, filename) => {
    try {
      let blobUrl;
      if (dataUrl.startsWith('data:')) {
        // data URI → blob
        const res = await fetch(dataUrl);
        const blob = await res.blob();
        blobUrl = URL.createObjectURL(blob);
      } else if (dataUrl.startsWith('http')) {
        // External URL → proxy → blob
        try {
          const proxyResp = await fetch('/api/proxy-image?url=' + encodeURIComponent(dataUrl));
          const proxyData = await proxyResp.json();
          if (proxyData.dataUri) {
            const res = await fetch(proxyData.dataUri);
            const blob = await res.blob();
            blobUrl = URL.createObjectURL(blob);
          }
        } catch(e) {
          // Direct fetch fallback
          const res = await fetch(dataUrl);
          const blob = await res.blob();
          blobUrl = URL.createObjectURL(blob);
        }
      }
      if (!blobUrl) blobUrl = dataUrl;
      const a = document.createElement('a');
      a.href = blobUrl;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      if (blobUrl.startsWith('blob:')) setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
    } catch(e) {
      console.warn('Download failed, opening in new tab:', e.message);
      window.open(dataUrl, '_blank');
    }
  };

  // Generate a unified bubble+tail SVG path with variable roundness and tail style.
  // roundness: 0 = sharp rectangle, 50 = rounded rect, 100 = full ellipse (default)
  // tailStyle: 'normal' (bezier curve), 'straight' (pointy lines), 'round' (bulbous round)
  const buildBubblePath = (cx, cy, rx, ry, tailPos, tailLen, tailWid, bubbleW, bubbleH, scale, roundness, tailStyle) => {
    const rn = roundness ?? 100;
    const ts = tailStyle || 'normal';
    const tw = 12 * tailWid * scale;
    const th = 18 * tailLen * scale;
    const tailBaseX = bubbleW * tailPos;
    const tailTipX = tailBaseX;
    const tailTipY = bubbleH + th;
    const pad = 2;

    // Helper: compute bezier tail segments that flow seamlessly from body edge
    // leftPt/rightPt = {x,y} junction points on body, leftTan/rightTan = tangent direction at junction
    const buildTailSegments = (leftPt, rightPt, leftTan, rightTan) => {
      if (ts === 'straight') {
        return [
          `L ${rightPt.x} ${rightPt.y}`,
          `L ${tailTipX} ${tailTipY}`,
          `L ${leftPt.x} ${leftPt.y}`
        ];
      } else if (ts === 'round') {
        // Rounded tip with smooth bezier approach
        const tipRadius = Math.max(tw * 0.25, 3);
        const cR1x = rightPt.x + rightTan.x * th * 0.5;
        const cR1y = rightPt.y + rightTan.y * th * 0.5;
        const cR2x = tailTipX + tipRadius * 0.8;
        const cR2y = tailTipY - th * 0.1;
        const cL1x = tailTipX - tipRadius * 0.8;
        const cL1y = tailTipY - th * 0.1;
        const cL2x = leftPt.x + leftTan.x * th * 0.5;
        const cL2y = leftPt.y + leftTan.y * th * 0.5;
        return [
          `C ${cR1x} ${cR1y} ${cR2x} ${cR2y} ${tailTipX + tipRadius * 0.3} ${tailTipY}`,
          `A ${tipRadius} ${tipRadius * 0.8} 0 1 1 ${tailTipX - tipRadius * 0.3} ${tailTipY}`,
          `C ${cL1x} ${cL1y} ${cL2x} ${cL2y} ${leftPt.x} ${leftPt.y}`
        ];
      } else {
        // Normal bezier — smooth S-curve from body to tip and back
        // Control points follow the tangent at the junction, then curve toward tip
        const handleLen = th * 0.55; // how far control points extend along tangent
        const pinchFactor = 0.2; // how narrow the tip area is
        const cR1x = rightPt.x + rightTan.x * handleLen;
        const cR1y = rightPt.y + rightTan.y * handleLen;
        const cR2x = tailTipX + tw * pinchFactor;
        const cR2y = tailTipY - th * 0.12;
        const cL1x = tailTipX - tw * pinchFactor * 1.2;
        const cL1y = tailTipY - th * 0.12;
        const cL2x = leftPt.x + leftTan.x * handleLen;
        const cL2y = leftPt.y + leftTan.y * handleLen;
        return [
          `C ${cR1x} ${cR1y} ${cR2x} ${cR2y} ${tailTipX} ${tailTipY}`,
          `C ${cL1x} ${cL1y} ${cL2x} ${cL2y} ${leftPt.x} ${leftPt.y}`
        ];
      }
    };

    // Unified approach: always use rounded-rect with variable corner radius.
    // At rn=100, corner radius = min(rx,ry) which makes it look like an ellipse.
    // This eliminates the visual jump that occurred at the old rn=95 threshold.
    const maxR = Math.min(rx, ry);
    const cr = maxR * Math.max(0.04, rn / 100);
    const L = pad, T = pad, R = bubbleW - pad, B = bubbleH - pad;

    // Tail junction points on bottom edge — stay within the straight segment between corners
    const tRight = Math.min(R - cr - 2, tailBaseX + tw);
    const tLeft = Math.max(L + cr + 2, tailBaseX - tw);

    // Bottom edge is horizontal → tangent at junction points downward
    const rightPt = {x: tRight, y: B};
    const leftPt = {x: tLeft, y: B};
    const rightTan = {x: 0.15, y: 1};
    const leftTan = {x: -0.15, y: 1};

    const tailSegs = buildTailSegments(leftPt, rightPt, leftTan, rightTan);

    // Use cubic bezier corners (approximating quarter-ellipse arcs for high roundness)
    // kappa ≈ 0.5523 gives a near-perfect circular arc approximation with cubic bezier
    const k = 0.5523;
    const crx = Math.min(cr, (R - L) / 2); // clamp so corners don't overlap
    const cry = Math.min(cr, (B - T) / 2);

    const path = [
      `M ${L + crx} ${T}`,
      `L ${R - crx} ${T}`,
      `C ${R - crx + crx * k} ${T} ${R} ${T + cry - cry * k} ${R} ${T + cry}`,
      `L ${R} ${B - cry}`,
      `C ${R} ${B - cry + cry * k} ${R - crx + crx * k} ${B} ${R - crx} ${B}`,
      // Bottom edge right → tail right junction
      `L ${tRight} ${B}`,
      // Tail segments (right junction → tip → left junction)
      ...tailSegs,
      // Bottom edge left junction → bottom-left corner
      `L ${L + crx} ${B}`,
      `C ${L + crx - crx * k} ${B} ${L} ${B - cry + cry * k} ${L} ${B - cry}`,
      `L ${L} ${T + cry}`,
      `C ${L} ${T + cry - cry * k} ${L + crx - crx * k} ${T} ${L + crx} ${T}`,
      'Z'
    ];
    return path.join(' ');
  };

  // Build cloud-shaped bubble path with bumpy edges + tail
  const buildCloudPath = (w, h, tailPos, tailLen, tailWid, scale) => {
    const bumps = 10;
    const cx = w / 2, cy = h / 2;
    const rx = w / 2 - 4, ry = h / 2 - 4;
    const pts = [];
    // Generate bumpy outline
    for (let i = 0; i <= bumps; i++) {
      const a = (Math.PI * 2 * i) / bumps - Math.PI / 2;
      const bumpR = 0.18 * (i % 2 === 0 ? 1 : 0.7);
      const px = cx + Math.cos(a) * rx;
      const py = cy + Math.sin(a) * ry;
      const bx2 = cx + Math.cos(a) * rx * (1 + bumpR);
      const by2 = cy + Math.sin(a) * ry * (1 + bumpR);
      if (i === 0) {
        pts.push(`M ${px} ${py}`);
      } else {
        const prevA = (Math.PI * 2 * (i - 1)) / bumps - Math.PI / 2;
        const midA = (prevA + a) / 2;
        const cpx = cx + Math.cos(midA) * rx * (1 + bumpR * 1.5);
        const cpy = cy + Math.sin(midA) * ry * (1 + bumpR * 1.5);
        pts.push(`Q ${cpx} ${cpy} ${px} ${py}`);
      }
    }
    pts.push('Z');
    let path = pts.join(' ');
    // Add tail as separate triangle (cloud bubbles typically have round sub-bubbles as tail)
    const tw = 10 * tailWid * scale;
    const th = 14 * tailLen * scale;
    const tx = w * tailPos;
    // Add small circles as cloud tail
    const c1x = tx, c1y = h - 2;
    const c2x = tx + tw * 0.3, c2y = h + th * 0.35;
    const c3x = tx + tw * 0.1, c3y = h + th * 0.7;
    path += ` M ${c1x + 6} ${c1y} A 6 5 0 1 1 ${c1x - 6} ${c1y} A 6 5 0 1 1 ${c1x + 6} ${c1y}`;
    path += ` M ${c2x + 4} ${c2y} A 4 3 0 1 1 ${c2x - 4} ${c2y} A 4 3 0 1 1 ${c2x + 4} ${c2y}`;
    path += ` M ${c3x + 2.5} ${c3y} A 2.5 2 0 1 1 ${c3x - 2.5} ${c3y} A 2.5 2 0 1 1 ${c3x + 2.5} ${c3y}`;
    return path;
  };

  // Build rounded-rectangle box bubble path with tail
  const buildBoxPath = (w, h, r, tailPos, tailLen, tailWid, scale) => {
    const tw = 10 * tailWid * scale;
    const th = 16 * tailLen * scale;
    const tx = Math.max(r + tw, Math.min(w - r - tw, w * tailPos));
    const pts = [
      `M ${r} 0`, `L ${w - r} 0`, `Q ${w} 0 ${w} ${r}`,
      `L ${w} ${h - r}`, `Q ${w} ${h} ${w - r} ${h}`,
      `L ${tx + tw} ${h}`,
      `C ${tx + tw * 0.6} ${h} ${tx + tw * 0.2} ${h + th * 0.3} ${tx} ${h + th}`,
      `C ${tx - tw * 0.2} ${h + th * 0.3} ${tx - tw * 0.6} ${h} ${tx - tw} ${h}`,
      `L ${r} ${h}`, `Q 0 ${h} 0 ${h - r}`,
      `L 0 ${r}`, `Q 0 0 ${r} 0`, 'Z'
    ];
    return pts.join(' ');
  };

  // Build wave-shaped bubble path with wavy edges + tail
  const buildWavePath = (w, h, tailPos, tailLen, tailWid, scale) => {
    const waves = 6;
    const amp = 4 * scale;
    const tw = 10 * tailWid * scale;
    const th = 16 * tailLen * scale;
    const tx = w * tailPos;
    const pts = [`M 0 ${amp}`];
    // Top edge (wavy)
    for (let i = 0; i < waves; i++) {
      const seg = w / waves;
      const x1 = seg * i + seg * 0.25, y1 = -amp;
      const x2 = seg * i + seg * 0.75, y2 = amp;
      const x3 = seg * (i + 1), y3 = amp;
      pts.push(`C ${x1} ${y1} ${x2} ${y2 * 0.3} ${x3} ${y3 * 0.5}`);
    }
    // Right edge (wavy)
    for (let i = 0; i < 3; i++) {
      const seg = h / 3;
      const y1 = seg * i + seg * 0.25, x1 = w + amp;
      const y2 = seg * i + seg * 0.75, x2 = w - amp;
      const y3 = seg * (i + 1);
      pts.push(`C ${x1} ${y1} ${x2} ${y2} ${w} ${y3}`);
    }
    // Bottom edge with tail
    const rightTail = Math.min(w, tx + tw);
    const leftTail = Math.max(0, tx - tw);
    pts.push(`L ${rightTail} ${h}`);
    pts.push(`C ${tx + tw * 0.5} ${h} ${tx + tw * 0.15} ${h + th * 0.4} ${tx} ${h + th}`);
    pts.push(`C ${tx - tw * 0.15} ${h + th * 0.4} ${tx - tw * 0.5} ${h} ${leftTail} ${h}`);
    pts.push(`L 0 ${h}`);
    // Left edge (wavy)
    for (let i = 2; i >= 0; i--) {
      const seg = h / 3;
      const y1 = seg * i + seg * 0.75, x1 = -amp;
      const y2 = seg * i + seg * 0.25, x2 = amp;
      const y3 = seg * i;
      pts.push(`C ${x1} ${y1} ${x2} ${y2} 0 ${y3}`);
    }
    pts.push('Z');
    return pts.join(' ');
  };

  // Build spiky/explosion bubble path with tail
  const buildSpikyPath = (w, h, spikeCount, tailPos, tailLen, tailWid, scale) => {
    const cx = w / 2, cy = h / 2;
    const n = spikeCount || 16;
    const pts = [];
    for (let i = 0; i <= n; i++) {
      const a = (Math.PI * 2 * i) / n - Math.PI / 2;
      const outerR = i % 2 === 0 ? 1.0 : 0.65;
      const px = cx + Math.cos(a) * (w / 2) * outerR;
      const py = cy + Math.sin(a) * (h / 2) * outerR;
      pts.push(i === 0 ? `M ${px} ${py}` : `L ${px} ${py}`);
    }
    pts.push('Z');
    // Add tail
    const tw = 10 * tailWid * scale;
    const th = 16 * tailLen * scale;
    const tx = w * tailPos;
    pts.push(`M ${tx - tw} ${h * 0.85}`);
    pts.push(`L ${tx} ${h + th}`);
    pts.push(`L ${tx + tw} ${h * 0.85}`);
    pts.push('Z');
    return pts.join(' ');
  };

  // Build manga-style concentration lines (집중선)
  // Thin dense lines radiating from elliptical center — stroke-based, not filled wedges
  const buildConcentrationLines = (w, h, padding, outerMargin) => {
    const cx = w / 2, cy = h / 2;
    // padding: -50 ~ +50, 기본 0 → innerR 비율 0.22. 음수=텍스트 영역 축소, 양수=확대
    const baseR = 0.22;
    const rFactor = Math.max(0.08, Math.min(0.45, baseR + (padding || 0) * 0.004));
    const innerRx = w * rFactor, innerRy = h * rFactor;
    // outerMargin: -30~50, 기본 0. 양수=여백 넓힘(선 짧아짐), 음수=여백 줄임(선 길어짐, 경계에 닿음)
    const outerScale = Math.max(0.2, Math.min(1.5, 1.0 - (outerMargin || 0) * 0.014));
    const lines = []; // {sx,sy,ex,ey,sw} — start, end, strokeWidth
    const rand = (i, off) => { const x = Math.sin(42 + i * 127.1 + off * 311.7) * 43758.5453; return x - Math.floor(x); };

    // ~90 dense lines in clusters of 2-4
    const clusterCount = 35;
    let angle = 0;
    for (let c = 0; c < clusterCount; c++) {
      const gap = (Math.PI * 2 / clusterCount) * (0.7 + rand(c, 0) * 0.6);
      angle += gap;
      const linesInCluster = 2 + Math.floor(rand(c, 1) * 3); // 2-4 lines per cluster
      const clusterSpread = (Math.PI * 2 / clusterCount) * 0.5;

      for (let li = 0; li < linesInCluster; li++) {
        const a = angle + (li - (linesInCluster - 1) / 2) * clusterSpread / linesInCluster;
        const cosA = Math.cos(a), sinA = Math.sin(a);

        // Start from inner ellipse edge
        const startDist = 1.0 + rand(c * 10 + li, 4) * 0.1;
        const sx = cx + cosA * innerRx * startDist;
        const sy = cy + sinA * innerRy * startDist;

        // End — varied length, scaled by outerScale (outerMargin)
        const lenType = rand(c * 10 + li, 5);
        let lenMult;
        if (lenType < 0.3) lenMult = 0.12 + rand(c * 10 + li, 6) * 0.1;        // 짧은 선 30%
        else if (lenType < 0.7) lenMult = 0.22 + rand(c * 10 + li, 6) * 0.13; // 중간 선 40%
        else lenMult = 0.35 + rand(c * 10 + li, 6) * 0.15;                     // 긴 선 30%
        const maxReachX = (cx - innerRx) * outerScale;
        const maxReachY = (cy - innerRy) * outerScale;
        const outerDist = innerRx + maxReachX * lenMult;
        const outerDistY = innerRy + maxReachY * lenMult;
        const ex = cx + cosA * outerDist;
        const ey = cy + sinA * outerDistY;

        // Stroke width — all thin, slight variation
        const unit = w / 200;
        const sw = (0.3 + rand(c * 10 + li, 7) * 0.9) * unit;
        lines.push({sx, sy, ex, ey, sw});
      }
    }
    // Smooth ellipse path for white center
    const k = 0.5523;
    const ellipse = `M ${cx - innerRx} ${cy} C ${cx - innerRx} ${cy - innerRy * k} ${cx - innerRx * k} ${cy - innerRy} ${cx} ${cy - innerRy} C ${cx + innerRx * k} ${cy - innerRy} ${cx + innerRx} ${cy - innerRy * k} ${cx + innerRx} ${cy} C ${cx + innerRx} ${cy + innerRy * k} ${cx + innerRx * k} ${cy + innerRy} ${cx} ${cy + innerRy} C ${cx - innerRx * k} ${cy + innerRy} ${cx - innerRx} ${cy + innerRy * k} ${cx - innerRx} ${cy} Z`;
    return {ellipse, lines, innerRx, innerRy};
  };

  // Enhanced bubble drawing with shadows and seamless ellipse+tail
  const drawBubbleOnCanvas = (ctx, b, bx, by, bw, bh, scale) => {
    const bt = BUBBLE_TYPES[b.bubbleStyle || b.type] || BUBBLE_TYPES.speech;
    const tailPos = b.tailPos ?? 0.3;
    const tailSz = b.tailSize ?? 1.0;
    const tailLen = b.tailLength ?? tailSz;
    const tailWid = b.tailWidth ?? tailSz;
    ctx.save();

    // Add drop shadow
    if (bt.shadow) {
      ctx.shadowColor = 'rgba(0,0,0,0.3)';
      ctx.shadowBlur = 4 * scale;
      ctx.shadowOffsetX = 2 * scale;
      ctx.shadowOffsetY = 2 * scale;
    }

    // Compute effective bg for plainText types with custom color/opacity
    const effBg = (() => {
      if (bt.plainText && b.customBg) {
        const op = (b.customBgOpacity ?? 100) / 100;
        const hex = b.customBg;
        const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), bl = parseInt(hex.slice(5,7),16);
        return `rgba(${r},${g},${bl},${op})`;
      }
      if (bt.plainText && b.customBgOpacity !== undefined) {
        const op = b.customBgOpacity / 100;
        return `rgba(255,255,255,${op})`;
      }
      return bt.bg;
    })();

    // plainText type: simple rect background, no border
    if (bt.plainText && !bt.ellipse) {
      ctx.fillStyle = effBg;
      ctx.fillRect(bx, by, bw, bh);
    } else if (bt.plainText && bt.ellipse) {
      ctx.beginPath();
      ctx.ellipse(bx + bw / 2, by + bh / 2, bw / 2, bh / 2, 0, 0, Math.PI * 2);
      ctx.fillStyle = effBg; ctx.fill();
    } else if (bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon]) {
      // SVG path-based balloons — use per-bubble properties
      const sb = SVG_BALLOONS[bt.svgBalloon];
      const isFlipped = b.flipBalloon || 'default';
      const bStrokeW = b.strokeWidth ?? bt.borderWidth ?? 2.5;
      const bStrokeC = b.strokeColor || bt.border || '#333';
      const bFillC = b.fillColor || bt.bg || '#fff';
      const pathD = sb.path(bStrokeW, bStrokeC, bFillC, isFlipped);
      const vbParts = sb.viewBox.split(' ').map(Number);
      const pad = b.bubblePadding ?? (bt.defaultPadding || 0);
      const inset = pad * Math.max(vbParts[2], vbParts[3]) / 100;
      const vbX = vbParts[0] + inset, vbY = vbParts[1] + inset;
      const vbW = vbParts[2] - inset * 2, vbH = vbParts[3] - inset * 2;
      ctx.save();
      ctx.translate(bx, by);
      ctx.scale(bw / vbW, bh / vbH);
      ctx.translate(-vbX, -vbY);
      const p2d = new Path2D(pathD);
      ctx.fillStyle = bFillC;
      ctx.fill(p2d);
      ctx.shadowColor = 'transparent';
      if (bStrokeC !== 'none') {
        ctx.lineWidth = bStrokeW / Math.min(bw / vbW, bh / vbH);
        ctx.strokeStyle = bStrokeC;
        ctx.lineJoin = 'round';
        ctx.lineCap = 'round';
        ctx.stroke(p2d);
        // Re-fill interior to cover any internal stroke artifacts at tail junctions
        ctx.fillStyle = bFillC;
        ctx.fill(p2d);
      }
      ctx.restore();
    } else if (bt.concentrationLines) {
      // 집중선 — thin stroke lines radiating from center
      ctx.save();
      ctx.translate(bx, by);
      const cl = buildConcentrationLines(bw, bh, b.concentrationPadding || 0, b.concentrationOuterMargin || 0);
      // Draw lines as strokes
      ctx.strokeStyle = b.concentrationColor || bt.border || '#000';
      ctx.lineCap = 'round';
      cl.lines.forEach(ln => {
        ctx.lineWidth = ln.sw;
        ctx.beginPath();
        ctx.moveTo(ln.sx, ln.sy);
        ctx.lineTo(ln.ex, ln.ey);
        ctx.stroke();
      });
      // Center ellipse — transparent (text floats over lines)
      const ep = new Path2D(cl.ellipse);
      ctx.fillStyle = 'transparent';
      ctx.fill(ep);
      ctx.shadowColor = 'transparent';
      ctx.restore();
    } else if (bt.spiky || bt.cloudShape || bt.boxShape || bt.waveShape) {
      // Path-based shapes: spiky, cloud, box, wave
      let pathStr;
      if (bt.spiky) pathStr = buildSpikyPath(bw, bh, bt.spikeCount||16, tailPos, tailLen, tailWid, scale);
      else if (bt.cloudShape) pathStr = buildCloudPath(bw, bh, tailPos, tailLen, tailWid, scale);
      else if (bt.boxShape) pathStr = buildBoxPath(bw, bh, (bt.radius||10)*scale, tailPos, tailLen, tailWid, scale);
      else pathStr = buildWavePath(bw, bh, tailPos, tailLen, tailWid, scale);
      ctx.save();
      ctx.translate(bx, by);
      const p2d = new Path2D(pathStr);
      ctx.fillStyle = bt.bg; ctx.fill(p2d, bt.cloudShape || bt.spiky ? 'evenodd' : 'nonzero');
      ctx.shadowColor = 'transparent';
      if (bt.border !== 'none') {
        ctx.lineWidth = (bt.borderWidth || 2) * scale;
        ctx.strokeStyle = bt.border;
        ctx.lineJoin = 'round';
        ctx.stroke(p2d);
      }
      ctx.restore();
    } else if (bt.ellipse) {
      // Ellipse with unified single-path tail (PowerPoint-style callout)
      const cx = bx + bw / 2, cy = by + bh / 2;
      const rx = bw / 2 - 2 * scale, ry = bh / 2 - 2 * scale;
      if (bt.tail) {
        // Use buildBubblePath for unified shape, then offset by bx/by
        const pathStr = buildBubblePath(bw / 2, bh / 2, rx, ry, tailPos, tailLen, tailWid, bw, bh, 1, b.roundness, b.tailStyle);
        // Apply offset transform
        ctx.save();
        ctx.translate(bx, by);
        const p2d = new Path2D(pathStr);
        ctx.fillStyle = bt.bg;
        ctx.fill(p2d);
        ctx.shadowColor = 'transparent';
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale;
          ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.stroke(p2d);
          ctx.setLineDash([]);
        }
        ctx.restore();
      } else {
        // No-tail ellipse: use roundRect with variable corner radius (consistent with buildBubblePath)
        const rn2 = b.roundness ?? 100;
        const cr2 = Math.min(rx, ry) * Math.max(0.04, rn2 / 100);
        ctx.beginPath(); ctx.roundRect(bx + 2, by + 2, bw - 4, bh - 4, cr2);
        ctx.fillStyle = bt.bg; ctx.fill();
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale; ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.stroke();
        }
      }
    } else {
      // Rounded rect (narration etc.)
      if (bt.tail) {
        // Unified path: body + tail as single shape via buildBubblePath
        const rrRx = bw / 2 - 2 * scale, rrRy = bh / 2 - 2 * scale;
        const rrRoundness = b.roundness ?? 30; // lower default for rect types
        const pathStr = buildBubblePath(bw / 2, bh / 2, rrRx, rrRy, tailPos, tailLen, tailWid, bw, bh, 1, rrRoundness, b.tailStyle);
        ctx.save();
        ctx.translate(bx, by);
        const p2d = new Path2D(pathStr);
        ctx.fillStyle = bt.bg; ctx.fill(p2d);
        ctx.shadowColor = 'transparent';
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale; ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.lineJoin = 'round';
          ctx.stroke(p2d);
          ctx.setLineDash([]);
        }
        ctx.restore();
      } else {
        const r = (bt.radius || 8) * scale / 2;
        ctx.beginPath(); ctx.roundRect(bx, by, bw, bh, r);
        ctx.fillStyle = bt.bg; ctx.fill();
        if (bt.border !== 'none') {
          ctx.lineWidth = (bt.borderWidth || 2) * scale; ctx.strokeStyle = bt.border;
          if (bt.dashed) ctx.setLineDash([6 * scale, 4 * scale]);
          ctx.stroke();
        }
      }
    }

    // Draw text
    ctx.shadowColor = 'transparent';
    const displayText = getObjText(b);
    if (displayText) {
      const fs = Math.max(12, (b.fontSize || 25)) * scale;
      const ff = getObjFont(b, "'Noto Sans KR',sans-serif");
      ctx.font = `${b.fontWeight || bt.fontWeight} ${fs}px ${ff}`;
      ctx.fillStyle = b.customColor || bt.color || '#111';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      const lines = displayText.split('\n');
      const lh = fs * 1.3;
      const txOff = (b.textOffsetX || 0) * scale;
      const tyOff = (b.textOffsetY || 0) * scale;
      // Use textArea from svgBalloon if available
      const sb = bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon];
      const ta = sb?.textArea;
      let textCenterX = bx + bw / 2 + txOff;
      let textCenterY = by + bh / 2 + tyOff;
      let maxTextW = bw - 16 * scale;
      if (bt.concentrationLines) {
        // 집중선: constrain text to inner ellipse (adjustable)
        const cBaseR2 = 0.22;
        const cRF2 = Math.max(0.08, Math.min(0.45, cBaseR2 + (b.concentrationPadding || 0) * 0.004));
        maxTextW = bw * Math.min(0.85, cRF2 * 2.05);
      } else if (ta) {
        const taLeft = parseFloat(ta.left) / 100;
        const taTop = parseFloat(ta.top) / 100;
        const taW = parseFloat(ta.width) / 100;
        const taH = parseFloat(ta.height) / 100;
        textCenterX = bx + (taLeft + taW / 2) * bw + txOff;
        textCenterY = by + (taTop + taH / 2) * bh + tyOff;
        maxTextW = taW * bw;
      }
      const sy = textCenterY - (lines.length - 1) * lh / 2;
      lines.forEach((l, li) => ctx.fillText(l, textCenterX, sy + li * lh, maxTextW));
    }
    ctx.restore();
  };

  // [WebtoonSFX 추가] SFX 캔버스 렌더링
  const drawSfxOnCanvas = (ctx, obj, ox, oy, scale) => {
    ctx.save();
    const cx = ox + obj.w * scale / 2;
    const cy = oy + obj.h * scale / 2;
    ctx.translate(cx, cy);
    if (obj.rotate) ctx.rotate(obj.rotate * Math.PI / 180);
    // Apply skew transform via setTransform (Canvas doesn't have skewX)
    if (obj.skew) {
      const skewRad = Math.tan((obj.skew || 0) * Math.PI / 180);
      ctx.transform(1, 0, skewRad, 1, 0, 0);
    }
    const fs = (obj.fontSize || 48) * scale;
    const ff = getObjFont(obj, "'Nanum Brush Script',cursive");
    ctx.font = `900 ${fs}px ${ff}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // Apply filter-like effects via shadow (Canvas equivalent of CSS filter drop-shadow)
    const filterType = obj.filterType || '';
    const strokeColor = obj.stroke || '#5c0000';
    const fillColor = obj.color || '#cc2200';
    if (filterType === 'shake') {
      ctx.shadowColor = strokeColor;
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 2 * scale;
      ctx.shadowOffsetY = 2 * scale;
    } else if (filterType === 'motion') {
      ctx.shadowColor = strokeColor + '66';
      ctx.shadowBlur = 3 * scale;
      ctx.shadowOffsetX = 4 * scale;
      ctx.shadowOffsetY = 0;
    } else if (filterType === 'glow') {
      ctx.shadowColor = fillColor;
      ctx.shadowBlur = 8 * scale;
      ctx.shadowOffsetX = 0;
      ctx.shadowOffsetY = 0;
    } else if (filterType === 'outline') {
      ctx.shadowColor = strokeColor;
      ctx.shadowBlur = 0;
      ctx.shadowOffsetX = 3 * scale;
      ctx.shadowOffsetY = 3 * scale;
    }
    // Stroke (outline) — paint stroke first for paint-order:stroke fill effect
    if (obj.stroke && obj.strokeWidth) {
      ctx.strokeStyle = obj.stroke;
      ctx.lineWidth = (obj.strokeWidth || 1.5) * scale * 2;
      ctx.lineJoin = 'round';
      ctx.miterLimit = 2;
      const sfxDisplayText = getObjText(obj);
      const lines = (sfxDisplayText).split('\n');
      const lh = fs * 1.1;
      const startY = -(lines.length - 1) * lh / 2;
      lines.forEach((l, i) => ctx.strokeText(l, 0, startY + i * lh));
    }
    // Fill
    ctx.shadowColor = 'transparent';
    ctx.fillStyle = fillColor;
    const sfxDisplayText2 = getObjText(obj);
    const lines = (sfxDisplayText2).split('\n');
    const lh = fs * 1.1;
    const startY = -(lines.length - 1) * lh / 2;
    lines.forEach((l, i) => ctx.fillText(l, 0, startY + i * lh));
    ctx.restore();
  };

  // Pre-load and cache all images (external URLs → base64 via proxy)
  const preloadEditorImages = async (objects) => {
    const cache = {};
    const imageObjs = objects.filter(o => (o.type === 'panel' || o.type === 'image') && o.src && !cache[o.src]);
    // Deduplicate by src
    const uniqueSrcs = [...new Set(imageObjs.map(o => o.src))];
    // Build panelIndex→src lookup from objects for [img:] fallback
    const panelIdxMap = {};
    for (const o of imageObjs) {
      if (o.panelIndex !== undefined) panelIdxMap[o.src] = o.panelIndex;
    }
    const total = uniqueSrcs.length;
    let loaded = 0;

    // Load in parallel batches of 5 (avoid overwhelming proxy)
    const BATCH = 5;
    for (let i = 0; i < uniqueSrcs.length; i += BATCH) {
      const batch = uniqueSrcs.slice(i, i + BATCH);
      await Promise.all(batch.map(async (src) => {
        let imgSrc = src;
        // [img:] token fallback — try to restore from panels[] array
        if (imgSrc.startsWith('[img:')) {
          const pi = panelIdxMap[src];
          const restored = (pi !== undefined && panels[pi]) ? panels[pi] : null;
          if (restored && !restored.startsWith('[img:')) {
            console.log(`[preloadEditorImages] Restored [img:] token from panels[${pi}]`);
            imgSrc = restored;
          } else {
            console.warn('Skipping unresolved [img:] token:', imgSrc, '(panelIndex:', pi, ')');
            loaded++;
            return;
          }
        }
        if (imgSrc.startsWith('http') && !imgSrc.startsWith('data:')) {
          try {
            const proxyResp = await fetch('/api/proxy-image?url=' + encodeURIComponent(imgSrc));
            const proxyData = await proxyResp.json();
            if (proxyData.dataUri) imgSrc = proxyData.dataUri;
            else console.warn('Proxy no dataUri for:', src.substring(0, 60));
          } catch(e) { console.warn('Proxy failed:', src.substring(0, 60), e.message); }
        }
        try {
          cache[src] = await loadImage(imgSrc);
        } catch(e) { console.warn('Image load failed:', src.substring(0, 60)); }
        loaded++;
      }));
      log(`이미지 로딩: ${Math.min(loaded, total)}/${total}`, 'info');
    }
    return cache;
  };

  // Export all split pages as JPG (720x4000 each, last page may be shorter)
  // Renders per-page canvases to avoid browser canvas size limits
  const exportAllPagesAsJpeg = async () => {
    if (editorPages.length === 0) return [];
    const page = editorPages[0];

    let contentH = 0;
    for (const obj of page.objects) {
      if (obj.hidden) continue;
      const bottom = (obj.y || 0) + (obj.h || 0);
      if (bottom > contentH) contentH = bottom;
    }
    contentH = Math.max(contentH + 20, 100);

    const sorted = [...page.objects].filter(o => !o.hidden).sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1));
    const totalPages = Math.ceil(contentH / PAGE_H);

    // Pre-load all images once (avoids repeated proxy calls)
    log(`이미지 로딩 중... (${sorted.filter(o => o.type === 'panel' || o.type === 'image').length}개)`, 'info');
    const imgCache = await preloadEditorImages(sorted);

    const results = [];
    for (let p = 0; p < totalPages; p++) {
      const startY = p * PAGE_H;
      const sliceH = Math.min(PAGE_H, contentH - startY);
      const canvas = document.createElement('canvas');
      canvas.width = PAGE_W;
      canvas.height = sliceH;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, PAGE_W, sliceH);

      // Draw only objects that intersect this page slice
      for (const obj of sorted) {
        const objTop = obj.y || 0;
        const objBottom = objTop + (obj.h || 0);
        // Skip objects completely outside this slice
        if (objBottom <= startY || objTop >= startY + sliceH) continue;

        const drawY = objTop - startY;
        if (obj.type === 'panel' || obj.type === 'image') {
          const img = imgCache[obj.src];
          if (img) {
            if (obj.crop && obj.crop.w > 0 && obj.crop.h > 0) {
              // Draw cropped region: source rect from original image
              const sx = img.naturalWidth * obj.crop.x / 100;
              const sy = img.naturalHeight * obj.crop.y / 100;
              const sw = img.naturalWidth * obj.crop.w / 100;
              const sh = img.naturalHeight * obj.crop.h / 100;
              ctx.drawImage(img, sx, sy, sw, sh, obj.x, drawY, obj.w, obj.h);
            } else {
              ctx.drawImage(img, obj.x, drawY, obj.w, obj.h);
            }
          }
        } else if (obj.type === 'bubble') {
          drawBubbleOnCanvas(ctx, obj, obj.x, drawY, obj.w, obj.h, 1);
        } else if (obj.type === 'sfx') {
          drawSfxOnCanvas(ctx, obj, obj.x, drawY, 1);
        }
      }
      results.push(canvas.toDataURL('image/jpeg', 0.95));
    }
    return results;
  };

  // Legacy single-page export (for backward compat)
  const exportPageAsJpeg = async (pageIdx) => {
    const all = await exportAllPagesAsJpeg();
    return all[pageIdx] || all[0] || null;
  };

  // Export editor as PSD with individual layers (no page splitting)
  const exportAsPsd = async () => {
    if (!editorPages.length || !editorPages[0]?.objects?.length) {
      log('내보낼 에디터 데이터가 없습니다', 'error'); return;
    }
    if (!window.agPsd?.writePsd) {
      log('ag-psd 라이브러리가 로드되지 않았습니다', 'error'); return;
    }
    // CSS 폰트명 → Photoshop PostScript 폰트명 변환
    const cssFontToPsName = (cssName) => {
      const map = {
        'Noto Sans KR': 'NotoSansKR-Regular',
        'Noto Serif KR': 'NotoSerifKR-Regular',
        'Noto Sans JP': 'NotoSansJP-Regular',
        'Noto Serif JP': 'NotoSerifJP-Regular',
        'Nanum Gothic': 'NanumGothic',
        'Nanum Myeongjo': 'NanumMyeongjo',
        'Nanum Brush Script': 'NanumBrushScript-Regular',
        'Nanum Pen Script': 'NanumPenScript-Regular',
        'Black Han Sans': 'BlackHanSans-Regular',
        'Jua': 'Jua-Regular',
        'Do Hyeon': 'DoHyeon-Regular',
        'Gothic A1': 'GothicA1-Regular',
        'Nanum Square': 'NanumSquareOTF',
        'Gugi': 'Gugi-Regular',
        'Gaegu': 'Gaegu-Regular',
        'Cute Font': 'CuteFont-Regular',
        'East Sea Dokdo': 'EastSeaDokdo-Regular',
        'Hi Melody': 'HiMelody-Regular',
        'Poor Story': 'PoorStory-Regular',
        'Single Day': 'SingleDay-Regular',
        'Song Myung': 'SongMyung-Regular',
        'Stylish': 'Stylish-Regular',
        'Sunflower': 'Sunflower-Regular',
        'Yeon Sung': 'YeonSung-Regular',
      };
      return map[cssName] || cssName.replace(/\s+/g, '');
    };
    log('PSD 내보내기 중... (고해상도 레이어 생성)', 'info');

    const page = editorPages[0];
    // Determine upscale factor: detect max original image resolution vs editor size
    // to export at original quality instead of editor's 720px width
    let psdScale = 1;
    const firstPanel = page.objects.find(o => (o.type === 'panel' || o.type === 'image') && !o.hidden && o.src);
    if (firstPanel) {
      try {
        let testSrc = firstPanel.src;
        if (testSrc.startsWith('[img:') && firstPanel.panelIndex !== undefined && panels[firstPanel.panelIndex]) {
          testSrc = panels[firstPanel.panelIndex];
        }
        const testImg = await loadImage(testSrc);
        const naturalW = testImg.naturalWidth;
        if (naturalW > firstPanel.w * 1.2) {
          psdScale = Math.min(3, naturalW / firstPanel.w); // cap at 3x
          console.log(`[exportAsPsd] 고해상도 내보내기: 원본 ${naturalW}px / 에디터 ${firstPanel.w}px → ${psdScale.toFixed(2)}x 스케일`);
        }
      } catch(e) { /* fallback to 1x */ }
    }
    log(`PSD 스케일: ${psdScale.toFixed(1)}x (에디터 ${PAGE_W}px → ${Math.round(PAGE_W * psdScale)}px)`, 'info');

    // Calculate actual content height (hidden 객체 제외)
    let contentH = 0;
    for (const obj of page.objects) {
      if (obj.hidden) continue;
      const bottom = (obj.y || 0) + (obj.h || 0);
      if (bottom > contentH) contentH = bottom;
    }
    contentH = Math.max(contentH + 20, 100);

    const sorted = [...page.objects].filter(o => !o.hidden).sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1));
    const children = [];

    for (let idx = 0; idx < sorted.length; idx++) {
      const obj = sorted[idx];
      try {
        if (obj.type === 'panel' || obj.type === 'image') {
          // Panel/image layer — render to canvas
          let imgSrc = obj.src;
          // [img:] token fallback — try to restore from panels[] array
          if (imgSrc && imgSrc.startsWith('[img:')) {
            const pi = obj.panelIndex;
            const restored = (pi !== undefined && panels[pi]) ? panels[pi] : null;
            if (restored && !restored.startsWith('[img:')) {
              console.log(`[exportAsPsd] Restored [img:] token from panels[${pi}]`);
              imgSrc = restored;
            } else {
              console.warn(`[exportAsPsd] Skipping unresolved [img:] token for layer ${idx}`);
              continue;
            }
          }
          if (imgSrc && imgSrc.startsWith('http')) {
            try {
              const proxyResp = await fetch('/api/proxy-image?url=' + encodeURIComponent(imgSrc));
              const proxyData = await proxyResp.json();
              if (proxyData.dataUri) imgSrc = proxyData.dataUri;
            } catch(e) { /* use original */ }
          }
          const img = await loadImage(imgSrc);
          const lw = Math.round(obj.w * psdScale);
          const lh = Math.round(obj.h * psdScale);
          const layerCanvas = document.createElement('canvas');
          layerCanvas.width = lw;
          layerCanvas.height = lh;
          const lCtx = layerCanvas.getContext('2d');
          if (obj.crop && obj.crop.w > 0 && obj.crop.h > 0) {
            const sx = img.naturalWidth * obj.crop.x / 100;
            const sy = img.naturalHeight * obj.crop.y / 100;
            const sw = img.naturalWidth * obj.crop.w / 100;
            const sh = img.naturalHeight * obj.crop.h / 100;
            lCtx.drawImage(img, sx, sy, sw, sh, 0, 0, lw, lh);
          } else {
            lCtx.drawImage(img, 0, 0, lw, lh);
          }
          children.push({
            name: `Panel ${obj.panelIndex !== undefined ? obj.panelIndex + 1 : idx + 1}`,
