          parsed = parseJSON(result);
          break;
        } catch(parseErr) {
          log(`스토리보드 JSON 파싱 실패 (시도 ${attempt+1}/3): ${parseErr.message}`, 'warn');
          if (attempt === 2) throw parseErr;
          log(`재시도 중...`, 'info');
        }
      }
    }
    // Scene mode: validate and log panel count vs plotBeat count
    if (inputModeRef.current === 'scene') {
      const expectedCount = data.plotBeats?.length || 0;
      if (parsed.length !== expectedCount) {
        log(`⚠️ 패널 수(${parsed.length})가 씬 수(${expectedCount})와 다릅니다. 조정 중...`, 'warn');
        // If fewer panels, add placeholder entries for missing ones
        while (parsed.length < expectedCount) {
          const missingBeat = data.plotBeats[parsed.length];
          parsed.push({
            panelNumber: parsed.length + 1,
            plotBeat: missingBeat?.beat || parsed.length + 1,
            type: 'establishing', shotSize: 'medium', cameraAngle: 'eye_level',
            characters: missingBeat?.characters?.map(c => ({id: c, pose: 'standing', expression: 'neutral', position: 'center'})) || [],
            background: missingBeat?.location || 'bg_1',
            props: missingBeat?.props || [],
            dialogue: [],
            narration: '',
            mood: missingBeat?.mood || 'calm',
            description: missingBeat?.summary || '',
            imagePrompt: `${missingBeat?.summary || 'Scene'}, manhwa/webtoon style, detailed illustration, vibrant colors`
          });
        }
        // If more panels, trim to expected count
        if (parsed.length > expectedCount) parsed.length = expectedCount;
        log(`조정 완료: ${parsed.length}개 패널`, 'info');
      }
      log(`씬 모드 검증: ${expectedCount}개 씬 → ${parsed.length}개 패널 (1:1 매칭)`, 'success');
    } else {
      log(`스토리보드 완료: ${parsed.length}개 패널`, 'success');
    }
    parsed.forEach((p, i) => { if (!p._uid) p._uid = 'sb_' + Date.now() + '_' + i; });

    // Post-process: resolve outfitPreset names to outfitOverride values
    let presetApplied = 0;
    parsed.forEach(panel => {
      if (!panel.characters) return;
      panel.characters.forEach(pc => {
        if (pc.outfitPreset) {
          const cid = pc.id || pc;
          const charInfo = data.characters?.find(c => c.id === cid);
          const presetData = charInfo?.outfitPresets?.[pc.outfitPreset];
          if (presetData) {
            if (!pc.outfitOverride || pc.outfitOverride === pc.outfitPreset) {
              pc.outfitOverride = presetData.outfit;
            }
            if (presetData.accessories && !pc.accessoriesOverride) {
              pc.accessoriesOverride = presetData.accessories;
            }
            presetApplied++;
          }
        }
      });
    });
    if (presetApplied > 0) log(`의상 프리셋 자동 적용: ${presetApplied}개 패널`, 'success');

    setStoryboard(parsed);
    setPanels(new Array(parsed.length).fill(null));
    setCompletedSteps(prev => new Set([...prev, 2]));
    setStep(3);
    // Auto-save step 3
    if (projectId && currentEpisode) {
      try {
        const cs = [...new Set([...completedSteps, 0, 1, 2])];
        await fbSavePhaseQueued(projectId, currentEpisode, 'step3_storyboard', {storyboard: parsed});
        await fbSaveEpisode(projectId, currentEpisode, {step: 3, completedSteps: cs});
        updateEpisodeState(3, cs);
        log('Step 3 자동 저장 완료', 'info');
      } catch(e) { log('Step 3 자동 저장 실패: ' + e.message, 'error'); }
    }
    return parsed;
  };

  // ======== STEP 4: Generate Panel Images ========
  const runStep4 = async (storyboardData, refsData) => {
    const sb = storyboardData || storyboard;
    const refs = refsData || references;
    if (!sb.length) throw new Error('스토리보드 없음');
    log('Step 4: 패널 이미지 생성 시작...', 'info');
    setStep(3);

    // 생성 시작 전 스냅샷 한 번만 저장, 생성 중 개별 setPanels는 스냅샷 건너뛰기
    saveSnapshot();
    skipSnapshotRef.current = true;

    const newPanels = [...(panels.length === sb.length ? panels : new Array(sb.length).fill(null))];

    for (let i = 0; i < sb.length; i++) {
      if (abortRef.current) throw new Error('중단됨');

      // Build character states UP TO this panel (accumulated from all previous panels)
      const charStates = buildCharacterStates(sb, analysis, i);

      if (newPanels[i]) {
        log(`패널 ${i+1} 이미 생성됨, 건너뜀`); continue;
      }

      const panel = sb[i];

      // 프롬프트 구성: 단일 재생성(regeneratePanel)과 완전히 동일하게 원본 imagePrompt 사용
      const anchoredPrompt = panel.imagePrompt;

      // Determine aspect ratio from panel imageSize (user-editable) or auto from shotSize + type
      const panelAR = panel.imageSize || (() => {
        const shot = (panel.shotSize || 'medium').toLowerCase();
        const type = (panel.type || '').toLowerCase();
        const angle = (panel.cameraAngle || '').toLowerCase();
        // Establishing / extreme wide → cinematic horizontal
        if (shot.includes('extreme_wide') || type === 'establishing') return '16:9';
        // Wide shots → slightly horizontal
        if (shot.includes('wide') && !shot.includes('medium')) return '3:2';
        // Close-up / extreme close → tall vertical (face/emotion emphasis)
        if (shot === 'extreme_close') return '2:3';
        if (shot.includes('close') && !shot.includes('medium')) return '3:4';
        // Over-shoulder dialogue → horizontal for two-character composition
        if (angle.includes('over_shoulder')) return '3:2';
        // Birds-eye → square for overhead composition
        if (angle.includes('birds_eye')) return '1:1';
        // Emotion / closeup type → vertical
        if (type === 'emotion' || type === 'closeup') return '3:4';
        // Action type → horizontal for movement
        if (type === 'action') return '3:2';
        // Dialogue type → slightly vertical
        if (type === 'dialogue') return '3:4';
        // Medium shots → square
        return '1:1';
      })();
      log(`패널 ${i+1}/${sb.length} 생성 중... (${panel.type}, ${panel.shotSize}, ${panel.cameraAngle || ''}, 비율:${panelAR})`);

      // 의상/악세서리 변경 감지 → 해당 캐릭터 레퍼런스 자동 재생성
      if (panel.characters) {
        for (const pc of panel.characters) {
          const cid = pc.id || pc;
          if (!pc.outfitOverride && !pc.accessoriesOverride) continue;
          const prevState = charStates[cid];
          const curOutfit = pc.outfitOverride || prevState?.outfit || '';
          const prevOutfit = prevState?.outfit || '';
          // 의상이 실제로 변경된 경우에만 재생성
          if (pc.outfitOverride && curOutfit !== prevOutfit) {
            const charInfo = analysis?.characters?.find(c => c.id === cid);
            if (charInfo && refs.characters[cid]) {
              const charName = charInfo.name || cid;
              log(`패널 ${i+1}: ${charName} 의상 변경 감지 → 레퍼런스 자동 재생성 ("${curOutfit.substring(0, 40)}...")`, 'info');
              try {
                const accDesc = pc.accessoriesOverride || prevState?.accessories || '';
                const outfitRefPrompt = buildCharRefPrompt(cid, {outfitOverride: {outfit: curOutfit, accessories: accDesc}});
                const outfitImages = await callImage(outfitRefPrompt);
                if (outfitImages?.[0]) {
                  refs.characters[cid] = outfitImages[0];
                  setReferences(prev => ({...prev, characters: {...prev.characters, [cid]: outfitImages[0]}}));
                  log(`${charName} 의상 변경 레퍼런스 생성 완료 ✓`, 'success');
                }
              } catch(e) {
                log(`${charName} 의상 변경 레퍼런스 생성 실패: ${e.message}`, 'warn');
              }
            }
          }
        }
      }

      const {refImages, assetDescriptions, charIds: panelCharIds} = buildPanelRefs(panel, sharedAssets, analysis, refs, charStates);
      // 이전 패널 이미지 + 레퍼런스 병합 모드: 단일 재생성의 'both' 모드와 동일
      let skipStyle = false;
      if (i > 0 && newPanels[i - 1] && typeof newPanels[i - 1] === 'string' && (newPanels[i - 1].startsWith('data:') || newPanels[i - 1].startsWith('http'))) {
        const prevImgStr = newPanels[i - 1];
        const alreadyHas = refImages.some(r => (r.image || r) === prevImgStr);
        if (!alreadyHas) {
          refImages.push({image: prevImgStr, description: 'previous panel — use for visual style consistency, lighting reference, and character appearance matching. Do NOT copy the composition.'});
          assetDescriptions.push('[Previous panel image — use for visual style consistency, lighting reference, and character appearance matching. Do NOT copy the composition.]');
        }
        skipStyle = true;
        log(`패널 ${i+1}: 이전 패널 이미지 + 기본 레퍼런스 병합 모드 (스타일 미적용)`, 'info');
      }
      // Delta prompt: 이전 패널에서 이어지는 장면이면 변경사항만 설명
      const hasPrevPanelRef = i > 0 && newPanels[i - 1] && typeof newPanels[i - 1] === 'string' && (newPanels[i - 1].startsWith('data:') || newPanels[i - 1].startsWith('http'));
      const isDeltaTransition = ['continuous', 'cut_to_reaction', 'new_angle_same_scene'].includes(panel.sceneTransition);
      const useDelta = hasPrevPanelRef && isDeltaTransition && panel.deltaPrompt;
      let finalPrompt = anchoredPrompt;
      if (useDelta) {
        // deltaPrompt + 캐릭터 비주얼 ID는 assetDescriptions로 이미 전달됨
        finalPrompt = panel.deltaPrompt;
        log(`패널 ${i+1}: 델타 프롬프트 사용 (${panel.sceneTransition}) — "${panel.deltaPrompt.substring(0, 80)}..."`, 'info');
      }
      log(`패널 ${i+1}: 레퍼런스 ${refImages.length}개, 에셋 ${assetDescriptions.length}개, 캐릭터 ${panelCharIds.length}명`);

      try {
        const images = await callImage(finalPrompt, {referenceImages: refImages, assetDescriptions, aspectRatio: panelAR, characterIds: panelCharIds, skipStyle});
        // callImage returns null when content filter blocks — skip this panel
        const img0 = images?.[0];
        if (!img0 || img0 === 'undefined' || img0.endsWith(',undefined')) {
          log(`패널 ${i+1} 유효하지 않은 이미지 — 건너뜀`, 'warn');
        } else {
          // Convert external URL to base64 immediately for reliable export later
          newPanels[i] = await urlToBase64(img0);
          log(`패널 ${i+1} 완료 (레퍼런스 ${refImages.length}개 사용)`, 'success');
        }
      } catch(e) {
        log(`패널 ${i+1} 실패: ${e.message}`, 'error');
        // 재시도 없이 즉시 실패 처리
      }
      setPanelsRaw([...newPanels]); pnRef.current = [...newPanels];
      // Delay between panels to avoid API rate limits
      if (i < sb.length - 1) await new Promise(r => setTimeout(r, 3000));
    }

    skipSnapshotRef.current = false; // 생성 완료 후 스냅샷 복원
    setCompletedSteps(prev => new Set([...prev, 3]));
    setStep(4);
    // Auto-save panels to Firebase
    if (projectId && currentEpisode) {
      fbSavePhaseQueued(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(e => log('패널 자동저장 실패: ' + e.message, 'error'));
    }
    log(`패널 ${newPanels.filter(Boolean).length}개 생성 완료!`, 'success');
    return newPanels;
  };

  // ======== Full Pipeline ========
  const runFullPipeline = async () => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      const a = await runStep1();
      if (abortRef.current) return;
      const r = await runStep2(a);
      if (abortRef.current) return;
      const s = await runStep3(a);
      if (abortRef.current) return;
      await runStep4(s, r);
      setCompletedSteps(prev => new Set([...prev, 4]));
      // Final save after full pipeline
      if (projectId && currentEpisode) {
        try {
          await fbSaveEpisode(projectId, currentEpisode, {step: 4, completedSteps: [0,1,2,3,4]});
          log('전체 파이프라인 저장 완료', 'info');
        } catch(e) { log('저장 실패: ' + e.message, 'error'); }
      }
      log(`웹툰 ${currentEpisode || 1}화 생성 완료!`, 'success');
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Storyboard Editing Helpers ========
  const startSbEdit = (idx) => {
    setEditingSbPanel(idx);
    setEditingSbData({...storyboard[idx], dialogue: [...(storyboard[idx].dialogue || [])]});
  };
  const cancelSbEdit = () => { setEditingSbPanel(null); setEditingSbData({}); };
  const saveSbEdit = (idx) => {
    const newSb = [...storyboard];
    newSb[idx] = {...newSb[idx], ...editingSbData};
    setStoryboard(newSb);
    setEditingSbPanel(null);
    setEditingSbData({});
    log(`패널 ${idx+1} 수정됨`, 'success');
    // Auto-save to Firebase
    if (projectId && currentEpisode) {
      fbSavePhaseQueued(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
    }
  };
  const deleteSbPanel = (idx) => {
    if (!confirm(`패널 ${idx+1}을 삭제하시겠습니까?`)) return;
    const newSb = storyboard.filter((_, i) => i !== idx);
    const newPanels = panels.filter((_, i) => i !== idx);
    setStoryboard(newSb);
    setPanels(newPanels);
    setEditingSbPanel(null);
    log(`패널 ${idx+1} 삭제됨`, 'info');
    if (projectId && currentEpisode) {
      fbSavePhaseQueued(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
      fbSavePhaseQueued(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(() => {});
    }
  };
  const insertSbPanel = (atIdx) => {
    const newPanel = {
      _uid: 'sb_' + Date.now(),
      panelNumber: atIdx + 1,
      type: 'action',
      shotSize: 'medium',
      cameraAngle: 'eye level',
      mood: 'neutral',
      description: '(새 패널 - 클릭하여 수정)',
      dialogue: [],
      narration: '',
      imagePrompt: '',
      characters: [],
      background: '',
    };
    const newSb = [...storyboard];
    newSb.splice(atIdx, 0, newPanel);
    // Renumber
    newSb.forEach((p, i) => { p.panelNumber = i + 1; });
    const newPanels = [...panels];
    newPanels.splice(atIdx, 0, null);
    setStoryboard(newSb);
    setPanels(newPanels);
    // Auto-save both storyboard AND panels to Firebase to keep indices in sync
    if (projectId && currentEpisode) {
      fbSavePhaseQueued(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
      fbSavePhaseQueued(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(() => {});
    }
    // Auto-open editor for new panel
    setEditingSbPanel(atIdx);
    setEditingSbData({...newPanel, dialogue: []});
    log(`패널 ${atIdx+1} 위치에 새 패널 추가됨`, 'info');
  };
  const handleSbDrop = (targetIdx) => {
    if (draggingSbIdx === null || draggingSbIdx === targetIdx) return;
    const newSb = [...storyboard];
    const newPanels = [...panels];
    const [movedSb] = newSb.splice(draggingSbIdx, 1);
    const [movedPanel] = newPanels.splice(draggingSbIdx, 1);
    const insertAt = targetIdx > draggingSbIdx ? targetIdx - 1 : targetIdx;
    newSb.splice(insertAt, 0, movedSb);
    newPanels.splice(insertAt, 0, movedPanel);
    newSb.forEach((p, i) => { p.panelNumber = i + 1; });
    setStoryboard(newSb);
    setPanels(newPanels);
    setDraggingSbIdx(null);
    log(`패널 순서 변경됨`, 'info');
    if (projectId && currentEpisode) {
      fbSavePhaseQueued(projectId, currentEpisode, 'step3_storyboard', {storyboard: newSb}).catch(() => {});
      fbSavePhaseQueued(projectId, currentEpisode, 'step4_panels', {panels: newPanels, bubbleOverlays}).catch(() => {});
    }
  };

  // ======== Batch Sequential Run (연속 실행 모드) ========
  // Runs full pipeline across multiple episodes with per-step provider overrides
  const [batchRunning, setBatchRunning] = useState(false);
  const [batchProgress, setBatchProgress] = useState(null); // {current, total, episode, step}
  const [showBatchModal, setShowBatchModal] = useState(false);
  const [batchConfig, setBatchConfig] = useState({
    step1Provider:'ninjaChat', step2Provider:'ninjaChat', step3Provider:'ninjaChat', step4Provider:'ninjaChat',
    step1ArtStyle:'', step2ArtStyle:'', step3ArtStyle:'', step4ArtStyle:'',
    forceRerun: false, // 이미 완료된 에피소드도 강제 재실행
  });
  const [batchEpisodeList, setBatchEpisodeList] = useState([]);
  // Storyboard editing state
  const [editingSbPanel, setEditingSbPanel] = useState(null); // index of panel being edited
  const [editingSbData, setEditingSbData] = useState({});
  const [draggingSbIdx, setDraggingSbIdx] = useState(null);
  const [charEditTab, setCharEditTab] = useState({}); // {charId: 'basic'|'outfits'|'prompt'}
  const [dragOverIdx, setDragOverIdx] = useState(null);

  const runBatchPipeline = async (config) => {
    // config: { episodes: [episodeNum, ...], step1Provider, step2Provider, step3Provider, step4Provider, artStyle }
    if (!projectId) { log('프로젝트를 먼저 선택하세요.', 'error'); return; }
    setBatchRunning(true);
    setRunning(true);
    abortRef.current = false;

    const targetEpisodes = config.episodes || [];
    const originalProvider = imageProvider;
    const originalArtStyle = artStyle;
    let completedCount = 0;

    log(`\n===== 연속 실행 모드 시작: ${targetEpisodes.length}개 에피소드 =====`, 'info');
    log(`설정: Step1 ${config.step1Provider}/${config.step1ArtStyle||artStyle}, Step2 ${config.step2Provider}/${config.step2ArtStyle||artStyle}, Step3 ${config.step3Provider}/${config.step3ArtStyle||artStyle}, Step4 ${config.step4Provider}/${config.step4ArtStyle||artStyle}`, 'info');

    try {

      for (let i = 0; i < targetEpisodes.length; i++) {
        if (abortRef.current) { log('연속 실행 중단됨', 'warn'); break; }

        const epNum = targetEpisodes[i];
        setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: '로드 중'});
        log(`\n----- ${epNum}화 시작 (${i+1}/${targetEpisodes.length}) -----`, 'info');

        // Load episode
        setCurrentEpisode(epNum);
        await loadEpisode(epNum);
        // Wait for state to settle
        await new Promise(r => setTimeout(r, 1000));

        // Check if sourceText exists (loaded from Firebase)
        const s1Data = await fbLoadPhase(projectId, epNum, 'step1_analysis');
        const epSourceText = s1Data?.sourceText || '';
        const epInputMode = s1Data?.inputMode || 'scene';

        if (!epSourceText.trim()) {
          log(`${epNum}화: 소스 텍스트 없음 — 건너뜀`, 'warn');
          continue;
        }

        // Check if already fully completed (ALL panels generated)
        if (!config.forceRerun) {
          const s4Data = await fbLoadPhase(projectId, epNum, 'step4_panels');
          const panelArr = s4Data?.panels || [];
          const generated = panelArr.filter(Boolean).length;
          const total = panelArr.length;
          if (total > 0 && generated === total) {
            log(`${epNum}화: 이미 완료됨 (${generated}/${total} 패널) — 건너뜀`, 'info');
            completedCount++;
            continue;
          } else if (generated > 0) {
            log(`${epNum}화: 미완료 (${generated}/${total} 패널) — 처음부터 재실행`, 'info');
          }
        } else {
          log(`${epNum}화: 강제 재실행 모드`, 'info');
        }

        // Set source text for this episode
        setSourceText(epSourceText);
        setInputMode(epInputMode);

        try {
          // Step 1: Story Analysis
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 1: 스토리 분석'});
          setImageProvider(config.step1Provider || 'ninjaChat');
          if (config.step1ArtStyle) setArtStyle(config.step1ArtStyle);
          log(`${epNum}화 Step 1: 스토리 분석 (${config.step1Provider} / ${ART_STYLES[config.step1ArtStyle || artStyle]?.name})`, 'info');
          const analysisResult = await runStep1();
          if (abortRef.current) break;

          // Step 2: Reference Generation
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 2: 레퍼런스 생성'});
          setImageProvider(config.step2Provider || 'ninjaChat');
          if (config.step2ArtStyle) setArtStyle(config.step2ArtStyle);
          log(`${epNum}화 Step 2: 레퍼런스 생성 (${config.step2Provider} / ${ART_STYLES[config.step2ArtStyle || artStyle]?.name})`, 'info');
          const refsResult = await runStep2(analysisResult);
          if (abortRef.current) break;

          // Step 3: Storyboard
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 3: 스토리보드'});
          setImageProvider(config.step3Provider || 'ninjaChat');
          if (config.step3ArtStyle) setArtStyle(config.step3ArtStyle);
          log(`${epNum}화 Step 3: 스토리보드 생성 (${config.step3Provider} / ${ART_STYLES[config.step3ArtStyle || artStyle]?.name})`, 'info');
          const sbResult = await runStep3(analysisResult);
          if (abortRef.current) break;

          // Step 4: Panel Generation
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Step 4: 패널 이미지 생성'});
          setImageProvider(config.step4Provider || 'ninjaChat');
          if (config.step4ArtStyle) setArtStyle(config.step4ArtStyle);
          log(`${epNum}화 Step 4: 패널 이미지 생성 (${config.step4Provider} / ${ART_STYLES[config.step4ArtStyle || artStyle]?.name})`, 'info');
          const panelsResult = await runStep4(sbResult, refsResult);
          if (abortRef.current) break;

          // Save panels & storyboard to Firebase (use return values, not stale closure state)
          setBatchProgress({current: i + 1, total: targetEpisodes.length, episode: epNum, step: 'Firebase 저장 중...'});
          log(`${epNum}화 패널 Firebase 저장 중...`, 'info');
          const panelCount = (panelsResult || []).filter(Boolean).length;
          await fbSavePhaseQueued(projectId, epNum, 'step4_panels', {panels: panelsResult || [], bubbleOverlays: []});
          if (sbResult && sbResult.length > 0) {
            await fbSavePhaseQueued(projectId, epNum, 'step3_storyboard', {storyboard: sbResult});
          }
          await fbSaveEpisode(projectId, epNum, {step: 4, completedSteps: [0,1,2,3,4]});
          log(`${epNum}화 패널 ${panelCount}개 Firebase 저장 완료`, 'success');

          completedCount++;
          log(`${epNum}화 완료! ✅`, 'success');

        } catch(epErr) {
          log(`${epNum}화 오류: ${epErr.message}`, 'error');
          // Continue to next episode on error
          continue;
        }

        // Delay between episodes to avoid rate limits
        if (i < targetEpisodes.length - 1) {
          log('다음 에피소드 대기 중 (5초)...', 'info');
          await new Promise(r => setTimeout(r, 5000));
        }
      }

      log(`\n===== 연속 실행 완료: ${completedCount}/${targetEpisodes.length}개 에피소드 완료 =====`, 'success');
    } catch(e) {
      log('연속 실행 오류: ' + e.message, 'error');
    } finally {
      // Restore original settings
      setImageProvider(originalProvider);
      setArtStyle(originalArtStyle);
      setBatchRunning(false);
      setRunning(false);
      setBatchProgress(null);
    }
  };

  // Find episodes with sourceText for batch run UI
  // forceAll=true: show all episodes with sourceText (including completed ones)
  const getUnprocessedEpisodes = useCallback(async (forceAll = false) => {
    if (!projectId) return [];
    const result = [];
    // Load all episodes in parallel for speed
    const epResults = await Promise.all(episodes.map(async (ep) => {
      try {
        const [s1, s4, s3] = await Promise.all([
          fbLoadPhase(projectId, ep.number, 'step1_analysis', true),
          fbLoadPhase(projectId, ep.number, 'step4_panels', true),
          fbLoadPhase(projectId, ep.number, 'step3_storyboard', true),
        ]);
        return {ep, s1, s3, s4};
      } catch(e) { return {ep, error: e}; }
    }));
    for (let ri = 0; ri < epResults.length; ri++) {
      const {ep, s1, s3, s4, error} = epResults[ri];
      if (error) continue;
      try {
        const hasSource = !!(s1?.sourceText?.trim());
        const hasAnalysis = !!(s1?.analysis);
        const hasStoryboard = !!(s3?.storyboard?.length > 0);
        const panelArr = s4?.panels || [];
        const generatedPanels = panelArr.filter(Boolean).length;
        const totalPanels = panelArr.length;
        const isFullyComplete = totalPanels > 0 && generatedPanels === totalPanels;
        const status = isFullyComplete ? 'complete' : hasStoryboard ? 'step3' : hasAnalysis ? 'step1' : 'none';

        if (hasSource && (forceAll || !isFullyComplete)) {
          result.push({
            number: ep.number,
            title: ep.title || `${ep.number}화`,
            hasAnalysis, hasSource, hasStoryboard, isFullyComplete,
            generatedPanels, totalPanels, status,
          });
        }
      } catch(e) { /* skip */ }
    }
    return result;
  }, [projectId, episodes]);

  const openBatchModal = async () => {
    const eps = await getUnprocessedEpisodes(batchConfig.forceRerun);
    setBatchEpisodeList(eps.map(e => ({...e, selected: !e.isFullyComplete})));
    setShowBatchModal(true);
  };

  const startBatchRun = () => {
    const selectedEps = batchEpisodeList.filter(e => e.selected).map(e => e.number);
    if (selectedEps.length === 0) { log('실행할 에피소드를 선택하세요.', 'warn'); return; }
    setShowBatchModal(false);
    runBatchPipeline({
      episodes: selectedEps,
      step1Provider: batchConfig.step1Provider, step2Provider: batchConfig.step2Provider,
      step3Provider: batchConfig.step3Provider, step4Provider: batchConfig.step4Provider,
      step1ArtStyle: batchConfig.step1ArtStyle || undefined, step2ArtStyle: batchConfig.step2ArtStyle || undefined,
      step3ArtStyle: batchConfig.step3ArtStyle || undefined, step4ArtStyle: batchConfig.step4ArtStyle || undefined,
      forceRerun: batchConfig.forceRerun,
    });
  };

  // ======== Run Single Step ========
  const runSingleStep = async (stepIdx) => {
    setRunning(true); setErrorMsg(''); abortRef.current = false;
    try {
      if (stepIdx === 0) await runStep1();
      else if (stepIdx === 1) await runStep2();
      else if (stepIdx === 2) await runStep3();
      else if (stepIdx === 3) await runStep4();
      else if (stepIdx === 4) { setStep(4); setCompletedSteps(prev => new Set([...prev, 4])); }
    } catch(e) {
      setErrorMsg(e.message);
      log('오류: ' + e.message, 'error');
    } finally { setRunning(false); }
  };

  // ======== Regenerate single panel ========
  // refMode: 'default' (background), 'prevPanel' (use previous panel image), 'both' (background + prev panel)
  const regeneratePanel = async (idx, customPrompt, refMode = 'default') => {
    if (!storyboard[idx]) return;
    setRunning(true);
    try {
      const panel = storyboard[idx];
      const usePrompt = customPrompt || panel.imagePrompt;
      // Update storyboard prompt if custom
      if (customPrompt) {
        const newSb = [...storyboard];
        newSb[idx] = {...newSb[idx], imagePrompt: customPrompt};
        setStoryboard(newSb);
      }
      // Build character states accumulated up to this panel
      const charStates = buildCharacterStates(storyboard, analysis, idx);
      const {refImages, assetDescriptions, charIds: panelCharIds} = buildPanelRefs(panel, sharedAssets, analysis, references, charStates);

      // Add previous panel image as reference based on refMode
      if (refMode !== 'default' && idx > 0) {
        const prevImg = panels[idx - 1];
        if (prevImg && typeof prevImg === 'string' && (prevImg.startsWith('data:') || prevImg.startsWith('http'))) {
          if (refMode === 'prevPanel') {
            // Replace all refs with just the previous panel
            refImages.length = 0;
            assetDescriptions.length = 0;
            refImages.push({image: prevImg, description: 'previous panel — use as PRIMARY reference for visual style, lighting, character appearance, and scene continuity. Maintain identical art style and character details. Only change composition and action as described in the prompt.'});
            assetDescriptions.push('[Previous panel image — use as PRIMARY reference for visual style, lighting, character appearance, and scene continuity. Maintain identical art style and character details. Only change composition and action as described in the prompt.]');
            log(`패널 ${idx+1}: 이전 패널 이미지를 단독 레퍼런스로 사용`, 'info');
          } else if (refMode === 'both') {
            // Add prev panel on top of existing refs
            refImages.push({image: prevImg, description: 'previous panel — use for visual style consistency, lighting reference, and character appearance matching. Do NOT copy the composition.'});
            assetDescriptions.push('[Previous panel image — use for visual style consistency, lighting reference, and character appearance matching. Do NOT copy the composition.]');
            log(`패널 ${idx+1}: 기본 레퍼런스 + 이전 패널 이미지 병합`, 'info');
          }
        } else {
          log(`패널 ${idx+1}: 이전 패널 이미지 없음 — 기본 레퍼런스 사용`, 'warn');
        }
      }

      // Determine aspect ratio from panel data (same logic as runStep4)
      const regenAR = panel.imageSize || (() => {
        const shot = (panel.shotSize || 'medium').toLowerCase();
        const type = (panel.type || '').toLowerCase();
        const angle = (panel.cameraAngle || '').toLowerCase();
        if (shot.includes('extreme_wide') || type === 'establishing') return '16:9';
        if (shot.includes('wide') && !shot.includes('medium')) return '3:2';
        if (shot === 'extreme_close') return '2:3';
        if (shot.includes('close') && !shot.includes('medium')) return '3:4';
        if (angle.includes('over_shoulder')) return '3:2';
        if (angle.includes('birds_eye')) return '1:1';
        if (type === 'emotion' || type === 'closeup') return '3:4';
        if (type === 'action') return '3:2';
        if (type === 'dialogue') return '3:4';
        return '1:1';
      })();
      // Use short style hint when using previous panel reference — art style name is still included
      const skipStyle = refMode !== 'default';
      // Delta prompt: 이전 패널 레퍼런스 사용 시 deltaPrompt가 있으면 변경사항만 전달
      const hasPrevRef = refMode !== 'default' && idx > 0 && panels[idx - 1];
      const isDeltaT = ['continuous', 'cut_to_reaction', 'new_angle_same_scene'].includes(panel.sceneTransition);
      const useDeltaRegen = !customPrompt && hasPrevRef && isDeltaT && panel.deltaPrompt;
      const regenPrompt = useDeltaRegen ? panel.deltaPrompt : usePrompt;
      if (useDeltaRegen) log(`패널 ${idx+1}: 델타 프롬프트 사용 (${panel.sceneTransition})`, 'info');
      log(`패널 ${idx+1} 재생성 중... (ref ${refImages.length}개, 비율:${regenAR}${skipStyle ? ', 스타일힌트' : ', 풀스타일'})`);
      const images = await callImage(regenPrompt, {referenceImages: refImages, assetDescriptions, aspectRatio: regenAR, characterIds: panelCharIds, skipStyle});
      const newPanels = [...panels];
      newPanels[idx] = await urlToBase64(images[0]);
      setPanels(newPanels);
      // Auto-save changed panel only (not all 49)
      autoSaveSinglePanel(idx, newPanels[idx], newPanels, bubbleOverlays);
      log(`패널 ${idx+1} 재생성 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single character reference (updates shared asset) ========
  const regenerateCharRef = async (charId, customPrompt) => {
    if (!analysis) return;
    const char = analysis.characters.find(c => c.id === charId);
    if (!char) return;
    setRunning(true);
    try {
      console.log(`[regenerateCharRef] ${char.name} (${charId})`);
      const finalPrompt = buildCharRefPrompt(charId, {customPrompt});
      console.log(`[regenerateCharRef] 최종 프롬프트 (첫 300자):`, finalPrompt.substring(0, 300));
      log(`${char.name} 기본 레퍼런스 재생성 중...`);
      const images = await callImage(finalPrompt);
      setReferences(prev => ({...prev, characters: {...prev.characters, [charId]: images[0]}}));

      // Always save to sharedAssets (base character image)
      const updatedRefPrompt = customPrompt || char.refPrompt;
      const assetData = {name: char.name, role: char.role, age: char.age, gender: char.gender, appearance: char.appearance, outfit: char.outfit, accessories: char.accessories || '', personality: char.personality, refPrompt: updatedRefPrompt, outfitPresets: char.outfitPresets || {}, image: images[0]};
      setSharedAssets(prev => ({...prev, characters: {...prev.characters, [charId]: {...assetData, assetId: charId, type: 'characters'}}}));
      if (projectId) await fbSaveAsset(projectId, 'characters', charId, assetData);
      log(`${char.name} 레퍼런스 재생성 → 공유 에셋 업데이트 완료`, 'success');
    } catch(e) { log(`재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Generate/regenerate outfit preset reference image ========
  const regeneratePresetRef = async (charId, presetName) => {
    // Use sharedAssets as primary source (project-level), fallback to analysis
    const assetChar = sharedAssets.characters?.[charId];
    const analysisChar = analysis?.characters?.find(c => c.id === charId);
    const charName = assetChar?.name || analysisChar?.name || charId;
    const allPresets = {...(assetChar?.outfitPresets || {}), ...(analysisChar?.outfitPresets || {})};
    const preset = allPresets[presetName];
    if (!preset?.outfit) { log(`"${presetName}" 의상 설명을 먼저 입력해주세요.`, 'error'); return; }
    setRunning(true);
    try {
      log(`${charName} — "${presetName}" 의상 레퍼런스 생성 중...`);
      // Build prompt: use buildCharRefPrompt if analysis available, otherwise construct from sharedAssets
      let finalPrompt;
      if (analysisChar) {
        finalPrompt = buildCharRefPrompt(charId, {
          outfitOverride: {outfit: preset.outfit, accessories: preset.accessories || ''}
        });
      } else {
        // Fallback: build prompt from sharedAssets data
        let base = assetChar?.refPrompt || `${charName}, ${assetChar?.appearance || ''}`;
        const newOutfitDesc = `Outfit: ${preset.outfit}${preset.accessories ? '. Accessories: ' + preset.accessories : ''}.`;
        const outfitRegex = /Outfit:\s*[^\].\n]*\.?/i;
        if (outfitRegex.test(base)) base = base.replace(outfitRegex, newOutfitDesc);
        base += `\n\n[CRITICAL OUTFIT OVERRIDE] This character MUST wear EXACTLY: ${preset.outfit}.`;
        if (preset.accessories) base += ` Accessories: ${preset.accessories}.`;
        base += `\n[IDENTITY PRESERVATION] The character's face, hair color, hairstyle, eye color, eye shape, skin tone, facial features, and body type MUST remain EXACTLY THE SAME as the reference image. ONLY the outfit and accessories should change.`;
        finalPrompt = base + getCharSuffix();
      }
      // 기본 캐릭터 이미지를 레퍼런스로 전달 → 얼굴/체형 일관성 유지
      const callOpts = {};
      const baseImage = assetChar?.image;
      if (baseImage) {
        callOpts.referenceImages = [{
          image: baseImage,
          description: `Character: ${charName} — base character reference. Keep the EXACT SAME face, hair color, hairstyle, eye color, skin tone, and body type. ONLY change the outfit and accessories as described in the prompt.`
        }];
        log(`${charName} 기본 이미지를 레퍼런스로 전달 (얼굴/체형 유지)`, 'info');
      }
      const images = await callImage(finalPrompt, callOpts);
      const presetImage = images[0];

      // Save preset image to outfitPresets (in sharedAssets + analysis if available + Firebase)
      const updatedPreset = {...preset, image: presetImage};
      const updatedPresets = {...allPresets, [presetName]: updatedPreset};
      if (analysisChar) updateAnalysisChar(charId, 'outfitPresets', updatedPresets);

      // Always update sharedAssets
      setSharedAssets(prev => {
        const existing = prev.characters?.[charId];
        if (!existing) return prev;
        return {...prev, characters: {...prev.characters, [charId]: {...existing, outfitPresets: updatedPresets}}};
      });

      // Save to Firebase shared_assets
      if (projectId) {
        const asset = sharedAssets.characters?.[charId];
        if (asset) {
          await fbSaveAsset(projectId, 'characters', charId, {...asset, outfitPresets: updatedPresets});
        }
      }

      log(`${charName} — "${presetName}" 의상 레퍼런스 생성 완료 ✓`, 'success');
    } catch(e) { log(`프리셋 레퍼런스 생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Regenerate single asset from library ========
  const regenerateAsset = async (assetType, assetId, customPrompt) => {
    const asset = sharedAssets[assetType]?.[assetId];
    if (!asset) return;
    setRunning(true);
    try {
      log(`${asset.name} 에셋 재생성 중...`);
      let finalPrompt, opts = {};
      if (customPrompt) {
        finalPrompt = customPrompt;
        if (assetType === 'backgrounds') opts.aspectRatio = '16:9';
        else if (assetType === 'props') opts.aspectRatio = '1:1';
      } else {
        let suffix = '';
        if (assetType === 'characters') suffix = getCharSuffix();
        else if (assetType === 'backgrounds') { suffix = getBgSuffix(); opts.aspectRatio = '16:9'; }
        else if (assetType === 'props') { suffix = getPropSuffix(); opts.aspectRatio = '1:1'; }
        finalPrompt = asset.refPrompt + suffix;
      }
      const images = await callImage(finalPrompt, opts);
      const updated = {...asset, image: images[0], refPrompt: customPrompt || asset.refPrompt};
      setSharedAssets(prev => ({...prev, [assetType]: {...prev[assetType], [assetId]: updated}}));
      if (assetType === 'characters') setReferences(prev => ({...prev, characters: {...prev.characters, [assetId]: images[0]}}));
      if (assetType === 'backgrounds') setReferences(prev => ({...prev, backgrounds: {...prev.backgrounds, [assetId]: images[0]}}));
      if (projectId) await fbSaveAsset(projectId, assetType, assetId, updated);
      log(`${asset.name} 에셋 재생성 완료`, 'success');
    } catch(e) { log(`에셋 재생성 실패: ${e.message}`, 'error'); }
    finally { setRunning(false); }
  };

  // ======== Upload image as asset reference ========
  const uploadAssetImage = (assetType, assetId, presetName) => {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';
    input.onchange = async (e) => {
      const file = e.target.files?.[0];
      if (!file) return;
      try {
        const dataUrl = await new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
        const asset = sharedAssets[assetType]?.[assetId];
        if (!asset) return;

        if (presetName) {
          // 의상 프리셋 이미지 업로드
          const char = analysis?.characters?.find(c => c.id === assetId);
          const presets = char?.outfitPresets || asset.outfitPresets || {};
          const preset = presets[presetName];
          if (!preset) return;
          const updatedPreset = {...preset, image: dataUrl};
          const updatedPresets = {...presets, [presetName]: updatedPreset};
          updateAnalysisChar(assetId, 'outfitPresets', updatedPresets);
          setSharedAssets(prev => {
            const existing = prev.characters?.[assetId];
            if (!existing) return prev;
            return {...prev, characters: {...prev.characters, [assetId]: {...existing, outfitPresets: updatedPresets}}};
          });
          if (projectId) {
            await fbSaveAsset(projectId, 'characters', assetId, {...asset, outfitPresets: updatedPresets});
          }
          log(`${asset.name} — "${presetName}" 이미지 업로드 완료 ✓`, 'success');
        } else {
          // 기본 에셋 이미지 업로드
          const updated = {...asset, image: dataUrl};
          setSharedAssets(prev => ({...prev, [assetType]: {...prev[assetType], [assetId]: updated}}));
          if (assetType === 'characters') {
            setReferences(prev => ({...prev, characters: {...prev.characters, [assetId]: dataUrl}}));
          } else if (assetType === 'backgrounds') {
            setReferences(prev => ({...prev, backgrounds: {...prev.backgrounds, [assetId]: dataUrl}}));
          }
          if (projectId) await fbSaveAsset(projectId, assetType, assetId, updated);
          log(`${asset.name} 이미지 업로드 완료 ✓`, 'success');
        }
      } catch(err) {
        log(`이미지 업로드 실패: ${err.message}`, 'error');
      }
    };
    input.click();
  };

  // Save Project & Episodes
  const saveProject = async () => {
    try {
      if (!projectId || !projectTitle) {
        const id = projectId || 'proj_' + Date.now();
        if (!projectId) setProjectId(id);
        await fbSaveProject(id, {title: projectTitle || '무제'});
      }

      // If no episode selected, create first one
      if (!currentEpisode) {
        await createNewEpisode();
        return;
      }

      // Save episode metadata
      const existingTitle = episodes.find(e => e.number === currentEpisode)?.title;
      const episodeTitle = (existingTitle && existingTitle !== `${currentEpisode}화`) ? existingTitle : (analysis?.title || `${currentEpisode}화`);
      const episodeData = {
        title: episodeTitle,
        number: currentEpisode,
        step,
        completedSteps: [...completedSteps],
        createdAt: episodes.find(e => e.number === currentEpisode)?.createdAt || new Date().toISOString(),
      };
      await fbSaveEpisode(projectId, currentEpisode, episodeData);

      // Save phases sequentially to avoid Firestore write stream exhaustion
      if (sourceText.trim() || analysis) await fbSavePhaseQueued(projectId, currentEpisode, 'step1_analysis', {analysis, sourceText, inputMode});
      if (Object.keys(references.characters).length > 0) await fbSavePhaseQueued(projectId, currentEpisode, 'step2_references', {characterIds: Object.keys(references.characters), backgroundIds: Object.keys(references.backgrounds), hasImages: true}, true);
      if (storyboard.length > 0) await fbSavePhaseQueued(projectId, currentEpisode, 'step3_storyboard', {storyboard});
      if (panels.some(p => p)) await fbSavePhaseQueued(projectId, currentEpisode, 'step4_panels', {panels});

      // Update episodes state with saved info
      setEpisodes(prev => prev.map(e =>
        e.number === currentEpisode
          ? {...e, title: episodeTitle, step, completedSteps: [...completedSteps]}
          : e
      ));

      log('프로젝트 저장 완료', 'success');
    } catch(e) { log('저장 실패: ' + e.message, 'error'); }
  };

  const loadProject = async (pid) => {
    try {
      log('프로젝트 로드 중...');
      const proj = await fbLoadProject(pid);
      setProjectId(pid);
      setProjectTitle(proj.title || '');

      // Load shared assets
      let assets = {characters:{}, backgrounds:{}, props:{}};
      try {
        assets = await fbLoadAllAssets(pid);
        setSharedAssets(assets);
        const totalAssets = Object.keys(assets.characters).length + Object.keys(assets.backgrounds).length + Object.keys(assets.props).length;
        if (totalAssets > 0) log(`공유 에셋 ${totalAssets}개 로드 완료`, 'success');
      } catch(e) { log('공유 에셋 로드 실패: ' + e.message, 'error'); }

      // Load LoRA models
      try { await loadLoraModels(pid); } catch(e) { /* ignore */ }

      // Load episodes
      const episodeList = await fbListEpisodes(pid);
      setEpisodes(episodeList);

      if (episodeList.length > 0) {
        // In editor mode, only load first published episode; in producer mode, load first episode
        const firstEp = editorMode
          ? episodeList.find(ep => ep.publishedToEditor)
          : episodeList[0];
        if (firstEp) {
          const result = await loadEpisode(firstEp.number, pid, assets);
          // In editor mode, auto-open bubble editor
          if (editorMode && result) {
            openBubbleEditor(result.panels, result.episodeNum, result.storyboard);
          }
        } else if (editorMode) {
          // No published episodes — show nothing
          log('공개된 에피소드가 없습니다.', 'info');
        }
      } else if (!editorMode) {
        // Create first episode if none exist (producer mode only)
        const newEpisode = {number: 1, title: '1화', createdAt: new Date().toISOString()};
        setEpisodes([newEpisode]);
        setCurrentEpisode(1);
      }

      setShowProjects(false);
      log('프로젝트 로드 완료', 'success');
    } catch(e) { log('로드 실패: ' + e.message, 'error'); }
  };

  const loadProjectList = async () => {
    try {
      const all = await fbListProjects();
      if (editorMode) {
        // In editor mode, only show projects that have at least one published episode
        const db = getDb();
        if (!db) { setProjectList([]); return; }
        const filtered = [];
        for (const p of all) {
          try {
            const epSnap = await db.collection('webtoon_projects').doc(p.id).collection('episodes')
              .where('publishedToEditor', '==', true).limit(1).get();
            if (!epSnap.empty) filtered.push(p);

  const cgApplyTitleEffect = (canvas, ctx, title, font, effect, color, size) => {
    const w = canvas.width;
    const h = canvas.height;
    const yPos = (cgTitleYPercent / 100) * h;

    ctx.font = `bold ${size}px "${font}"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = color;

    switch (effect) {
      case '깔끔': // Clean: white text, thin black outline
        ctx.strokeStyle = '#000000';
        ctx.lineWidth = 3;
        ctx.strokeText(title, w / 2, yPos);
        ctx.fillStyle = color;
        ctx.fillText(title, w / 2, yPos);
        break;

      case '네온': // Neon: glowing colored text
        ctx.shadowColor = color;
        ctx.shadowBlur = 20;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.strokeStyle = color;
        ctx.lineWidth = 2;
        ctx.globalAlpha = 0.8;
        ctx.strokeText(title, w / 2, yPos);
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#ffffff';
        ctx.fillText(title, w / 2, yPos);
        break;

      case '그림자': // Shadow: bold text with strong drop shadow
        ctx.shadowColor = 'rgba(0,0,0,0.7)';
        ctx.shadowBlur = 15;
        ctx.shadowOffsetX = 4;
        ctx.shadowOffsetY = 6;
        ctx.fillStyle = color;
        ctx.fillText(title, w / 2, yPos);
        break;

      case '각인': // Engraved: dark text with inner highlight (embossed)
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.fillText(title, w / 2 + 2, yPos - 2);
        ctx.fillStyle = color;
        ctx.fillText(title, w / 2, yPos);
        break;

      case '그라데이션': // Gradient: text with color gradient
        const gradient = ctx.createLinearGradient(w / 2 - size * 2, yPos, w / 2 + size * 2, yPos);
        gradient.addColorStop(0, '#ff6b9d');
        gradient.addColorStop(0.5, color);
        gradient.addColorStop(1, '#c06c84');
        ctx.fillStyle = gradient;
        ctx.fillText(title, w / 2, yPos);
        break;

      case '빈티지': // Vintage: warm-toned text with subtle texture
        ctx.fillStyle = '#d4a574';
        ctx.fillText(title, w / 2 + 1, yPos + 1);
        ctx.fillStyle = '#f5deb3';
        ctx.fillText(title, w / 2, yPos);
        break;

      case '공포': // Horror: red/dark text with rough edges
        ctx.strokeStyle = '#8b0000';
        ctx.lineWidth = 4;
        ctx.globalAlpha = 0.7;
        for (let i = 0; i < 3; i++) {
          ctx.strokeText(title, w / 2 + Math.random() * 4 - 2, yPos + Math.random() * 4 - 2);
        }
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#cc0000';
        ctx.fillText(title, w / 2, yPos);
        break;

      case '판타지': // Fantasy: gold/silver metallic text with glow
        ctx.shadowColor = '#ffd700';
        ctx.shadowBlur = 20;
        ctx.shadowOffsetX = 0;
        ctx.shadowOffsetY = 0;
        ctx.fillStyle = '#ffd700';
        ctx.fillText(title, w / 2, yPos);
        ctx.strokeStyle = '#ffa500';
        ctx.lineWidth = 2;
        ctx.strokeText(title, w / 2, yPos);
        break;

      default:
        ctx.fillStyle = color;
        ctx.fillText(title, w / 2, yPos);
    }
  };

  const cgRenderWithTitle = async (imageUrl, titleText, titleFont, titleEffect, titleColor, titleSize) => {
    // Convert external URL to blob URL to avoid CORS issues with canvas
    let localUrl = imageUrl;
    if (imageUrl && imageUrl.startsWith('http')) {
      try {
        const resp = await fetch(imageUrl);
        const blob = await resp.blob();
        localUrl = URL.createObjectURL(blob);
      } catch (e) {
        console.warn('[cgRenderWithTitle] fetch→blob 변환 실패, data URL로 시도:', e.message);
        // If it's already a data URL or fetch fails, use as-is
      }
    }
    return new Promise((resolve) => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        canvas.width = 720;
        canvas.height = 1098;
        const ctx = canvas.getContext('2d');

        // Draw the base cover image (scaled to fit)
        const scale = Math.max(canvas.width / img.width, canvas.height / img.height);
        const x = (canvas.width - img.width * scale) / 2;
        const y = (canvas.height - img.height * scale) / 2;
        ctx.drawImage(img, x, y, img.width * scale, img.height * scale);

        // Apply title
        if (titleText && cgIncludeTitle) {
          cgApplyTitleEffect(canvas, ctx, titleText, titleFont, titleEffect, titleColor, titleSize);
        }

        // Clean up blob URL if we created one
        if (localUrl !== imageUrl && localUrl.startsWith('blob:')) URL.revokeObjectURL(localUrl);
        resolve(canvas.toDataURL('image/jpeg', 0.95));
      };
      img.onerror = () => {
        log('이미지 로드 실패', 'error');
        if (localUrl !== imageUrl && localUrl.startsWith('blob:')) URL.revokeObjectURL(localUrl);
        resolve(null);
      };
      img.src = localUrl;
    });
  };

  // 패널 이미지 재로딩 (Firebase에서 최신 이미지만 가져오기)
  const reloadPanelImage = async (panelIndex, editorPageIdx, objId) => {

  // Firebase에 개별 패널 이미지만 저장 — 내부 로직 (UI 잠금 없음)
  const _saveSinglePanelInner = async (pid, epNum, panelIdx, panelData, allPanels, overlays) => {
    const db = getDb(); if (!db) throw new Error('DB 연결 없음');
    const phaseRef = db.collection('webtoon_projects').doc(pid).collection('episodes').doc(String(epNum)).collection('phases').doc('step4_panels');
    const phaseDoc = await phaseRef.get();

    if (!phaseDoc.exists) {
      // 기존 저장 데이터 없음 — 전체 저장 fallback
      console.log('[saveSinglePanel] 기존 데이터 없음, 전체 저장 fallback');
      await _fbSavePhaseInner(pid, epNum, 'step4_panels', {panels: allPanels, bubbleOverlays: overlays});
      return;
    }

    const existingData = phaseDoc.data();
    const imgColl = phaseRef.collection('images');

    // 1) 해당 패널의 새 이미지를 토큰화
    const existingPanels = existingData.panels || [];
    const newImgs = [];
    const tokenized = stripBase64(panelData, newImgs, 'panels_' + panelIdx);

    // 기존 panels 배열에서 해당 인덱스의 이전 토큰 ID 찾기
    const oldToken = existingPanels[panelIdx];
    const oldImgId = (typeof oldToken === 'string' && oldToken.startsWith('[img:') && oldToken.endsWith(']'))
      ? oldToken.slice(5, -1) : null;

    // 기존 panels 배열 업데이트 (해당 인덱스만 교체)
    const updatedPanels = [...existingPanels];
    while (updatedPanels.length < allPanels.length) updatedPanels.push(null);
    updatedPanels[panelIdx] = tokenized;

    // 2) 메인 문서 업데이트 (panels 배열만 변경)
    await phaseRef.update({
      panels: updatedPanels,
      imageCount: existingData.imageCount || 0,
      savedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    // 3) 이전 이미지 문서 삭제 (해당 패널의 것만)
    if (oldImgId) {
      try {
        const oldDoc = await imgColl.doc(oldImgId).get();
        if (oldDoc.exists) {
          const oldData = oldDoc.data();
          if (oldData.chunks) {
            for (let c = 0; c < oldData.chunks; c++) {
              await imgColl.doc(oldImgId + '_c' + c).delete();
            }
          }
          await imgColl.doc(oldImgId).delete();
        }
      } catch(e) { console.warn('[saveSinglePanel] old image cleanup:', e.message); }
    }

    // 4) 새 이미지 문서 저장 (1개만)
    const CHUNK_SIZE = 800000;
    for (const im of newImgs) {
      if (im.data.length > 900000) {
        const cn = Math.ceil(im.data.length / CHUNK_SIZE);
        await imgColl.doc(im.id).set({key: im.key, chunks: cn});
        for (let c = 0; c < cn; c++) {
          await imgColl.doc(im.id + '_c' + c).set({data: im.data.substring(c * CHUNK_SIZE, (c + 1) * CHUNK_SIZE), idx: c});
        }
      } else {
        await imgColl.doc(im.id).set({key: im.key, data: im.data});
      }
    }
    // 캐시 무효화
    clearPhaseCache(pid, epNum, 'step4_panels');
    console.log(`[saveSinglePanel] 패널 ${panelIdx+1}: 이미지 ${newImgs.length}개 저장 (전체 ${allPanels.length}개 중 1개만)`);
  };

  // 패널 이미지 ZIP 다운로드 (메모리 내 panels 배열에서 직접, Firebase 불필요)
  const downloadPanelsZip = async () => {
    const validPanels = panels.map((p, i) => (p && typeof p === 'string' && (p.startsWith('data:') || p.startsWith('http'))) ? {img: p, idx: i} : null).filter(Boolean);
    console.log(`[downloadPanelsZip] panels: ${panels.length}개, valid: ${validPanels.length}개`);
    if (validPanels.length === 0) { log('다운로드할 패널 이미지가 없습니다', 'error'); return; }
    try {
      log(`패널 ${validPanels.length}개 ZIP 다운로드 중...`, 'info');
      const zip = new JSZip();
      let added = 0;
      for (const {img, idx} of validPanels) {
        let imgData = img;
        if (img.startsWith('http')) {
          try {
            const resp = await fetch('/api/proxy-image?url=' + encodeURIComponent(img));
            const data = await resp.json();
            if (data.dataUri) imgData = data.dataUri;
          } catch(e) { console.warn(`[downloadPanelsZip] proxy fail panel ${idx}:`, e.message); }
        }
        if (imgData.startsWith('data:')) {
          try {
            // fetch로 data URI → blob 변환 (가장 안전한 방식)
            const resp = await fetch(imgData);
            const blob = await resp.blob();
            const ext = blob.type === 'image/jpeg' ? 'jpg' : blob.type === 'image/webp' ? 'webp' : 'png';
            zip.file(`panel_${String(idx+1).padStart(2,'0')}.${ext}`, blob);
            added++;
          } catch(b64Err) {
            console.warn(`[downloadPanelsZip] panel ${idx} decode fail:`, b64Err.message);
          }
        }
      }
      if (added === 0) { log('ZIP에 추가된 이미지가 없습니다', 'error'); return; }
      console.log(`[downloadPanelsZip] ZIP 생성 중... (${added}개 파일)`);
      const blob = await zip.generateAsync({type: 'blob'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `${analysis?.title || 'webtoon'}_${currentEpisode || ''}화_panels.zip`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      log(`✓ ${added}개 패널 ZIP 다운로드 완료`, 'success');
    } catch(e) { log(`ZIP 다운로드 실패: ${e.message}`, 'error'); console.error('[downloadPanelsZip]', e); }
  };

  const exportWebtoonPDF = async () => {
    const validPanels = storyboard.map((sb, i) => panels[i] ? {img: panels[i], sb, idx: i} : null).filter(Boolean);
    if (validPanels.length === 0) { log('내보낼 패널 이미지가 없습니다', 'error'); return; }
    try {
      setRunning(true);
      log(`PDF 내보내기 시작... (${validPanels.length}개 패널, 말풍선 합성 포함)`, 'info');
      const { jsPDF } = window.jspdf;
      const pdf = new jsPDF({orientation: 'portrait', unit: 'mm', format: 'a4'});
      const pageW = pdf.internal.pageSize.getWidth();
      const pageH = pdf.internal.pageSize.getHeight();
      const margin = 5;
      const contentW = pageW - margin * 2;

      for (let i = 0; i < validPanels.length; i++) {
        if (i > 0) pdf.addPage();
        const {img, sb, idx} = validPanels[i];

        // 말풍선 오버레이가 있으면 합성된 이미지 사용
        let finalImg = img;
        if (bubbleOverlays.length > 0) {
          try {
            const merged = await flattenPanelWithBubbles(idx);
            if (merged && merged !== img) finalImg = merged;
          } catch(e) { /* use original */ }
        }

        const image = await new Promise((resolve, reject) => {
          const im = new Image(); im.crossOrigin = 'anonymous';
          im.onload = () => resolve(im); im.onerror = reject; im.src = finalImg;
        });

        const imgRatio = image.width / image.height;
        let drawW = contentW;
        let drawH = drawW / imgRatio;
        const maxH = pageH - margin * 2 - 4;
        if (drawH > maxH) { drawH = maxH; drawW = drawH * imgRatio; }
        const x = (pageW - drawW) / 2;
        const y = margin;

        const format = finalImg.startsWith('data:image/png') ? 'PNG' : 'JPEG';
        pdf.addImage(finalImg, format, x, y, drawW, drawH);

        log(`패널 ${idx + 1}/${validPanels.length} 추가 완료`, 'info');
      }

      const title = analysis?.title || 'webtoon';
      const epLabel = currentEpisode ? `_ep${currentEpisode}` : '';
      pdf.save(`${title}${epLabel}.pdf`);
      log(`✓ PDF 내보내기 완료! (${validPanels.length}개 패널)`, 'success');
    } catch(e) {
      log(`PDF 내보내기 실패: ${e.message}`, 'error');
      console.error('PDF export error:', e);
    } finally { setRunning(false); }
  };

  // ======== RENDER ========
  const showPreview = (src, title) => { setPreviewImage(src); setPreviewTitle(title || ''); };

  // Helper: get full prompt for asset type (uses current art style)
  const getCharSuffix = () => ', character reference sheet, full body, front view, clean background' + (artStyle === 'custom' ? (customStylePrompt ? ', ' + customStylePrompt : '') : ((ART_STYLES[artStyle] || ART_STYLES.naverWebtoon).charSuffix || ''));
  const getBgSuffix = () => ', no characters, detailed environment, wide shot' + (artStyle === 'custom' ? (customStylePrompt ? ', ' + customStylePrompt : '') : ((ART_STYLES[artStyle] || ART_STYLES.naverWebtoon).bgSuffix || ''));
  const getPropSuffix = () => ', single object, centered, clean white background, detailed illustration' + (artStyle === 'custom' ? (customStylePrompt ? ', ' + customStylePrompt : '') : ((ART_STYLES[artStyle] || ART_STYLES.naverWebtoon).propSuffix || ''));

  const getAssetFullPrompt = (assetType, refPrompt) => {
    if (assetType === 'characters') return refPrompt + getCharSuffix();
    if (assetType === 'backgrounds') return refPrompt + getBgSuffix();
    if (assetType === 'props') return refPrompt + getPropSuffix();
    return refPrompt;
  };

  // ======== 통합 캐릭터 레퍼런스 프롬프트 빌더 ========
  // 캐릭터 이미지 프롬프트에 영향을 주는 모든 요소를 한 곳에서 조립
  // opts.outfitOverride: {outfit, accessories} — 의상 프리셋용 오버라이드
  // opts.customPrompt: 사용자가 직접 입력한 프롬프트 (이 경우 suffix/contrast만 스킵)
  const buildCharRefPrompt = (charId, opts = {}) => {
    if (!analysis) return '';
    const char = analysis.characters.find(c => c.id === charId);
    if (!char) return '';

    // 1) 커스텀 프롬프트가 있으면 그대로 사용 (suffix/contrast 없음)
    if (opts.customPrompt) return opts.customPrompt;

    // 2) 베이스: refPrompt
    let base = char.refPrompt || '';

    // 3) 의상 오버라이드 (프리셋 레퍼런스 생성 시)
    if (opts.outfitOverride) {
      const ov = opts.outfitOverride;
      const newOutfitDesc = `Outfit: ${ov.outfit}${ov.accessories ? '. Accessories: ' + ov.accessories : ''}.`;
      const outfitRegex = /Outfit:\s*\[?[^\].\n]*\]?\.?/i;
      const outfitRegex2 = /Outfit:\s*[^.]*\./i;
      if (outfitRegex.test(base)) {
        base = base.replace(outfitRegex, newOutfitDesc);
      } else if (outfitRegex2.test(base)) {
        base = base.replace(outfitRegex2, newOutfitDesc);
      }
      base += `\n\n[CRITICAL OUTFIT OVERRIDE] This character MUST wear EXACTLY: ${ov.outfit}.`;
      if (ov.accessories) base += ` Accessories: ${ov.accessories}.`;
      base += `\n[IDENTITY PRESERVATION] The character's face, hair color, hairstyle, eye color, eye shape, skin tone, facial features, and body type MUST remain EXACTLY THE SAME as the reference image. ONLY the outfit and accessories should change. Do NOT alter facial features, hair, or body proportions.`;
    }

    // 4) 고유 시각 특성
    const distinctInfo = char.distinctFeatures ? `\nThis character's unique visual identity: ${char.distinctFeatures}.` : '';

    // 5) 스타일별 캐릭터 서픽스
    const suffix = getCharSuffix();

    // 6) 다른 캐릭터와 차별화 지시
    const others = analysis.characters.filter(c => c.id !== charId);
    let contrastSuffix = '';
    if (others.length > 0) {
      const otherDescs = others.map(oc =>
        `${oc.name}: ${oc.appearance?.substring(0, 100)}${oc.distinctFeatures ? ' [distinct: ' + oc.distinctFeatures + ']' : ''}`
      ).join('; ');
      contrastSuffix = `\n\nIMPORTANT: This character must look COMPLETELY DIFFERENT from: ${otherDescs}. Ensure distinct hair color, hairstyle, face shape, and body type.`;
    }

    // 조립: refPrompt + distinctFeatures + charSuffix + contrastSuffix
    return base + distinctInfo + suffix + contrastSuffix;
  };

  // ======== 에셋 라이브러리 공용 렌더 (Step 1 인라인 + 모달 양쪽에서 사용) ========
  const renderAssetLibrary = (inline = false) => {
    // Use sharedAssets (project-level) for counts — NOT episode-specific analysis
    const charTotal = Object.keys(sharedAssets.characters).length;
    const charDone = Object.values(sharedAssets.characters).filter(c => c.image).length;
    const bgTotal = Object.keys(sharedAssets.backgrounds).length;
    const bgDone = Object.values(sharedAssets.backgrounds).filter(b => b.image).length;
    const propTotal = Object.keys(sharedAssets.props).length;
    const propDone = Object.values(sharedAssets.props).filter(p => p.image).length;
    const allDone = charDone === charTotal && bgDone === bgTotal && propDone === propTotal && (charTotal + bgTotal + propTotal) > 0;
    const missingCount = (charTotal - charDone) + (bgTotal - bgDone) + (propTotal - propDone);

    // 개별 타입 생성 핸들러
    const runRefByType = async (type) => {
      setRunning(true); setErrorMsg(''); abortRef.current = false;
      try {
        if (type === 'characters') await runStep2Characters();
        else if (type === 'backgrounds') await runStep2Backgrounds();
        else if (type === 'props') await runStep2Props();
      } catch(e) { setErrorMsg(e.message); log('오류: ' + e.message, 'error'); }
      finally { setRunning(false); }
    };

    return (
      <div>
        {/* 레퍼런스 생성 버튼 + 상태 (인라인일 때만) */}
        {inline && analysis && (
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
            <button className="btn btn-primary btn-sm" onClick={()=>runSingleStep(1)} disabled={running}>
              {allDone ? '전체 재생성' : `전체 생성 (${missingCount}개)`}
            </button>
            <button className="btn btn-outline btn-sm" onClick={()=>runRefByType('characters')} disabled={running || charTotal === 0}
              style={{borderColor:'#7c4dff',color:'#7c4dff'}}>
              캐릭터 {charDone < charTotal ? `생성 (${charTotal - charDone})` : '재생성'}
            </button>
            <button className="btn btn-outline btn-sm" onClick={()=>runRefByType('backgrounds')} disabled={running || bgTotal === 0}
              style={{borderColor:'#00bfa5',color:'#00bfa5'}}>
              배경 {bgDone < bgTotal ? `생성 (${bgTotal - bgDone})` : '재생성'}
            </button>
            <button className="btn btn-outline btn-sm" onClick={()=>runRefByType('props')} disabled={running || propTotal === 0}
              style={{borderColor:'#ff9100',color:'#ff9100'}}>
              소품 {propDone < propTotal ? `생성 (${propTotal - propDone})` : '재생성'}
            </button>
            <span style={{fontSize:12,color:'var(--text2)',marginLeft:4}}>
              캐릭터 <strong style={{color: charDone === charTotal && charTotal > 0 ? 'var(--success)' : 'var(--err)'}}>{charDone}/{charTotal}</strong>
              {' · '}배경 <strong style={{color: bgDone === bgTotal && bgTotal > 0 ? 'var(--success)' : 'var(--err)'}}>{bgDone}/{bgTotal}</strong>
              {propTotal > 0 && <>{' · '}소품 <strong style={{color: propDone === propTotal ? 'var(--success)' : 'var(--err)'}}>{propDone}/{propTotal}</strong></>}
            </span>
            {running && <span className="status-badge running">생성 중...</span>}
          </div>
        )}

        {/* 탭 */}
        <div className="asset-tabs">
          <button className={`asset-tab ${assetTab==='characters'?'active':''}`} onClick={()=>setAssetTab('characters')}>캐릭터 ({Object.keys(sharedAssets.characters).length})</button>
          <button className={`asset-tab ${assetTab==='backgrounds'?'active':''}`} onClick={()=>setAssetTab('backgrounds')}>배경 ({Object.keys(sharedAssets.backgrounds).length})</button>
          <button className={`asset-tab ${assetTab==='props'?'active':''}`} onClick={()=>setAssetTab('props')}>소품 ({Object.keys(sharedAssets.props).length})</button>
        </div>

        {Object.keys(sharedAssets[assetTab]).length === 0 && (
          <div className="placeholder">등록된 {assetTab === 'characters' ? '캐릭터' : assetTab === 'backgrounds' ? '배경' : '소품'} 에셋이 없습니다.{inline ? ' 위 버튼으로 레퍼런스를 생성하세요.' : ' 스토리 분석 후 레퍼런스를 생성하면 자동으로 등록됩니다.'}</div>
        )}

        {Object.entries(sharedAssets[assetTab]).map(([id, asset]) => {
          const isChar = assetTab === 'characters';
          const isBg = assetTab === 'backgrounds';
          const char = isChar ? analysis?.characters?.find(c => c.id === id) : null;
          // Use sharedAssets as primary source for presets, merge with analysis if available
          const presets = isChar ? {...(asset.outfitPresets || {}), ...(char?.outfitPresets || {})} : {};
          const presetEntries = Object.entries(presets);
          const ROLE_KR = {protagonist:'주인공',supporting:'조연',antagonist:'적대',extra:'엑스트라',narrator:'나레이터'};

          // 배경/소품 카드 (기존 방식 유지)
          if (!isChar) return (
            <div key={id} style={{border:'1px solid var(--border)',borderRadius:12,marginBottom:10,overflow:'hidden'}}>
              <div style={{display:'flex',gap:12,padding:12,alignItems:'flex-start'}}>
                {asset.image ? (
                  <img className="clickable-img" src={asset.image} alt={asset.name}
                    style={isBg?{width:120,height:80,borderRadius:8,objectFit:'cover',flexShrink:0}:{width:80,height:80,borderRadius:8,objectFit:'cover',flexShrink:0}}
                    onClick={() => showPreview(asset.image, asset.name)} />
                ) : (<div className="asset-placeholder">미생성</div>)}
                <div style={{flex:1,minWidth:0}}>
                  <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:4}}>
                    <span style={{fontWeight:700,fontSize:14}}>{asset.name}</span>
                    {isBg && <span className="asset-badge bg">{asset.bgType || 'scene'}</span>}
                    {assetTab === 'props' && <span className="asset-badge prop">소품</span>}
                  </div>
                  <div style={{fontSize:12,color:'var(--text2)',lineHeight:1.4}}>{asset.description}</div>
                </div>
                <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0}}>
                  <button className="btn btn-outline btn-xs" onClick={()=>regenerateAsset(assetTab, id)} disabled={running}>재생성</button>
                  <button className="btn btn-outline btn-xs" onClick={()=>uploadAssetImage(assetTab, id)} title="이미지 파일 업로드">📤 업로드</button>
                  <button className="btn btn-outline btn-xs" style={{color:'var(--err)',borderColor:'var(--err)'}} onClick={async ()=>{
                    if(!confirm(`${asset.name} 에셋을 삭제하시겠습니까?`)) return;
                    if(projectId) await fbDeleteAsset(projectId, assetTab, id);
                    setSharedAssets(prev => {const n={...prev};const t={...n[assetTab]};delete t[id];n[assetTab]=t;return n;});
                    log(`${asset.name} 에셋 삭제됨`, 'success');
                  }}>삭제</button>
                </div>
              </div>
              {asset.refPrompt && (
                <details style={{borderTop:'1px solid var(--border)'}}>
                  <summary style={{padding:'6px 12px',fontSize:11,fontWeight:600,cursor:'pointer',color:'var(--text2)'}}>프롬프트 보기/수정</summary>
                  <div style={{padding:'0 12px 10px',display:'flex',flexDirection:'column',gap:4}}>
                    <textarea style={{width:'100%',fontSize:11,fontFamily:'monospace',lineHeight:1.5,padding:6,border:'1px solid #eee',borderRadius:4,minHeight:70,resize:'vertical',wordBreak:'break-all'}}
                      defaultValue={getAssetFullPrompt(assetTab, asset.refPrompt)} id={`prompt-edit-${assetTab}-${id}`} />
                    <button className="btn btn-primary btn-xs" style={{alignSelf:'flex-start'}} disabled={running} onClick={() => {
                      const el = document.getElementById(`prompt-edit-${assetTab}-${id}`);
                      const p = el?.value?.trim(); if (!p) return;
                      regenerateAsset(assetTab, id, p);
                    }}>프롬프트로 생성</button>
                  </div>
                </details>
              )}
            </div>
          );

          // ===== 캐릭터 카드: 외형 + 의상별 레퍼런스 =====
          // "기본 의상"을 의상 목록의 첫 항목으로 통합
          const allOutfits = [
            {key: '__default__', name: '기본 의상', outfit: asset.outfit || '', accessories: asset.accessories || '', image: asset.image, isDefault: true},
            ...presetEntries.map(([pName, pData]) => ({key: pName, name: pName, outfit: pData.outfit || '', accessories: pData.accessories || '', image: pData.image, isDefault: false}))
          ];

          return (
          <div key={id} style={{border:'1px solid var(--border)',borderRadius:12,marginBottom:12,overflow:'hidden'}}>
            {/* 캐릭터 헤더: 이름 + 역할 + 외형 */}
            <div style={{padding:12,display:'flex',gap:10,alignItems:'flex-start'}}>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:6}}>
                  <span style={{fontWeight:700,fontSize:15}}>{asset.name}</span>
                  {asset.role && <span className="asset-badge" style={{fontSize:10}}>{ROLE_KR[asset.role] || asset.role}</span>}
                  {loraModels[id]?.status === 'ready' && <span style={{fontSize:10,color:'#155724',fontWeight:600}}>LoRA ✓</span>}
                  {loraModels[id]?.status === 'training' && <span style={{fontSize:10,color:'#856404',fontWeight:600}}>LoRA 학습중</span>}
                  <span style={{fontSize:10,color:'var(--text2)',marginLeft:'auto'}}>{id}</span>
                </div>
                <div style={{fontSize:11,color:'var(--text2)',marginBottom:2}}>외형 설명</div>
                <textarea style={{width:'100%',fontSize:11,padding:5,border:'1px solid #eee',borderRadius:4,minHeight:40,resize:'vertical',background:'var(--surface2)',lineHeight:1.4}}
                  defaultValue={asset.appearance || ''} placeholder="캐릭터 외형 설명 (의상 제외 — 얼굴, 체형, 머리 등)..."
                  onBlur={async (e) => {
                    const val = e.target.value.trim();
                    if (val === asset.appearance) return;
                    const updated = {...asset, appearance: val};
                    setSharedAssets(prev => ({...prev, characters: {...prev.characters, [id]: updated}}));
                    setAnalysis(prev => prev ? {...prev, characters: prev.characters.map(c => c.id === id ? {...c, appearance: val} : c)} : prev);
                    if (projectId) await fbSaveAsset(projectId, 'characters', id, updated);
                    log(`${asset.name} 외형 설명 업데이트됨`, 'success');
                  }} />
              </div>
              <div style={{display:'flex',flexDirection:'column',gap:3,flexShrink:0}}>
                {imageProvider === 'falAI' && asset.image && !loraModels[id]?.status?.match(/ready|training/) && (
                  <button className="btn btn-xs" style={{background:'linear-gradient(135deg,#00b894,#00cec9)',color:'#fff',border:'none',fontSize:10}}
                    onClick={() => trainCharacterLora(id, asset.name, [asset.image])} disabled={running}>LoRA</button>
                )}
                <button className="btn btn-outline btn-xs" style={{color:'var(--err)',borderColor:'var(--err)'}} onClick={async ()=>{
                  if(!confirm(`${asset.name} 에셋을 삭제하시겠습니까?`)) return;
                  if(projectId) await fbDeleteAsset(projectId, assetTab, id);
                  setSharedAssets(prev => {const n={...prev};const t={...n[assetTab]};delete t[id];n[assetTab]=t;return n;});
                  log(`${asset.name} 에셋 삭제됨`, 'success');
                }}>삭제</button>
              </div>
            </div>

            {/* 의상별 레퍼런스 목록 */}
            <div style={{borderTop:'1px solid var(--border)',padding:'8px 12px'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:700}}>👗 의상별 레퍼런스 ({allOutfits.length})</span>
                <button className="btn btn-outline btn-xs" style={{fontSize:10,padding:'2px 8px'}} onClick={() => {
                  let name = prompt('새 의상 이름 (예: 교복, 잠옷, 운동복)\n빈칸이면 자동 생성됩니다.');
                  if (name === null) return; // 취소 누른 경우
                  if (!name?.trim()) {
                    let idx = 1;
                    while (presets[`의상_${idx}`]) idx++;
                    name = `의상_${idx}`;
                  }
                  const newPreset = {outfit: '', accessories: '', image: null};
                  const updatedPresets = {...presets, [name.trim()]: newPreset};
                  updateAnalysisChar(id, 'outfitPresets', updatedPresets);
                  if (projectId) {
                    const a = sharedAssets.characters?.[id];
                    if (a) fbSaveAsset(projectId, 'characters', id, {...a, outfitPresets: updatedPresets});
                  }
                  log(`${asset.name} — "${name.trim()}" 빈 의상 카드 추가됨 (설명을 채워주세요)`, 'success');
                }}>+ 의상 추가</button>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(200px,1fr))',gap:8}}>
                {allOutfits.map(o => (
                  <div key={o.key} style={{border:'1px solid var(--border)',borderRadius:8,overflow:'hidden',background:'var(--surface)'}}>
                    {/* 의상 이미지 */}
                    <div style={{position:'relative',background:'var(--surface2)',aspectRatio:'3/4',display:'flex',alignItems:'center',justifyContent:'center'}}>
                      {o.image ? (
                        <img src={o.image} alt={o.name} style={{width:'100%',height:'100%',objectFit:'cover',cursor:'pointer'}}
                          onClick={() => showPreview(o.image, `${asset.name} — ${o.name}`)} />
                      ) : (
                        <div style={{color:'var(--text2)',fontSize:12,textAlign:'center',padding:12}}>
                          <div style={{fontSize:28,marginBottom:4}}>🖼</div>
                          미생성
                        </div>
                      )}

                            const val = e.target.value.trim();
                            if (val === asset.outfit) return;
                            const updated = {...asset, outfit: val};
                            setSharedAssets(prev => ({...prev, characters: {...prev.characters, [id]: updated}}));
                            setAnalysis(prev => prev ? {...prev, characters: prev.characters.map(c => c.id === id ? {...c, outfit: val} : c)} : prev);

                          }} />

                        o.outfit ? (
                          <div style={{fontSize:10,color:'var(--text2)',lineHeight:1.3,maxHeight:32,overflow:'hidden'}}>{o.outfit}{o.accessories ? ` + ${o.accessories}` : ''}</div>

                                const val = e.target.value.trim();

                                if (projectId) { const a = sharedAssets.characters?.[id]; if (a) fbSaveAsset(projectId, 'characters', id, {...a, outfitPresets: updatedPresets}); }

                            <input type="text" style={{width:'100%',fontSize:10,padding:'2px 5px',border:'1px dashed #ccc',borderRadius:3,background:'var(--surface2)',boxSizing:'border-box'}}

                                const val = e.target.value.trim();
                                if (!val) return;
                                const updatedPresets = {...presets, [o.key]: {...presets[o.key], accessories: val}};
                                updateAnalysisChar(id, 'outfitPresets', updatedPresets);
                                if (projectId) { const a = sharedAssets.characters?.[id]; if (a) fbSaveAsset(projectId, 'characters', id, {...a, outfitPresets: updatedPresets}); }

              }
              log(`✓ JPG ${allJpgs.length}장 내보내기 완료 (720×4000)`, 'success');

            <button className="btn btn-outline btn-sm be-btn-export" style={{background:'linear-gradient(135deg,#667eea,#764ba2)',color:'#fff',borderColor:'transparent'}} onClick={exportAsPsd}>PSD 내보내기</button>
            {/* [FigmaSync] Figma 동기화 드롭다운 */}
            <div style={{position:'relative',display:'inline-block'}}>
              <button className="btn btn-outline btn-sm" onClick={() => setFigmaSyncEnabled(prev => !prev)}

                <span style={{width:6,height:6,borderRadius:'50%',display:'inline-block',

              {figmaSyncEnabled && (
                <div style={{position:'absolute',top:'100%',right:0,marginTop:4,background:'#2a2a40',border:'1px solid #3a3a55',
                  borderRadius:8,padding:4,minWidth:180,zIndex:1000,boxShadow:'0 8px 24px rgba(0,0,0,0.4)'}}>
                  <button className="btn btn-outline btn-sm" onClick={figmaSyncCurrentPage}

                  <button className="btn btn-outline btn-sm" onClick={figmaSyncFullEpisode}
                    disabled={figmaSyncStatus==='syncing'} style={{width:'100%',fontSize:11,textAlign:'left'}}>
