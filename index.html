                  </button>
                  {figmaProgress && (
                    <div style={{padding:'4px 8px',fontSize:10,color:'#888'}}>
                      {figmaProgress.label} ({figmaProgress.current}/{figmaProgress.total})
                    </div>
                  )}
                </div>
              )}
            </div>
            <button className="btn btn-success btn-sm" disabled={isSavingEditor} onClick={() => saveEditorLayout(true)} style={{fontSize:12}}>{isSavingEditor ? `💾 ${saveProgress || '저장 중...'}` : '저장 후 완료'}</button>
            <button className="btn btn-outline btn-sm" onClick={() => { if (window.confirm('저장하지 않고 나가시겠습니까? 변경사항이 사라집니다.')) closeBubbleEditor(); }} style={{fontSize:12,color:'var(--text2)'}}>저장없이 나가기</button>
          </div>

          <div className="be-body">
            {/* Main canvas area — all pages stacked vertically */}
            <div className="be-canvas" ref={editorCanvasRef}>
              {editorPages.map((page, pageIdx) => {
                const scale = editorPanelScale / 100;
                const displayW = PAGE_W * scale;
                const actualH = page.height || PAGE_H_MAX;
                const displayH = actualH * scale;
                const isFocused = pageIdx === currentPageIdx;
                return (
                  <React.Fragment key={page.id}>
                    {/* Page header bar */}
                    <div className={`be-page-bar${isFocused ? ' focused' : ''}`}
                      onClick={(e) => { setCurrentPageIdx(pageIdx); if (e.target === e.currentTarget) { setSelectedObjectId(null); setSelectedObjectIds([]); } }}>
                      <span style={{fontWeight:700}}>페이지 {pageIdx + 1}</span>
                      <span style={{fontSize:10,color:'#888'}}>({(page.objects||[]).length}개 객체)</span>
                      <div style={{flex:1}} />
                      <button className="be-page-bar-btn" onClick={async (e) => {
                        e.stopPropagation();
                        log('전체 JPG 분할 내보내기 중...', 'info');
                        const allJpgs = await exportAllPagesAsJpeg();
                        for (let i = 0; i < allJpgs.length; i++) {
                          downloadDataUrl(allJpgs[i], `${analysis?.title || 'webtoon'}_${String(i+1).padStart(2,'0')}.jpg`);
                        }
                        log(`✓ JPG ${allJpgs.length}장 내보내기 완료`, 'success');
                      }}>JPG 저장</button>
                      {editorPages.length > 1 && (
                        <button className="be-page-bar-btn del" onClick={(e) => { e.stopPropagation(); deletePage(pageIdx); }}>삭제</button>
                      )}
                    </div>
                    {/* Page canvas */}
                    <div className={`be-page-canvas${isFocused ? ' focused' : ''}${dropTargetPageIdx === pageIdx ? ' drop-target' : ''}`}
                      style={{width: displayW, height: displayH, position:'relative'}}
                      onClick={(e) => { setCurrentPageIdx(pageIdx); if (e.target === e.currentTarget) { setSelectedObjectId(null); setSelectedObjectIds([]); } }}>
                      {/* Dotted page boundary lines every PAGE_H (4000px) */}
                      {Array.from({length: Math.floor(actualH / PAGE_H)}, (_, i) => (i + 1) * PAGE_H).map(y => (
                        <div key={'pgline_'+y} style={{
                          position:'absolute', left:0, top: y * scale, width: displayW, height: 0,
                          borderTop: '2px dashed rgba(255,80,80,0.5)',
                          pointerEvents:'none', zIndex: 9999
                        }}>
                          <span style={{position:'absolute', right:4, top:2, fontSize:10, color:'rgba(255,80,80,0.7)', fontWeight:600}}>
                            ✂ {Math.floor(y / PAGE_H) + 1}페이지 끝
                          </span>
                        </div>
                      ))}
                      {/* Render all objects in z-order */}
                      {[...(page.objects||[])].sort((a, b) => (a.zIndex || 1) - (b.zIndex || 1)).filter(obj => !obj.hidden).map(obj => {
                        const isSelected = isObjectSelected(obj.id);
                        if (obj.type === 'panel' || obj.type === 'image') {
                          const isCropping = cropMode && cropMode.pageIdx === pageIdx && cropMode.objId === obj.id;
                          const hasCrop = obj.crop && obj.crop.w > 0 && obj.crop.h > 0;
                          return (
                            <div key={obj.id} className={`be-obj${isSelected ? ' selected' : ''}`}
                              style={{
                                left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: obj.h * scale,
                                zIndex: obj.zIndex || 1, overflow: 'hidden'
                              }}
                              onMouseDown={(e) => {
                                if (isCropping) return;
                                handleObjectSelect(obj.id, obj.type, pageIdx, e);
                                if (['TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.dataset.resize) return;
                                e.preventDefault();
                                // Build multi-drag origins for all selected objects
                                const ids = e.shiftKey && selectedObjectIds.length > 0 ? [...new Set([...selectedObjectIds, obj.id])] : (selectedObjectIds.includes(obj.id) && selectedObjectIds.length > 1 ? selectedObjectIds : null);
                                let multiDragOrigins = null;
                                if (ids && ids.length > 1) {
                                  multiDragOrigins = [];
                                  for (const pg of editorPages) { for (const o of pg.objects) { if (ids.includes(o.id)) multiDragOrigins.push({pageIdx: editorPages.indexOf(pg), objId: o.id, origX: o.x, origY: o.y}); } }
                                }
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y, crossPage:!multiDragOrigins, multiDragOrigins};
                              }}>
                              {obj.src && obj.src !== 'undefined' && !obj.src.endsWith(',undefined') ? (
                                hasCrop && !isCropping ? (
                                  <div style={{width:'100%', height:'100%', overflow:'hidden', position:'relative'}}>
                                    <img src={obj.src} className="be-obj-img" draggable={false}
                                      style={{
                                        position:'absolute',
                                        left: `${-obj.crop.x * 100 / obj.crop.w}%`,
                                        top: `${-obj.crop.y * 100 / obj.crop.h}%`,
                                        width: `${10000 / obj.crop.w}%`,
                                        height: `${10000 / obj.crop.h}%`,
                                        objectFit: 'fill',
                                        maxWidth:'none', maxHeight:'none',
                                      }} />
                                  </div>
                                ) : (
                                  <React.Fragment>
                                    <img src={obj.src} className="be-obj-img" draggable={false}
                                      style={isCropping ? {opacity: 0.4} : {}}
                                      onLoad={(e) => {
                                        const imgEl = e.target;
                                        if (imgEl.naturalWidth > 0 && imgEl.naturalHeight > 0) {
                                          const realRatio = imgEl.naturalHeight / imgEl.naturalWidth;
                                          const expectedH = Math.round(obj.w * realRatio);
                                          if (Math.abs(expectedH - obj.h) > 5) {
                                            setEditorPages(prev => prev.map((pg, pi) => pi !== pageIdx ? pg : {
                                              ...pg, objects: pg.objects.map(o => o.id !== obj.id ? o : {...o, h: expectedH})
                                            }));
                                          }
                                        }
                                      }} />
                                    {isCropping && cropRect && (
                                      <div data-crop-overlay="true" style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',zIndex:25,cursor:'crosshair'}}
                                        onMouseDown={(e) => {
                                          e.preventDefault(); e.stopPropagation();
                                          const rect = e.currentTarget.getBoundingClientRect();
                                          const sx = ((e.clientX - rect.left) / rect.width) * 100;
                                          const sy = ((e.clientY - rect.top) / rect.height) * 100;
                                          cropDragRef.current = {type:'draw', startX:sx, startY:sy};
                                        }}>
                                        {/* Bright crop region */}
                                        <div style={{
                                          position:'absolute',
                                          left: cropRect.x + '%', top: cropRect.y + '%',
                                          width: cropRect.w + '%', height: cropRect.h + '%',
                                          border:'2px solid #4fc3f7', background:'transparent',
                                          boxShadow:'0 0 0 9999px rgba(0,0,0,0.55)',
                                          cursor:'move', zIndex:26,
                                        }}
                                          onMouseDown={(e) => {
                                            e.preventDefault(); e.stopPropagation();
                                            const rect = e.currentTarget.parentElement.getBoundingClientRect();
                                            cropDragRef.current = {
                                              type:'move_region',
                                              lastX: ((e.clientX - rect.left) / rect.width) * 100,
                                              lastY: ((e.clientY - rect.top) / rect.height) * 100
                                            };
                                          }}>
                                          {/* Corner handles */}
                                          {['tl','tr','bl','br'].map(corner => (
                                            <div key={corner} className={`be-crop-handle ${corner}`}
                                              style={{pointerEvents:'auto'}}
                                              onMouseDown={(e) => {
                                                e.preventDefault(); e.stopPropagation();
                                                cropDragRef.current = {type:'resize_crop', corner, origRect: {...cropRect}};
                                              }} />
                                          ))}
                                        </div>
                                        {/* Apply/Cancel buttons */}
                                        <div style={{
                                          position:'absolute', bottom:8, left:'50%', transform:'translateX(-50%)',
                                          display:'flex', gap:6, zIndex:30
                                        }}>
                                          <button className="be-crop-btn" onClick={(e) => {e.stopPropagation(); applyCrop();}}>✓ 적용</button>
                                          <button className="be-crop-btn danger" onClick={(e) => {e.stopPropagation(); cancelCrop();}}>✕ 취소</button>
                                        </div>
                                      </div>
                                    )}
                                  </React.Fragment>
                                )
                              ) : (
                                <div className="be-obj-img" style={{display:'flex',alignItems:'center',justifyContent:'center',background:'#333',color:'#999',fontSize:11,height:'100%'}}>이미지 없음</div>
                              )}
                              {isSelected && !isCropping && <>
                                <div data-resize="true" className="be-resize"
                                  onMouseDown={(e) => {e.preventDefault();e.stopPropagation();
                                    dragRef.current = {type:'resize', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origW:obj.w, origH:obj.h, aspectRatio: obj.w / obj.h};
                                  }}/>
                                <button className="be-delete" onClick={(e) => {e.stopPropagation(); deletePageObject(pageIdx, obj.id);}}>×</button>
                              </>}
                            </div>
                          );
                        } else if (obj.type === 'bubble') {
                          const bt = BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech;
                          const tailPos = obj.tailPos ?? 0.3;
                          const tailSz = obj.tailSize ?? 1.0;
                          const tailLen = obj.tailLength ?? tailSz;
                          const tailWid = obj.tailWidth ?? tailSz;
                          const svgH = (obj.h + (bt.tail ? 18 * tailLen : 0)) * scale;
                          // Compute effective bg color: use customBg+opacity for plainText types
                          const effBg = (() => {
                            if (bt.plainText && obj.customBg) {
                              const op = (obj.customBgOpacity ?? 100) / 100;
                              const hex = obj.customBg;
                              const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b2 = parseInt(hex.slice(5,7),16);
                              return `rgba(${r},${g},${b2},${op})`;
                            }
                            if (bt.plainText && obj.customBgOpacity !== undefined) {
                              const op = obj.customBgOpacity / 100;
                              return `rgba(255,255,255,${op})`;
                            }
                            return bt.bg;
                          })();
                          return (
                            <div key={obj.id} className={`be-bubble${isSelected ? ' selected' : ''}`}
                              style={{left: obj.x * scale, top: obj.y * scale, width: obj.w * scale, height: svgH, zIndex: obj.zIndex || 1}}
                              onMouseDown={(e) => {
                                handleObjectSelect(obj.id, 'bubble', pageIdx, e);
                                if (['TEXTAREA','SELECT'].includes(e.target.tagName) || e.target.dataset.resize) return;
                                e.preventDefault();
                                const ids = e.shiftKey && selectedObjectIds.length > 0 ? [...new Set([...selectedObjectIds, obj.id])] : (selectedObjectIds.includes(obj.id) && selectedObjectIds.length > 1 ? selectedObjectIds : null);
                                let multiDragOrigins = null;
                                if (ids && ids.length > 1) {
                                  multiDragOrigins = [];
                                  for (const pg of editorPages) { for (const o of pg.objects) { if (ids.includes(o.id)) multiDragOrigins.push({pageIdx: editorPages.indexOf(pg), objId: o.id, origX: o.x, origY: o.y}); } }
                                }
                                dragRef.current = {type:'move', pageIdx, objId:obj.id, startX:e.clientX, startY:e.clientY, origX:obj.x, origY:obj.y, crossPage:!multiDragOrigins, multiDragOrigins};
                              }}>
                              <svg width={obj.w * scale} height={svgH} className="be-bubble-svg"
                                viewBox={(() => {
                                  if (bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon]) {
                                    const sb = SVG_BALLOONS[bt.svgBalloon];
                                    const pad = obj.bubblePadding ?? (bt.defaultPadding || 0); // -50 ~ +50, negative = zoom in (remove margin)
                                    if (pad === 0) return sb.viewBox;
                                    const vb = sb.viewBox.split(' ').map(Number);
                                    const inset = pad * Math.max(vb[2], vb[3]) / 100;
                                    return `${vb[0] + inset} ${vb[1] + inset} ${vb[2] - inset * 2} ${vb[3] - inset * 2}`;
                                  }
                                  return undefined;
                                })()}
                                preserveAspectRatio={(bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon]) ? 'none' : undefined}
                                style={{filter: bt.shadow ? 'drop-shadow(0 2px 4px rgba(0,0,0,0.4))' : 'none'}}>
                                {(() => {
                                  const bw2 = obj.strokeWidth ?? bt.borderWidth ?? 2;
                                  const strokeColor = (obj.strokeColor || bt.border)==='none'?'transparent':(obj.strokeColor || bt.border);
                                  const fillColor = obj.fillColor || bt.bg || '#fff';
                                  const dash = bt.dashed ? '6 4' : 'none';
                                  const W = obj.w*scale, H = obj.h*scale;
                                  if (bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon]) {
                                    const sb = SVG_BALLOONS[bt.svgBalloon];
                                    const isFlipped = obj.flipBalloon || 'default';
                                    const pathD = sb.path(bw2, strokeColor, fillColor, isFlipped);
                                    return <path d={pathD} fill={fillColor} stroke={strokeColor} strokeWidth={bw2}
                                      strokeLinejoin="round" strokeLinecap="round" paintOrder="stroke fill"/>;
                                  } else if (bt.plainText && !bt.ellipse) {
                                    return <rect x="0" y="0" width={W} height={H} rx={(bt.radius||2)*scale} ry={(bt.radius||2)*scale} fill={effBg} stroke="none"/>;
                                  } else if (bt.plainText && bt.ellipse) {
                                    return <ellipse cx={W/2} cy={H/2} rx={W/2} ry={H/2} fill={effBg} stroke="none"/>;
                                  } else if (bt.spiky) {
                                    const pathD = buildSpikyPath(W, H, bt.spikeCount||16, tailPos, tailLen, tailWid, 1);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round" fillRule="evenodd"/>;
                                  } else if (bt.cloudShape) {
                                    const pathD = buildCloudPath(W, H, tailPos, tailLen, tailWid, 1);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round" fillRule="evenodd"/>;
                                  } else if (bt.boxShape) {
                                    const pathD = buildBoxPath(W, H, (bt.radius||10)*scale, tailPos, tailLen, tailWid, 1);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round"/>;
                                  } else if (bt.waveShape) {
                                    const pathD = buildWavePath(W, H, tailPos, tailLen, tailWid, scale);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeLinejoin="round"/>;
                                  } else if (bt.concentrationLines) {
                                    const cl = buildConcentrationLines(W, H, obj.concentrationPadding || 0, obj.concentrationOuterMargin || 0);
                                    const clColor = obj.concentrationColor || strokeColor;
                                    return <g>
                                      {cl.lines.map((ln, li) => <line key={li} x1={ln.sx} y1={ln.sy} x2={ln.ex} y2={ln.ey} stroke={clColor} strokeWidth={ln.sw} strokeLinecap="round"/>)}
                                      <path d={cl.ellipse} fill="transparent" stroke="none"/>
                                    </g>;
                                  } else if (bt.ellipse) {
                                    const cx2 = W/2, cy2 = H/2, rx2 = W/2 - 2, ry2 = H/2 - 2;
                                    const rn2 = obj.roundness ?? 100;
                                    if (bt.tail) {
                                      const pathD = buildBubblePath(cx2, cy2, rx2, ry2, tailPos, tailLen, tailWid, W, H, 1, obj.roundness, obj.tailStyle);
                                      return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash} strokeLinejoin="round"/>;
                                    } else {
                                      const cr2 = Math.min(rx2, ry2) * Math.max(0.04, rn2 / 100);
                                      return <rect x="2" y="2" width={W-4} height={H-4} rx={cr2} ry={cr2} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash}/>;
                                    }
                                  } else if (bt.tail) {
                                    const rrRx = W/2 - 2, rrRy = H/2 - 2;
                                    const rrRn = obj.roundness ?? 30;
                                    const pathD = buildBubblePath(W/2, H/2, rrRx, rrRy, tailPos, tailLen, tailWid, W, H, 1, rrRn, obj.tailStyle);
                                    return <path d={pathD} fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash} strokeLinejoin="round"/>;
                                  } else {
                                    return <rect x="1" y="1" width={W-2} height={H-2} rx={(bt.radius||8)*scale} ry={(bt.radius||8)*scale}
                                        fill={bt.bg} stroke={strokeColor} strokeWidth={bw2} strokeDasharray={dash}/>;
                                  }
                                })()}
                              </svg>
                              {(() => {
                                const sb = bt.svgBalloon && SVG_BALLOONS[bt.svgBalloon];
                                const ta = sb?.textArea;
                                const fs = (obj.fontSize||25)*scale;
                                const lineH = fs * 1.3;
                                const lines = (getObjText(obj)).split('\n').length || 1;
                                const textTotalH = lines * lineH;
                                const txStyle = ta ? (() => {
                                  const areaH = (parseFloat(ta.height) / 100) * obj.h * scale;
                                  const padTop = Math.max(0, (areaH - textTotalH) / 2);
                                  return {
                                    position:'absolute',
                                    top: ta.top, left: ta.left, width: ta.width, height: ta.height,
                                    fontWeight:obj.fontWeight||bt.fontWeight, fontSize:fs,
                                    color:obj.customColor||bt.color||'#111',
                                    fontFamily:getObjFont(obj,"'Noto Sans KR',sans-serif"),
                                    paddingTop: padTop,
                                    transform:`translate(${(obj.textOffsetX||0)*scale}px, ${(obj.textOffsetY||0)*scale}px)`
                                  };
                                })() : bt.concentrationLines ? (() => {
                                  // 집중선: text area confined to inner ellipse (adjustable)
                                  const W2 = obj.w * scale, H2 = obj.h * scale;
                                  const cBaseR = 0.22;
                                  const cRFactor = Math.max(0.08, Math.min(0.45, cBaseR + (obj.concentrationPadding || 0) * 0.004));
                                  const areaRatio = Math.min(0.9, cRFactor * 2.27); // proportional to inner ellipse
                                  const areaW = W2 * areaRatio, areaH2 = H2 * areaRatio;
                                  const padTop = Math.max(0, (areaH2 - textTotalH) / 2);
                                  return {
                                    position:'absolute', top: (H2 - areaH2) / 2, left: (W2 - areaW) / 2,
                                    width: areaW, height: areaH2,
                                    fontWeight:obj.fontWeight||bt.fontWeight, fontSize:fs,
                                    color:obj.customColor||bt.color||'#111',
                                    fontFamily:getObjFont(obj,"'Noto Sans KR',sans-serif"),
                                    paddingTop: padTop,
                                    transform:`translate(${(obj.textOffsetX||0)*scale}px, ${(obj.textOffsetY||0)*scale}px)`
                                  };
                                })() : (() => {
                                  const areaH = obj.h * scale - 8;
                                  const padTop = Math.max(0, (areaH - textTotalH) / 2);
                                  return {
                                    position:'absolute', top:4, left:6,
                                    width:obj.w*scale-12, height:areaH,
                                    fontWeight:obj.fontWeight||bt.fontWeight, fontSize:fs,
                                    color:obj.customColor||bt.color||'#111',

                          <img className="clickable-img" src={panels[i]} alt={`Panel ${i+1}`} onClick={() => showPreview(panels[i], `패널 ${i+1}: ${panel.description?.substring(0,60) || ""}`)} />
                          <div style={{position:'absolute',top:6,right:6,display:'flex',gap:4}}>
                            <button onClick={()=>saveSinglePanelToFirebase(i)} disabled={running} style={{background:'rgba(39,174,96,0.85)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,transition:'background 0.2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(39,174,96,1)'} onMouseOut={e=>e.currentTarget.style.background='rgba(39,174,96,0.85)'}>💾 Firebase</button>
                            <button onClick={()=>savePanelImage(panels[i], `${analysis?.title || 'webtoon'}_panel_${i+1}.png`)} style={{background:'rgba(0,0,0,0.7)',color:'#fff',border:'none',borderRadius:6,padding:'4px 10px',fontSize:11,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:4,transition:'background 0.2s'}} onMouseOver={e=>e.currentTarget.style.background='rgba(0,0,0,0.9)'} onMouseOut={e=>e.currentTarget.style.background='rgba(0,0,0,0.7)'}>⬇ 다운로드</button>
                          </div>
                          {/* Dialogue overlay */}
                          {panel.dialogue?.length > 0 && (
                            <div style={{position:'absolute',bottom:8,left:8,right:8,display:'flex',flexDirection:'column',gap:4}}>
                              {panel.dialogue.map((d, di) => (
                                <div key={di} style={{background:'rgba(255,255,255,0.92)',padding:'6px 12px',borderRadius:16,fontSize:13,fontWeight:500,boxShadow:'0 2px 8px rgba(0,0,0,.15)',maxWidth:'80%',alignSelf:di%2===0?'flex-start':'flex-end'}}>
                                  <span style={{fontSize:10,color:'var(--accent)',fontWeight:700}}>{d.speaker}</span><br/>{d.text}
                                </div>
                              ))}
                            </div>
                          )}
                          {panel.narration && (
                            <div style={{position:'absolute',top:8,left:8,right:8,background:'rgba(0,0,0,0.7)',color:'#fff',padding:'6px 12px',borderRadius:8,fontSize:12,fontStyle:'italic'}}>
                              {panel.narration}
                            </div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}
            </>
          )}
        </div>

        {/* Log Panel — hidden in editor mode */}
        {!editorMode && (
        <div style={{marginTop:12}}>
          <div className="log-toggle" onClick={() => setLogCollapsed(!logCollapsed)}>
            <span>{logCollapsed ? '▶' : '▼'}</span>
            <span>로그 ({logs.length})</span>
            <button className="btn btn-xs" onClick={(e) => {e.stopPropagation(); setLogs([]);}} style={{marginLeft:'auto'}}>초기화</button>
          </div>
          {!logCollapsed && <LogPanel logs={logs} />}
        </div>
        )}
      </div>

      {/* AI Image Assistant Toggle Button */}
      {!promptHelperOpen && (
        <button className="prompt-helper-toggle" onClick={() => setPromptHelperOpen(true)}>
          AI 이미지 도우미
        </button>
      )}

      {/* AI Image Assistant Panel */}
      <div className={`prompt-helper-panel${promptHelperOpen ? '' : ' closed'}`}>
        <div className="prompt-helper-header">
          <h3>AI 이미지 도우미</h3>
          <div style={{display:'flex',gap:4,alignItems:'center'}}>
            {/* Model selector */}
            <div style={{display:'flex',background:'rgba(255,255,255,0.15)',borderRadius:6,overflow:'hidden',fontSize:11}}>
              <button onClick={() => setAiChatModel('gemini')}
                style={{padding:'3px 8px',border:'none',cursor:'pointer',fontWeight:600,
                  background: aiChatModel==='gemini' ? 'rgba(255,255,255,0.35)' : 'transparent',
                  color: aiChatModel==='gemini' ? '#fff' : 'rgba(255,255,255,0.7)'}}>Gemini</button>
              <button onClick={() => setAiChatModel('grok')}
                style={{padding:'3px 8px',border:'none',cursor:'pointer',fontWeight:600,
                  background: aiChatModel==='grok' ? 'rgba(255,255,255,0.35)' : 'transparent',
                  color: aiChatModel==='grok' ? '#fff' : 'rgba(255,255,255,0.7)'}}>Grok 4</button>
            </div>
            <button onClick={() => { setAiChatMessages([]); setAiChatInput(''); }} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'rgba(255,255,255,0.9)',fontSize:11,cursor:'pointer',padding:'2px 8px',borderRadius:4}} title="대화 초기화">초기화</button>
            <button onClick={() => setPromptHelperOpen(false)} style={{background:'none',border:'none',color:'#fff',fontSize:20,cursor:'pointer',padding:'0 4px'}}>×</button>
          </div>
        </div>
        <div className="prompt-helper-body" style={{display:'flex',flexDirection:'column',height:'100%',padding:0}}>
          {/* Chat messages area */}
          <div style={{flex:1,overflowY:'auto',padding:'12px',display:'flex',flexDirection:'column',gap:10}}>
            {aiChatMessages.length === 0 && (
              <div style={{color:'#666',fontSize:12,textAlign:'center',padding:'20px 10px',lineHeight:1.6}}>
                <div style={{fontSize:16,marginBottom:8}}>🎨 AI 이미지 생성 도우미</div>
                <div style={{color:'#444'}}>AI 이미지 생성에 관한 무엇이든 물어보세요!</div>
                <div style={{marginTop:12,textAlign:'left',fontSize:11,color:'#888'}}>
                  💡 질문 예시:<br/>
                  • 캐릭터 일관성을 높이려면 어떻게 해야 해?<br/>
                  • Gemini vs Flux 어떤 모델이 더 좋아?<br/>
                  • 이 프롬프트를 개선해줘: [프롬프트]<br/>
                  • 배경을 더 디테일하게 그리려면?<br/>
                  • LoRA가 뭐야? 어떻게 써?<br/>
                  • 콘텐츠 필터에 걸리지 않으려면?<br/>
                  • 야간 씬 조명을 잘 표현하는 프롬프트는?
                </div>
              </div>
            )}
            {aiChatMessages.map((msg, i) => (
              <div key={i} style={{
                display:'flex',
                justifyContent: msg.role === 'user' ? 'flex-end' : 'flex-start',
              }}>
                <div style={{
                  maxWidth:'85%',
                  padding:'8px 12px',
                  borderRadius: msg.role === 'user' ? '14px 14px 4px 14px' : '14px 14px 14px 4px',
                  background: msg.role === 'user' ? '#6c5ce7' : '#fff',
                  color: msg.role === 'user' ? '#fff' : '#333',
                  fontSize:12,
                  lineHeight:1.6,
                  whiteSpace:'pre-wrap',
                  wordBreak:'break-word',
                  border: msg.role === 'user' ? 'none' : '1px solid #e0e0e0',
                  boxShadow: msg.role === 'assistant' ? '0 1px 3px rgba(0,0,0,0.06)' : 'none',
                }}>
                  {msg.text}
                  {msg.role === 'assistant' && (
                    <button onClick={() => { navigator.clipboard.writeText(msg.text); log('복사됨', 'success'); }}
                      style={{display:'block',background:'none',border:'none',color:'#999',fontSize:10,cursor:'pointer',padding:'4px 0 0',opacity:0.6}}
                      title="복사">📋 복사</button>
                  )}
                </div>
              </div>
            ))}
            {aiChatLoading && (
              <div style={{display:'flex',justifyContent:'flex-start'}}>
                <div style={{padding:'8px 12px',borderRadius:'14px 14px 14px 4px',background:'#fff',border:'1px solid #e0e0e0',fontSize:12,color:'#999'}}>
                  생각 중...
                </div>
              </div>
            )}
            <div ref={aiChatEndRef} />
          </div>
          {/* Chat input area */}
          <div style={{borderTop:'1px solid #e0e0e0',padding:'8px 12px',display:'flex',gap:8,alignItems:'flex-end',background:'#fff'}}>
            <textarea
              style={{flex:1,resize:'none',border:'1px solid #ddd',borderRadius:10,padding:'8px 12px',fontSize:12,lineHeight:1.4,fontFamily:'inherit',background:'#fff',color:'#333',minHeight:38,maxHeight:120,outline:'none'}}
              rows={1}
              placeholder="AI 이미지 생성에 대해 질문하세요..."
              value={aiChatInput}
              onChange={e => setAiChatInput(e.target.value)}
              onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); aiChatSend(); }}}
              onInput={e => { e.target.style.height = 'auto'; e.target.style.height = Math.min(e.target.scrollHeight, 120) + 'px'; }}
            />
            <button onClick={aiChatSend} disabled={aiChatLoading || !aiChatInput.trim()}
              style={{padding:'8px 14px',borderRadius:10,border:'none',background: aiChatInput.trim() ? '#6c5ce7' : '#ddd',color:'#fff',fontSize:13,cursor: aiChatInput.trim() ? 'pointer' : 'default',fontWeight:600,whiteSpace:'nowrap',flexShrink:0}}>
              전송
            </button>
          </div>
        </div>
      </div>

      {/* ===== Batch Progress Floating Bar ===== */}
      {batchRunning && batchProgress && (
        <div className="batch-progress-bar">
          <div className="batch-progress-inner">
            <div className="batch-progress-text">
              <strong>연속 실행 중</strong> — {batchProgress.episode}화 ({batchProgress.current}/{batchProgress.total})
            </div>
            <div className="batch-progress-step">{batchProgress.step}</div>
            <div className="batch-progress-track">
              <div className="batch-progress-fill" style={{width: `${((batchProgress.current - 1) / batchProgress.total) * 100}%`}} />
            </div>
            <button className="btn btn-danger btn-xs" onClick={() => { abortRef.current = true; }}>중지</button>
          </div>
        </div>
      )}

      {/* ===== Batch Configuration Modal ===== */}
      {showBatchModal && (
        <div className="batch-overlay" onClick={() => setShowBatchModal(false)}>
          <div className="batch-modal" onClick={e => e.stopPropagation()}>
            <div className="batch-modal-header">
              <h3 style={{margin:0,fontSize:16}}>연속 실행 설정</h3>
              <button style={{background:'none',border:'none',color:'var(--text2)',fontSize:20,cursor:'pointer'}} onClick={() => setShowBatchModal(false)}>×</button>
            </div>

            <div className="batch-modal-body">
              {/* Per-step config */}
              {[
                {num: 1, label: 'Step 1: 스토리 분석', provKey: 'step1Provider', artKey: 'step1ArtStyle', defProv: 'ninjaChat'},
                {num: 2, label: 'Step 2: 에셋 생성', provKey: 'step2Provider', artKey: 'step2ArtStyle', defProv: 'ninjaChat'},
                {num: 3, label: 'Step 3: 스토리보드', provKey: 'step3Provider', artKey: 'step3ArtStyle', defProv: 'ninjaChat'},
                {num: 4, label: 'Step 4: 패널 이미지', provKey: 'step4Provider', artKey: 'step4ArtStyle', defProv: 'ninjaChat'},
              ].map(st => (
                <div key={st.num} className="batch-config-section" style={{padding:10,background:'var(--surface2)',borderRadius:8}}>
                  <div className="batch-config-label" style={{fontSize:13,fontWeight:700,marginBottom:6}}>{st.label}</div>
                  <div style={{display:'flex',gap:8}}>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:'var(--text2)',marginBottom:2}}>이미지 모델</div>
                      <select className="form-select" style={{width:'100%',fontSize:12}} value={batchConfig[st.provKey]} onChange={e => setBatchConfig(prev => ({...prev, [st.provKey]: e.target.value}))}>
                        <option value="imagen4">Imagen 4</option>
                        <option value="grokImage">Grok Image (xAI)</option>
                        <option value="falAI">FLUX (fal.ai)</option>
                        <option value="stableDiffusion">Stable Diffusion 3.5</option>
                        <option value="nanoBanana">Gemini (레퍼런스)</option>
                        <option value="a2eImage">A2E (Manga/General + 레퍼런스)</option>
                        <option value="a2eNanoBanana">A2E Gemini (레퍼런스)</option>
                        <option value="flux2Pro">Flux 2 Pro (fal.ai)</option>
                        <option value="kieSeedream">Seedream 4.0 (Kie.ai)</option>
                        <option value="ninjaChat">NinjaChat (다중 모델)</option>
                      </select>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:10,color:'var(--text2)',marginBottom:2}}>아트 스타일</div>
                      <select className="form-select" style={{width:'100%',fontSize:12}} value={batchConfig[st.artKey]} onChange={e => setBatchConfig(prev => ({...prev, [st.artKey]: e.target.value}))}>
                        <option value="">현재 ({ART_STYLES[artStyle]?.name})</option>
                        {Object.entries(ART_STYLES).map(([key, style]) => (
                          <option key={key} value={key}>{style.name}</option>
                        ))}
                      </select>
                    </div>
                  </div>
                </div>
              ))}

              {/* Force rerun toggle */}
              <div style={{padding:'8px 10px',background:'var(--surface2)',borderRadius:8,display:'flex',alignItems:'center',gap:8}}>
                <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',fontSize:13}}>
                  <input type="checkbox" checked={!!batchConfig.forceRerun}
                    onChange={e => {
                      const val = e.target.checked;
                      setBatchConfig(prev => ({...prev, forceRerun: val}));
                      // Refresh episode list with new force setting
                      getUnprocessedEpisodes(val).then(eps => {
                        setBatchEpisodeList(eps.map(ep => ({...ep, selected: !ep.isFullyComplete})));
                      });
                    }} />
                  <span style={{fontWeight:600}}>완료된 에피소드도 강제 재실행</span>
                </label>
                <span style={{fontSize:10,color:'var(--text2)'}}>이미 패널이 생성된 에피소드를 처음부터 다시 실행</span>
              </div>

              {/* Episode list */}
              <div className="batch-config-section">
                <div className="batch-config-label" style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                  <span>대상 에피소드 ({batchEpisodeList.filter(e => e.selected).length}/{batchEpisodeList.length} 선택)</span>
                  <button className="btn btn-xs btn-outline" onClick={() => {
                    const allSelected = batchEpisodeList.every(e => e.selected);
                    setBatchEpisodeList(prev => prev.map(e => ({...e, selected: !allSelected})));
                  }}>{batchEpisodeList.every(e => e.selected) ? '전체 해제' : '전체 선택'}</button>
                </div>
                {batchEpisodeList.length === 0 ? (
                  <div style={{padding:16,textAlign:'center',color:'var(--text2)',fontSize:13}}>
                    미처리 에피소드가 없습니다. 에피소드에 소스 텍스트를 먼저 입력하세요.
                  </div>
                ) : (
                  <div className="batch-episode-list">
                    {batchEpisodeList.map((ep, idx) => (
                      <label key={ep.number} className={`batch-episode-item ${ep.selected ? 'selected' : ''}`}>
                        <input type="checkbox" checked={!!ep.selected}
                          onChange={() => setBatchEpisodeList(prev => prev.map((e, i) => i === idx ? {...e, selected: !e.selected} : e))} />
                        <span className="batch-ep-num">{ep.title && ep.title !== `${ep.number}화` ? ep.title : `${ep.number}화`}</span>
                        <span className="batch-ep-title">{ep.title && ep.title !== `${ep.number}화` ? `(${ep.number}화)` : ''}</span>
                        {ep.status === 'complete' && <span className="batch-ep-badge" style={{background:'#d4edda',color:'#155724'}}>완료 ({ep.generatedPanels}패널)</span>}
                        {ep.status === 'step3' && <span className="batch-ep-badge" style={{background:'#fff3cd',color:'#856404'}}>스토리보드 {ep.generatedPanels > 0 ? `(${ep.generatedPanels}/${ep.totalPanels})` : ''}</span>}
                        {ep.status === 'step1' && <span className="batch-ep-badge" style={{background:'#cce5ff',color:'#004085'}}>분석완료</span>}
                        {ep.status === 'none' && <span className="batch-ep-badge" style={{background:'#f8d7da',color:'#721c24'}}>미처리</span>}
                      </label>
                    ))}
                  </div>
                )}
              </div>
            </div>

            <div className="batch-modal-footer">
              <button className="btn btn-outline btn-sm" onClick={() => setShowBatchModal(false)}>취소</button>
              <button className="btn btn-primary" onClick={startBatchRun}
                disabled={batchEpisodeList.filter(e => e.selected).length === 0}>
                {batchEpisodeList.filter(e => e.selected).length}개 에피소드 연속 실행
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.render(<App />, document.getElementById('root'));
</script>
</body>
</html>
