            left: Math.round(obj.x * psdScale),
            top: Math.round(obj.y * psdScale),
            canvas: layerCanvas,
            blendMode: 'normal',
            opacity: 1
          });
        } else if (obj.type === 'bubble') {
          const bt = BUBBLE_TYPES[obj.bubbleStyle] || BUBBLE_TYPES.speech;
          // Bubble shape layer — render balloon shape to canvas (without text)
          const bw = Math.round((obj.w + 20) * psdScale);
          const bh = Math.round((obj.h + 40) * psdScale);
          const layerCanvas = document.createElement('canvas');
          layerCanvas.width = bw;
          layerCanvas.height = bh;
          const lCtx = layerCanvas.getContext('2d');
          // Draw bubble shape only (text drawn separately as text layer)
          const origText = obj.text;
          const origTranslations = obj.translations;
          obj.text = ''; obj.translations = {};
          drawBubbleOnCanvas(lCtx, obj, 10 * psdScale, 10 * psdScale, obj.w * psdScale, obj.h * psdScale, psdScale);
          obj.text = origText; obj.translations = origTranslations;
          const layerName = obj.bubbleStyle === 'narration' ? `Narration ${idx+1}` : `Bubble ${idx+1}`;
          const bubbleLeft = Math.max(0, Math.round(obj.x * psdScale) - Math.round(10 * psdScale));
          const bubbleTop = Math.max(0, Math.round(obj.y * psdScale) - Math.round(10 * psdScale));
          children.push({
            name: layerName + ' (shape)',
            left: bubbleLeft,
            top: bubbleTop,
            canvas: layerCanvas,
            blendMode: 'normal',
            opacity: 1
          });
          // Bubble text layer — 래스터 이미지 레이어 (텍스트 내용은 레이어명에 포함)
          // 참고: ag-psd의 text 속성은 포토샵 engineData를 완전히 생성하지 못하여
          // 글꼴 대체 시 텍스트가 사라지므로, 안정적인 래스터 레이어로 내보냄
          const displayText = getObjText(obj);
          if (displayText) {
            const fs = Math.round(Math.max(12, obj.fontSize || 25) * psdScale);
            const ff = getObjFont(obj, "'Noto Sans KR',sans-serif").replace(/'/g, '');
            const textColor = obj.customColor || bt.color || '#111111';
            const isBold = (obj.fontWeight || bt.fontWeight || 500) >= 700;
            const tw = Math.round(obj.w * psdScale);
            const th = Math.round(obj.h * psdScale);
            const tLeft = Math.round(obj.x * psdScale);
            const tTop = Math.round(obj.y * psdScale);
            const tCanvas = document.createElement('canvas');
            tCanvas.width = tw;
            tCanvas.height = th;
            const tCtx = tCanvas.getContext('2d');
            tCtx.font = `${isBold ? 'bold' : 'normal'} ${fs}px ${ff}`;
            tCtx.fillStyle = textColor;
            tCtx.textAlign = 'center'; tCtx.textBaseline = 'middle';
            const lines = displayText.split('\n');
            const lh = fs * 1.3;
            const totalH = lines.length * lh;
            lines.forEach((line, li) => {
              tCtx.fillText(line, tw / 2, (th - totalH) / 2 + li * lh + lh / 2);
            });
            // 레이어명에 텍스트 내용 포함 (포토샵에서 텍스트 확인/재입력 용이)
            const shortText = displayText.replace(/\n/g, ' ').substring(0, 40);
            children.push({
              name: `${layerName} [${shortText}]`,
              left: tLeft,
              top: tTop,
              canvas: tCanvas,
              blendMode: 'normal',
              opacity: 1,
            });
          }
        } else if (obj.type === 'sfx') {
          // SFX shape layer — render visual effect to canvas
          const sw2 = Math.round((obj.w + 20) * psdScale);
          const sh2 = Math.round((obj.h + 20) * psdScale);
          const layerCanvas = document.createElement('canvas');
          layerCanvas.width = sw2;
          layerCanvas.height = sh2;
          const lCtx = layerCanvas.getContext('2d');
          drawSfxOnCanvas(lCtx, obj, 10 * psdScale, 10 * psdScale, psdScale);
          const sfxLeft = Math.max(0, Math.round(obj.x * psdScale) - Math.round(10 * psdScale));
          const sfxTop = Math.max(0, Math.round(obj.y * psdScale) - Math.round(10 * psdScale));
          children.push({
            name: `SFX ${idx+1} (shape)`,
            left: sfxLeft,
            top: sfxTop,
            canvas: layerCanvas,
            blendMode: 'normal',
            opacity: 1
          });
          // SFX text layer — 래스터 이미지 레이어 (텍스트 내용은 레이어명에 포함)
          const sfxText = getObjText(obj);
          if (sfxText) {
            const sfxFs = Math.round((obj.fontSize || 48) * psdScale);
            const sfxFf = getObjFont(obj, "'Nanum Brush Script',cursive").replace(/'/g, '');
            const sfxColor = obj.color || '#ff2222';
            const sfxTw = Math.round(obj.w * psdScale);
            const sfxTh = Math.round(obj.h * psdScale);
            const sfxLeft2 = Math.round(obj.x * psdScale);
            const sfxTextTop = Math.round(obj.y * psdScale);
            const tCanvas = document.createElement('canvas');
            tCanvas.width = sfxTw;
            tCanvas.height = sfxTh;
            const tCtx = tCanvas.getContext('2d');
            tCtx.font = `${sfxFs}px ${sfxFf}`;
            tCtx.fillStyle = sfxColor;
            tCtx.textAlign = 'center'; tCtx.textBaseline = 'middle';
            tCtx.fillText(sfxText, sfxTw / 2, sfxTh / 2);
            const shortSfx = sfxText.replace(/\n/g, ' ').substring(0, 30);
            children.push({
              name: `SFX ${idx+1} [${shortSfx}]`,
              left: sfxLeft2,
              top: sfxTextTop,
              canvas: tCanvas,
              blendMode: 'normal',
              opacity: 1,
            });
          }
        }
      } catch(e) {
        console.warn(`PSD layer ${idx} failed:`, e.message);
      }
    }

    // Apply psdScale to document dimensions
    const psdW = Math.round(PAGE_W * psdScale);
    const psdH = Math.round(contentH * psdScale);

    // Create composite canvas (flattened preview)
    const compositeCanvas = document.createElement('canvas');
    compositeCanvas.width = psdW;
    compositeCanvas.height = psdH;
    const compCtx = compositeCanvas.getContext('2d');
    compCtx.fillStyle = '#ffffff';
    compCtx.fillRect(0, 0, psdW, psdH);
    for (const child of children) {
      if (child.canvas) {
        compCtx.drawImage(child.canvas, child.left, child.top);
      }
    }

    const psd = {
      width: psdW,
      height: psdH,
      canvas: compositeCanvas,
      children: children
    };

    // PSD max size is 30000px — split into chunks if needed
    const PSD_MAX_H = 29000;
    const psdPages = [];
    if (psdH <= PSD_MAX_H) {
      psdPages.push({ startY: 0, height: psdH, children: children });
    } else {
      const totalPsdPages = Math.ceil(psdH / PSD_MAX_H);
      for (let p = 0; p < totalPsdPages; p++) {
        const startY = p * PSD_MAX_H;
        const sliceH = Math.min(PSD_MAX_H, psdH - startY);
        const pageChildren = children
          .filter(c => {
            const cTop = c.top;
            const cBottom = cTop + (c.canvas?.height || 0);
            return cBottom > startY && cTop < startY + sliceH;
          })
          .map(c => ({ ...c, top: c.top - startY }));
        psdPages.push({ startY, height: sliceH, children: pageChildren });
      }
    }

    try {
      for (let pi = 0; pi < psdPages.length; pi++) {
        const pg = psdPages[pi];
        const compositeCanvas = document.createElement('canvas');
        compositeCanvas.width = psdW;
        compositeCanvas.height = pg.height;
        const compCtx = compositeCanvas.getContext('2d');
        compCtx.fillStyle = '#ffffff';
        compCtx.fillRect(0, 0, psdW, pg.height);
        for (const child of pg.children) {
          if (child.canvas) compCtx.drawImage(child.canvas, child.left, child.top);
        }

        const psd = { width: psdW, height: pg.height, canvas: compositeCanvas, children: pg.children };
        const buffer = agPsd.writePsd(psd);
        const blob = new Blob([buffer], { type: 'application/octet-stream' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const suffix = psdPages.length > 1 ? `_part${pi+1}` : '';
        a.href = url;
        a.download = `${analysis?.title || 'webtoon'}_${currentEpisode || ''}화${suffix}.psd`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      }
      log(`✓ PSD 내보내기 완료 (${psdPages.length}개 파일, ${children.length}개 레이어)`, 'success');
    } catch(e) {
      log(`PSD 내보내기 실패: ${e.message}`, 'error');
      console.error('PSD export error:', e);
    }
  };

  // Old export functions for backward compatibility with bubbleOverlays
  const flattenWebtoonStrip = async () => {
    const validPanels = panels.filter(Boolean);
    if (validPanels.length === 0) return null;
    const imgs = await Promise.all(validPanels.map(loadImage));
    const EDITOR_W = 720;
    const panelEditorHeights = imgs.map(im => EDITOR_W * (im.height / im.width));
    const totalEditorH = panelEditorHeights.reduce((a, b) => a + b, 0);
    const outW = Math.max(...imgs.map(im => im.width));
    const scale = outW / EDITOR_W;
    const canvas = document.createElement('canvas');
    canvas.width = outW; canvas.height = Math.round(totalEditorH * scale);
    const ctx = canvas.getContext('2d');
    let yOff = 0;
    for (let i = 0; i < imgs.length; i++) {
      const drawH = Math.round(panelEditorHeights[i] * scale);
      ctx.drawImage(imgs[i], 0, yOff, outW, drawH);
      yOff += drawH;
    }
    for (const b of bubbleOverlays) {
      drawBubbleOnCanvas(ctx, b, b.x * scale, b.y * scale, b.w * scale, b.h * scale, scale);
    }
    return canvas.toDataURL('image/png');
  };

  const flattenPanelWithBubbles = async (panelIdx) => {
    const src = panels[panelIdx];
    if (!src || bubbleOverlays.length === 0) return src;
    let yOff = 0;
    const panelYMap = [];
    const EDITOR_W = 720;
    for (let i = 0; i < panels.length; i++) {
      if (!panels[i]) continue;
      const im = await loadImage(panels[i]);
      const eH = EDITOR_W * (im.height / im.width);
      panelYMap.push({ yStart: yOff, yEnd: yOff + eH, origIdx: i, imgW: im.width, imgH: im.height });
      yOff += eH;
    }
    const pm = panelYMap.find(p => p.origIdx === panelIdx);
    if (!pm) return src;
    const overlapping = bubbleOverlays.filter(b => b.y < pm.yEnd && (b.y + b.h) > pm.yStart);
    if (overlapping.length === 0) return src;
    const img = await loadImage(src);
    const canvas = document.createElement('canvas');
    canvas.width = img.width; canvas.height = img.height;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(img, 0, 0);
    const scale = img.width / EDITOR_W;
    for (const b of overlapping) {
      drawBubbleOnCanvas(ctx, b, b.x * scale, (b.y - pm.yStart) * scale, b.w * scale, b.h * scale, scale);
    }
    return canvas.toDataURL('image/png');
  };

  const log = useCallback((msg, type='info') => {
    const ts = new Date().toLocaleTimeString();
    setLogs(prev => [...prev, {msg: `[${ts}] ${msg}`, type}]);
  }, []);

  const callText = useCallback(async (system, user, extraOpts={}) => {
    return await callGemini(system, user, {model: textModel, maxTokens: extraOpts.maxTokens || 16384, thinkBudget: extraOpts.thinkBudget ?? 1024});
  }, [textModel]);

  // ======== Character State System ========
  // Unified state tracker: accumulates outfit, pose, location, expression, props per character across panels
  // Each character has a "current state" that persists and only changes when explicitly overridden
  const buildCharacterStates = useCallback((storyboardData, analysisData, upToIndex) => {
    // Initialize with episode outfit (if set) or default from analysis
    const states = {}; // {charId: {outfit, pose, expression, location, props, lastChangedAt, changeLog}}
    if (analysisData?.characters) {
      for (const c of analysisData.characters) {
        const initOutfit = c.outfit || '';
        const initAccessories = c.accessories || '';
        states[c.id] = {
          outfit: initOutfit,
          accessories: initAccessories,
          pose: 'standing',
          expression: 'neutral',
          location: '',
          props: [],
          lastChangedAt: 0,
          changeLog: [{panel: 0, field: 'init', from: '', to: initOutfit, desc: '기본 상태'}],
        };
      }
    }
    // Walk through panels up to (but not including) the target index to accumulate state
    const limit = upToIndex !== undefined ? upToIndex : storyboardData.length;
    for (let i = 0; i < limit; i++) {
      const panel = storyboardData[i];
      if (!panel?.characters) continue;
      for (const pc of panel.characters) {
        const cid = pc.id || pc;
        if (!states[cid]) {
          states[cid] = {outfit:'', pose:'standing', expression:'neutral', location:'', props:[], lastChangedAt: i, changeLog:[]};
        }
        const s = states[cid];
        // Outfit: only changes on explicit outfitOverride
        if (pc.outfitOverride) {
          const presetLabel = pc.outfitPreset ? ` [${pc.outfitPreset}]` : '';
          s.changeLog.push({panel: i+1, field: 'outfit', from: s.outfit, to: pc.outfitOverride, desc: `패널${i+1}에서 의상 변경${presetLabel}`});
          s.outfit = pc.outfitOverride;
          s.lastChangedAt = i;
        }
        // Accessories: changes on explicit accessoriesOverride
        if (pc.accessoriesOverride) {
          s.changeLog.push({panel: i+1, field: 'accessories', from: s.accessories, to: pc.accessoriesOverride, desc: `패널${i+1}에서 악세서리 변경`});
          s.accessories = pc.accessoriesOverride;
          s.lastChangedAt = i;
        }
        // Pose: always updates (tracks latest base posture)
        if (pc.pose && pc.pose !== s.pose) {
          s.changeLog.push({panel: i+1, field: 'pose', from: s.pose, to: pc.pose, desc: `패널${i+1}에서 포즈 변경`});
          s.pose = pc.pose;
          s.lastChangedAt = i;
        }
        // Expression
        if (pc.expression && pc.expression !== s.expression) {
          s.expression = pc.expression;
        }
      }
      // Track location from background
      if (panel.background) {
        for (const pc of panel.characters) {
          const cid = pc.id || pc;
          if (states[cid]) states[cid].location = panel.background;
        }
      }
    }
    return states;
  }, [currentEpisode]);

  // Generate a compact state summary string for a character (used in image prompts)
  const formatCharacterState = (charId, charState, panelCharData) => {
    const parts = [];
    // Current outfit (accumulated)
    if (charState.outfit) parts.push(`CURRENT OUTFIT: ${charState.outfit}`);
    // Pose continuity: show previous → current if different
    const curPose = panelCharData?.pose || charState.pose;
    if (charState.pose && curPose && charState.pose !== curPose) {
      parts.push(`POSE TRANSITION: ${charState.pose} → ${curPose}`);
    } else if (curPose) {
      parts.push(`POSE: ${curPose} (maintain this posture)`);
    }
    // Expression
    const curExpr = panelCharData?.expression || charState.expression;
    if (curExpr) parts.push(`expression: ${curExpr}`);
    return parts.join(', ');
  };

  // Helper: build reference images & descriptions from shared assets for a panel
  // charStates: optional character state map from buildCharacterStates()
  const buildPanelRefs = useCallback((panel, sa, analysisData, episodeRefs, charStates) => {
    const refImages = [];
    const assetDescriptions = [];
    if (!panel.characters || !analysisData) {
      console.warn('[buildPanelRefs] 패널에 characters 또는 analysisData 없음:', {hasChars: !!panel.characters, hasAnalysis: !!analysisData});
      return {refImages, assetDescriptions, charIds: []};
    }

    // Debug: log asset availability
    const saCharCount = Object.keys(sa?.characters || {}).length;
    const saBgCount = Object.keys(sa?.backgrounds || {}).length;
    const saPropCount = Object.keys(sa?.props || {}).length;
    const epCharCount = Object.keys(episodeRefs?.characters || {}).length;
    const epBgCount = Object.keys(episodeRefs?.backgrounds || {}).length;
    const mainCharIds = (panel.characters || []).map(pc => pc.id || pc);
    const bgCharIds = (panel.backgroundCharacters || []).map(bc => bc.id || bc);
    console.log(`[buildPanelRefs] 에셋 현황: sharedAssets(캐릭터:${saCharCount}, 배경:${saBgCount}, 소품:${saPropCount}), episodeRefs(캐릭터:${epCharCount}, 배경:${epBgCount})`);
    console.log(`[buildPanelRefs] sharedAssets 캐릭터 keys:`, Object.keys(sa?.characters || {}));
    console.log(`[buildPanelRefs] episodeRefs 캐릭터 keys:`, Object.keys(episodeRefs?.characters || {}));
    // Debug: check if images exist in each source
    Object.entries(sa?.characters || {}).forEach(([k,v]) => console.log(`[buildPanelRefs] sa.characters["${k}"] hasImage=${!!v?.image}, type=${typeof v?.image}, len=${v?.image?.length||0}`));
    Object.entries(episodeRefs?.characters || {}).forEach(([k,v]) => console.log(`[buildPanelRefs] episodeRefs.characters["${k}"] type=${typeof v}, isDataUri=${v?.startsWith?.('data:')}, len=${v?.length||0}`));
    console.log(`[buildPanelRefs] 패널 캐릭터: main=[${mainCharIds.join(',')}], background=[${bgCharIds.join(',')}] → 총 ${mainCharIds.length + bgCharIds.length}명`);

    const charIds = [];
    for (const pc of panel.characters) {
      const charId = pc.id || pc;
      charIds.push(charId);
      const saCharImg = sa?.characters?.[charId]?.image;
      const epCharImg = episodeRefs?.characters?.[charId];
      // 프리셋 이미지 우선: 패널에 outfitPreset이 지정되어 있으면 해당 프리셋 이미지 사용
      const presetName = pc.outfitPreset;
      const presetImg = presetName ? sa?.characters?.[charId]?.outfitPresets?.[presetName]?.image : null;
      // 우선순위: 프리셋 이미지 > 에피소드 레퍼런스 > 기본 sharedAssets
      const charImg = presetImg || epCharImg || saCharImg;
      if (presetImg) console.log(`[buildPanelRefs] ✓ 캐릭터 "${charId}" 프리셋 "${presetName}" 이미지 사용`);
      const charInfo = analysisData.characters?.find(c => c.id === charId);
      const saCharData = sa?.characters?.[charId];
      const charState = charStates?.[charId];
      // Outfit priority: panel-level override (from preset or manual) > accumulated state > default
      const outfitDesc = pc.outfitOverride || charState?.outfit || charInfo?.outfit || '';
      // Accessories priority: panel override > accumulated state > default
      const accessoriesDesc = pc.accessoriesOverride || charState?.accessories || charInfo?.accessories || '';
      const appearanceDesc = charInfo?.appearance || charId;
      // Build detailed Visual ID Card: combine all available description fields
      const detailParts = [appearanceDesc];
      if (charInfo?.age) detailParts.push(`age: ${charInfo.age}`);
      if (charInfo?.gender) detailParts.push(`gender: ${charInfo.gender}`);
      if (charInfo?.hairStyle || charInfo?.hair) detailParts.push(`hair: ${charInfo.hairStyle || charInfo.hair}`);
      if (charInfo?.eyeColor || charInfo?.eyes) detailParts.push(`eyes: ${charInfo.eyeColor || charInfo.eyes}`);
      if (charInfo?.height) detailParts.push(`height/build: ${charInfo.height}`);
      if (charInfo?.features) detailParts.push(`distinctive features: ${charInfo.features}`);
      if (outfitDesc) detailParts.push(`outfit: ${outfitDesc}`);
      if (accessoriesDesc && accessoriesDesc !== 'none') detailParts.push(`accessories: ${accessoriesDesc}`);
      if (saCharData?.description && saCharData.description !== appearanceDesc) detailParts.push(saCharData.description);
      // Add state-based context (pose continuity, expression, transitions)
      if (charState) {
        const stateContext = formatCharacterState(charId, charState, pc);
        if (stateContext) detailParts.push(stateContext);
      } else {
        // Fallback: no state system, just use panel's pose
        if (pc.pose) detailParts.push(`pose: ${pc.pose}`);
      }
      const fullDesc = detailParts.join(', ');
      const charLabel = `[Character ${charInfo?.name || charId}]`;
      assetDescriptions.push(`${charLabel}: ${fullDesc}`);
      if (charImg) {
        refImages.push({image: charImg, description: `character: ${charInfo?.name || charId} — ${fullDesc}`});
        const imgSource = presetImg ? `프리셋(${presetName})` : epCharImg ? 'episodeRefs(의상변경)' : 'sharedAssets(기본)';
        console.log(`[buildPanelRefs] ✓ 캐릭터 "${charId}" 이미지 발견 (source: ${imgSource}, length: ${charImg.length})`);
      } else {
        console.warn(`[buildPanelRefs] ✗ 캐릭터 "${charId}" 이미지 없음 (sharedAssets keys: [${Object.keys(sa?.characters || {}).join(',')}])`);
      }
    }

    // backgroundCharacters — 배경 캐릭터도 레퍼런스 이미지 수집 (시각적 일관성)
    if (panel.backgroundCharacters?.length > 0) {
      for (const bc of panel.backgroundCharacters) {

  // Programmatically strip Korean onomatopoeia / sound effects from image prompts
  const sanitizeImagePrompt = (prompt) => {
    if (!prompt) return prompt;
    let p = prompt;
    // Remove common Korean SFX patterns (quoted or standalone): 쾅, 끼익, 부릉, 와장창, 쿵, 탁, 펑, 빠직, etc.
    p = p.replace(/['""'][가-힣]{1,6}!?['""']/g, '');
    // Remove standalone Korean SFX words with ! (e.g., 쾅!, 끼익!, 부르르릉!)
    p = p.replace(/(?:^|\s)[가-힣]{1,8}!(?:\s|$|,|\.)/g, ' ');
    // Remove explicit sound effect phrases in English
    p = p.replace(/sound\s*(?:effect|fx)s?\s*(?:like|such as|:)?\s*['""']?[^,.'""'\n]*['""']?/gi, '');
    // Remove "with sound effect(s)" phrases
    p = p.replace(/with\s+(?:the\s+)?sound\s+(?:effect|fx)s?\s+(?:of\s+)?['""']?[^,.'""'\n]*['""']?/gi, '');
    // Remove "onomatopoeia" mentions
    p = p.replace(/onomatopoeia\s*[:.]?\s*['""']?[^,.'""'\n]*['""']?/gi, '');

    // === Tone down intense/graphic visual descriptions ===
    // Red/glowing eyes → intense/sharp eyes
    p = p.replace(/\b(glowing|blazing|burning|fiery|flame[- ]like)\s+(red\s+)?eyes?\b/gi, 'intense sharp eyes');
    p = p.replace(/\bred[- ](glowing|lit|tinged|rimmed|blazing)\s+eyes?\b/gi, 'sharp intense eyes');
    p = p.replace(/\beyes?\s+(glowing|burning|blazing)\s+red\b/gi, 'eyes with intense gaze');
    p = p.replace(/\bcrimson\s+eyes?\b/gi, 'deep red-brown eyes');
    p = p.replace(/\bblood[- ]?red\s+eyes?\b/gi, 'dark red eyes');
    // Blood / gore → soften or remove
    p = p.replace(/\bblood[- ]?(soaked|stained|splattered|covered|dripping|pooling|smeared)\b/gi, 'stained');
    p = p.replace(/\bblood\s+(drips?|flows?|streams?|pours?|gushes?|oozes?)\b/gi, 'tension visible');
    p = p.replace(/\b(pool|puddle|river|trail)\s+of\s+blood\b/gi, 'dark stain on the ground');
    p = p.replace(/\bbloody\s+(face|hands?|clothes?|body|wound|knife|sword|weapon)\b/gi, 'battle-worn $1');
    p = p.replace(/\bgore\b/gi, '');
    p = p.replace(/\bgory\b/gi, 'dramatic');
    // Graphic violence toning
    p = p.replace(/\b(severed|dismembered|decapitated|mutilated)\b/gi, 'injured');
    p = p.replace(/\b(gushing|spurting|spraying)\s+blood\b/gi, 'visible wound');
    p = p.replace(/\bopen\s+wound\b/gi, 'wound');
    p = p.replace(/\bbleeding\s+(profusely|heavily)\b/gi, 'wounded');
    // Overly intense expressions
    p = p.replace(/\b(maniacal|psychotic|deranged|insane)\s+(grin|smile|laughter|expression|look)\b/gi, 'unsettling $2');
    p = p.replace(/\b(murderous|homicidal|bloodthirsty|blood[- ]?lust)\s+(intent|rage|fury|eyes?|gaze|expression)\b/gi, 'fierce $2');
    p = p.replace(/\bveins?\s+(bulging|popping|throbbing|pulsing)\b/gi, 'tense expression');
    // Dark aura / demonic toning
    p = p.replace(/\b(demonic|hellish|satanic|infernal)\s+(aura|energy|power|presence|glow)\b/gi, 'dark $2');
    p = p.replace(/\bblack\s+(miasma|corruption|ooze)\b/gi, 'dark shadow');

    // Clean up extra spaces
    p = p.replace(/\s{2,}/g, ' ').trim();
    return p;
  };

  const CAMERA_VARIETY = {

  // ============================================================
  // buildStyledPrompt: CENTRALIZED style prompt builder for ALL providers

  const buildStyledPrompt = useCallback((prompt, opts={}) => {
    const curStyle = ART_STYLES[artStyle] || ART_STYLES.naverWebtoon;

    // --- Provider-specific style mapping ---
    // Some providers produce better results with a different style preset
    // e.g., Grok's "naverWebtoon" output ≈ Gemini's "romanceWebtoon" output
    const provider = opts.provider || '';
    const mappedStyleKey = curStyle.providerStyleMap?.[provider];
    const isStyleNone = mappedStyleKey === 'none'; // Provider works best with refs only, no style
    const effectiveStyle = isStyleNone ? null : (mappedStyleKey ? (ART_STYLES[mappedStyleKey] || curStyle) : curStyle);

    if (isStyleNone) {

      const bgDescs = opts.assetDescriptions.filter(d => d.startsWith('[Background'));
      if (charDescs.length + bgDescs.length > 0) {
        const compactDescs = charDescs.map(d => d.replace(/,?\s*PREVIOUS POSE:.*?(?=,\s*\[|$)/gi, '').replace(/,?\s*pose:.*?(?=,\s*\[|$)/gi, ''));
        compactIdCards = '\nCHARACTER REFS: ' + compactDescs.join(' | ');
        if (bgDescs.length > 0) compactIdCards += '\nBACKGROUND: ' + bgDescs[0];
      }
    }

    // --- Asset suffix (when no reference images available) ---
    const refs = opts.referenceImages || [];
    const assetSuffix = (opts.assetDescriptions?.length > 0 && refs.length === 0 && !visualIdCards && !compactIdCards)
      ? '\n\nCharacter/asset details:\n' + opts.assetDescriptions.join('\n')
      : '';

    return {
      stylePrefix: effectiveStylePrefix,
      cleanedPrompt,
      noTextDirective,
      toneDirective,
      styleReinforce,
      visualIdCards,
      compactIdCards,
      assetSuffix,
      isStructured,
      // Pre-built prompt variants
      full: effectiveStylePrefix + cleanedPrompt + visualIdCards + toneDirective + noTextDirective + styleReinforce,
      compact: effectiveStylePrefix + cleanedPrompt + compactIdCards + toneDirective + noTextDirective + styleReinforce,
      base: effectiveStylePrefix + cleanedPrompt + assetSuffix,
    };
  }, [artStyle, customStylePrompt, getStylePrefix]);

  const callImage = useCallback(async (prompt, opts={}) => {
    const curStyleName = artStyle === 'custom' ? '사용자 정의' : (ART_STYLES[artStyle]||ART_STYLES.naverWebtoon).name;
    const refs = opts.referenceImages || [];

    // Map imageProvider to provider key for style mapping
    const providerKey = {
      nanoBanana: 'gemini', falAI: 'flux', grok: 'grok', imagen4: 'imagen4',
      a2eImage: 'a2e', a2eNanoBanana: 'a2eNanoBanana', flux2Pro: 'flux2Pro',
      ninjaChat: 'ninjaChat', stableDiffusion: 'stableDiffusion', kieSeedream: 'kieSeedream'
    }[imageProvider] || imageProvider;

    // Build styled prompt variants using centralized builder (with provider-specific style mapping)
    const sp = buildStyledPrompt(prompt, {...opts, provider: providerKey});
    const stylePrefix = sp.stylePrefix;
    const basePrompt = sp.base;

    // ========== Gemini (Vertex AI NanoBanana — supports multiple models) ==========
    if (imageProvider === 'nanoBanana') {
      console.log(`[NanoBanana] 선택된 모델 키: "${nbVertexModel}", vertexModel: "${NB_VERTEX_MODELS[nbVertexModel]?.vertexModel || 'NOT FOUND'}"`)
      const nbInfo = NB_VERTEX_MODELS[nbVertexModel] || NB_VERTEX_MODELS['gemini-2.5-flash'];
      // 레퍼런스 우선순위 정렬: 캐릭터 우선 → 이전패널 → 배경(1개) → 소품/기타 (모델별 maxRefs 적용)
      const GEMINI_MAX_REFS = nbInfo.maxRefs || 6;
      let sortedRefs = refs;
      if (refs.length > 0) {
        const prevPanelRefs = refs.filter(r => (r.description || '').toLowerCase().includes('previous panel'));
        const bgRefs = refs.filter(r => (r.description || '').toLowerCase().startsWith('background:'));
        const charRefs = refs.filter(r => (r.description || '').toLowerCase().startsWith('character:'));
        const otherRefs = refs.filter(r => {
          const d = (r.description || '').toLowerCase();
          return !d.startsWith('background:') && !d.startsWith('character:') && !d.includes('previous panel');
        });
        // 캐릭터를 최우선으로 배치 (캐릭터 일관성이 가장 중요)
        sortedRefs = [...charRefs, ...prevPanelRefs, ...bgRefs.slice(0, 1), ...otherRefs].slice(0, GEMINI_MAX_REFS);
        console.log(`[NanoBanana] 레퍼런스 우선순위 정렬 (maxRefs=${GEMINI_MAX_REFS}): 캐릭터 ${charRefs.length}개, 이전패널 ${prevPanelRefs.length}개, 배경 ${Math.min(bgRefs.length,1)}/${bgRefs.length}개, 기타 ${otherRefs.length}개 → ${sortedRefs.length}개`);
      }
      const geminiOpts = {...opts, model: nbInfo.vertexModel, referenceImages: sortedRefs, maxRefs: GEMINI_MAX_REFS};
      // refInstruction은 callNanoBanana 내부에서 이미 처리하므로 중복 제거
      if (refs.length > 0) {
        log(`${nbInfo.name} 사용 (${curStyleName} 스타일 + 레퍼런스 ${refs.length}개 직접 전달)`, 'info');
      } else {
        log(`${nbInfo.name} 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      try {
        return await callNanoBanana(basePrompt + sp.toneDirective + sp.noTextDirective + sp.styleReinforce, geminiOpts);
      } catch (gemErr) {
        const errMsg = gemErr.message || '';
        if (errMsg.includes('policy') || errMsg.includes('filtered') || errMsg.includes('Prohibited') || errMsg.includes('SAFETY')) {
          log('⛔ Google 콘텐츠 정책 필터에 의해 차단됨 — 프롬프트를 수정해주세요', 'error');
        } else {
          log(`${nbInfo.name} 오류: ${errMsg.substring(0, 200)}`, 'error');
        }
        throw gemErr;
      }
    }

    // ========== fal.ai FLUX ==========
    if (imageProvider === 'falAI') {
      let styledPrompt = basePrompt + sp.toneDirective + sp.styleReinforce;
      log(`fal.ai FLUX: "${curStyleName}" 스타일 프롬프트 적용됨`, 'info');
      const falOpts = {
        imageSize: opts.aspectRatio === '16:9' ? {width:1024,height:576} : opts.aspectRatio === '1:1' ? {width:768,height:768} : {width:768,height:1024}
      };

      // Auto-apply LoRAs: art style LoRA + character LoRAs (max 3 total for fal.ai)
      const activeLoras = [];

      // 1) Art style LoRA from ART_STYLES
      const curStyle = ART_STYLES[artStyle] || ART_STYLES.naverWebtoon;
      if (curStyle.loras?.length > 0) {
        curStyle.loras.forEach(l => activeLoras.push({path: l.path, scale: l.scale || 0.8}));
        log(`fal.ai: 스타일 LoRA ${curStyle.loras.length}개 적용 (${curStyle.name})`, 'info');
      }

      // 2) Character-specific trained LoRAs
      if (opts.characterIds?.length > 0) {
        for (const cid of opts.characterIds) {
          if (activeLoras.length >= 3) break; // fal.ai max 3 LoRAs
          const lora = loraModels[cid];
          if (lora?.status === 'ready' && lora.url) {
            activeLoras.push({path: lora.url, scale: 0.8});
            if (lora.triggerWord && !styledPrompt.includes(lora.triggerWord)) {
              styledPrompt = styledPrompt + ', ' + lora.triggerWord;
            }
          }
        }
      }
      if (activeLoras.length > 0) {
        falOpts.loras = activeLoras;
        log(`fal.ai: LoRA 총 ${activeLoras.length}개 적용 (스타일+캐릭터)`, 'info');
      }

      // Upload reference images to fal CDN and use as IP-Adapter inputs (up to 4)
      if (refs.length > 0) {
        log(`fal.ai: 레퍼런스 이미지 ${Math.min(refs.length, 4)}개 업로드 중 (IP-Adapter)...`, 'info');
        const ipImages = [];
        for (const ref of refs.slice(0, 4)) {
          if (ref.image?.startsWith('data:')) {
            try {
              const url = await uploadToFalCDN(ref.image);
              if (url && !url.startsWith('data:')) {
                ipImages.push({url, scale: 0.85});
                log(`  ✓ 업로드 성공: ${url.substring(0, 60)}...`, 'info');
              } else {
                log(`  ✗ 업로드 실패 (data URL 반환됨)`, 'error');
              }
            } catch(e) {
              log(`  ✗ 업로드 오류: ${e.message}`, 'error');
            }
          } else if (ref.image) {
            // Already a URL
            ipImages.push({url: ref.image, scale: 0.85});
          }
        }
        if (ipImages.length > 0) {
          falOpts.ipAdapterImages = ipImages;
          const loraInfo = activeLoras.length > 0 ? ` + LoRA ${activeLoras.length}개` : '';
          log(`fal.ai FLUX 사용 (IP-Adapter ${ipImages.length}개 [scale=0.85]${loraInfo} + ${curStyleName} 스타일)`, 'info');
          return await callFalAI(styledPrompt, falOpts);
        }
      }
      const loraInfo = activeLoras.length > 0 ? ` (LoRA ${activeLoras.length}개 적용)` : '';
      log(`fal.ai FLUX 사용 (${curStyleName} 스타일${loraInfo})`, 'info');
      return await callFalAI(styledPrompt, falOpts);
    }

    // ========== Grok Image (xAI) ==========
    if (imageProvider === 'grokImage') {
      if (!hasXaiKey()) { log('xAI API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }

      const isMatureStyle = artStyle === 'tlWebtoon' || artStyle === 'blWebtoon';

      // Use centralized prompt builder (compact mode for Grok)
      const grokSp = buildStyledPrompt(prompt, {...opts, compact: true, provider: 'grok'});
      let cleanedPrompt = grokSp.cleanedPrompt;
      if (isMatureStyle) {
        cleanedPrompt = sanitizeForGrok(cleanedPrompt);
        log('Grok: TL/BL 모드 — 콘텐츠 필터 대응 프롬프트 적용', 'info');
      }

      const grokPrompt = grokSp.stylePrefix + cleanedPrompt + grokSp.compactIdCards + grokSp.toneDirective + grokSp.noTextDirective + grokSp.styleReinforce;
      const charCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Character')).length;

      // Collect ALL reference images for Grok Edit (max 5 per xAI API)
      // Priority: 이전패널(최우선) → 배경(1개) → 캐릭터 → 소품/기타
      const GROK_MAX_REFS = 5;
      const grokRefImages = [];
      if (opts.referenceImages?.length > 0) {
        const prevPanelRefs = opts.referenceImages.filter(r => r.description?.toLowerCase().includes('previous panel'));
        const bgRefs = opts.referenceImages.filter(r => r.description?.toLowerCase().startsWith('background:'));
        const charRefs = opts.referenceImages.filter(r => r.description?.toLowerCase().startsWith('character:'));
        const otherRefs = opts.referenceImages.filter(r => {
          const d = (r.description || '').toLowerCase();
          return !d.startsWith('background:') && !d.startsWith('character:') && !d.includes('previous panel');
        });
        // 1) 이전 패널 최우선, 2) 배경 최대 1개, 3) 캐릭터 전부, 4) 소품/기타
        const prioritized = [...prevPanelRefs, ...bgRefs.slice(0, 1), ...charRefs, ...otherRefs];
        for (const ref of prioritized) {
          if (grokRefImages.length >= GROK_MAX_REFS) break;
          const img = ref.image || ref;
          if (typeof img === 'string' && (img.startsWith('data:') || img.startsWith('http'))) {
            grokRefImages.push(img);
          }
        }
        console.log(`[Grok] 레퍼런스 수집: 이전패널 ${prevPanelRefs.length}개, 배경 ${Math.min(bgRefs.length,1)}/${bgRefs.length}개, 캐릭터 ${charRefs.length}개, 기타 ${otherRefs.length}개 → 총 ${grokRefImages.length}개 사용 (max ${GROK_MAX_REFS})`);
      }

      if (grokRefImages.length > 0) {
        // Use Grok Edit API with reference images for better consistency
        const refLabels = [];
        if (opts.referenceImages) {
          opts.referenceImages.forEach((ref, idx) => {
            const desc = (ref.description || '').toLowerCase();
            if (desc.includes('background')) refLabels.push(`image ${idx+1}: background/environment reference — replicate this setting exactly`);
            else if (desc.includes('character')) refLabels.push(`image ${idx+1}: character reference — copy this character's face, hair, outfit, body exactly`);
            else if (desc.includes('previous panel')) refLabels.push(`image ${idx+1}: previous panel — match art style, lighting, and character appearance`);
            else refLabels.push(`image ${idx+1}: visual reference`);
          });
        }
        const refContext = refLabels.length > 0
          ? `\nReference images provided: ${refLabels.join('; ')}. You MUST faithfully reproduce the visual details from ALL reference images — backgrounds, characters, art style, color palette.`
          : '';
        const editPrompt = grokSp.stylePrefix + cleanedPrompt + refContext + grokSp.compactIdCards + grokSp.toneDirective + grokSp.noTextDirective + grokSp.styleReinforce;
        log(`Grok Edit (imagine 기본) 사용 — 레퍼런스 ${grokRefImages.length}개 + ${curStyleName}${charCount > 0 ? ' + 캐릭터 '+charCount+'명' : ''}`, 'info');
        try {
          return await callGrokEdit(editPrompt, grokRefImages, {aspectRatio: opts.aspectRatio || '3:4', model: grokImageModel});
        } catch (editErr) {
          const editErrMsg = editErr.message || '';
          if (editErrMsg.includes('content moderation') || editErrMsg.includes('rejected')) {
            log('⚠️ Grok Edit 콘텐츠 필터 거부 — 이 패널을 건너뜁니다.', 'warn');
            return null;
          }
          log(`Grok Edit 실패: ${editErrMsg.substring(0,100)} — 텍스트 전용으로 재시도...`, 'warn');
          // Fall through to text-only generation
        }
      }

      const grokEffectiveStyleName = grokSp.stylePrefix ? (ART_STYLES[artStyle]?.providerStyleMap?.grok ? ART_STYLES[ART_STYLES[artStyle].providerStyleMap.grok]?.name + ' → ' + curStyleName : curStyleName) : curStyleName;
      if (charCount > 0) {
        log(`Grok ${grokImageModel === 'grok-imagine-image-pro' ? 'Pro' : 'Image'} 사용 (${grokEffectiveStyleName} + 에셋 ID카드: 캐릭터 ${charCount}명)`, 'info');
      } else {
        log(`Grok ${grokImageModel === 'grok-imagine-image-pro' ? 'Pro' : 'Image'} 사용 (${grokEffectiveStyleName} 스타일 적용)`, 'info');
      }
      try {
        return await callGrokImage(grokPrompt, {aspectRatio: opts.aspectRatio || '3:4', model: grokImageModel});
      } catch (grokErr) {
        const errMsg = grokErr.message || '';
        if (errMsg.includes('content moderation') || errMsg.includes('rejected')) {
          log('⚠️ Grok 콘텐츠 필터 거부 — 이 패널을 건너뜁니다.', 'warn');
          return null; // Skip this panel, proceed to next
        }
        throw grokErr; // Re-throw non-moderation errors
      }
    }

    // ========== A2E Image (Text to Image only) ==========
    if (imageProvider === 'a2eImage') {
      if (!hasA2eKey()) { log('A2E API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      const isRealistic = artStyle === 'realistic' || artStyle === 'cinematic' || artStyle === 'portrait';
      const reqKey = isRealistic ? 'high_aes_general_v21_L' : 'high_aes';
      const modelName = a2eModelType === 'seedream' ? 'Seedream 5.0' : a2eModelType === 'zimage' ? 'Z-Image' : (reqKey === 'high_aes' ? 'Manga' : 'General');

      // Character refs only, max 2 for T2I
      const charRefs = refs.filter(r => !r.description?.startsWith('background') && !r.description?.includes('prop'));
      const a2eRefs = charRefs.slice(0, 2);
      const hasRefs = a2eRefs.length > 0;

      log(`A2E ${modelName} 사용 (${hasRefs ? '레퍼런스 ' + a2eRefs.length + '개, ' : ''}프롬프트 ${basePrompt.length}자)`, 'info');

      // A2E adjustments — brighter skin + slightly lighter colors
      const a2eFix = ', bright fair translucent skin tone, slightly brighter color tones';
      const a2ePrompt = basePrompt + a2eFix + sp.toneDirective + sp.noTextDirective + sp.styleReinforce;

      try {
        const urls = await callA2eImage(a2ePrompt, {
          aspectRatio: opts.aspectRatio || '3:4',
          reqKey: reqKey,
          modelType: a2eModelType,
          referenceImages: hasRefs ? a2eRefs : undefined
        });
        return urls;
      } catch (a2eErr) {
        const errMsg = a2eErr.message || '';
        log(`A2E 오류: ${errMsg.substring(0, 200)}`, 'error');
        throw a2eErr;
      }
    }

    // ========== A2E NanoBanana (Gemini Flash + Reference Images via A2E) ==========
    if (imageProvider === 'a2eNanoBanana') {
      if (!hasA2eKey()) { log('A2E API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      // Character refs first, then bg/props (max 4)
      const nbCharRefs = refs.filter(r => !r.description?.startsWith('background') && !r.description?.includes('prop'));
      const nbOtherRefs = refs.filter(r => r.description?.startsWith('background') || r.description?.includes('prop'));
      const nbRefs = [...nbCharRefs, ...nbOtherRefs].slice(0, 4);
      if (nbRefs.length > 0) {
        log(`A2E NanoBanana 사용 (캐릭터 ${nbCharRefs.length}개 + 기타 ${Math.min(nbOtherRefs.length, 4 - nbCharRefs.length)}개)`, 'info');
      } else {
        log('A2E NanoBanana 사용 (이미지 생성)', 'info');
      }
      try {
        const urls = await callA2eNanoBanana(basePrompt + sp.toneDirective + sp.noTextDirective + sp.styleReinforce, {
          referenceImages: nbRefs.length > 0 ? nbRefs : undefined
        });
        return urls;
      } catch (nbErr) {
        const errMsg = nbErr.message || '';
        if (errMsg.includes('policy') || errMsg.includes('filtered') || errMsg.includes('Prohibited')) {
          log('⛔ Google 콘텐츠 정책 필터에 의해 차단됨 — 프롬프트를 수정해주세요', 'error');
        } else {
          log(`A2E NanoBanana 오류: ${errMsg.substring(0, 200)}`, 'error');
        }
        throw nbErr;
      }
    }

    // ========== Flux 2 Pro (fal.ai — reference images via /edit endpoint) ==========
    if (imageProvider === 'flux2Pro') {
      if (!hasFalKey()) { log('fal.ai API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      // Character refs first, then others (max 8)
      const fluxCharRefs = refs.filter(r => !r.description?.startsWith('background') && !r.description?.includes('prop'));
      const fluxOtherRefs = refs.filter(r => r.description?.startsWith('background') || r.description?.includes('prop'));
      const fluxRefs = [...fluxCharRefs, ...fluxOtherRefs].slice(0, 8);
      if (fluxRefs.length > 0) {
        log(`Flux 2 Pro 사용 (캐릭터 ${fluxCharRefs.length}개 + 기타 ${fluxRefs.length - fluxCharRefs.length}개)`, 'info');
      } else {
        log('Flux 2 Pro 사용 (텍스트→이미지)', 'info');
      }
      try {
        const urls = await callFlux2Pro(basePrompt + sp.toneDirective + sp.noTextDirective + sp.styleReinforce, {
          referenceImages: fluxRefs.length > 0 ? fluxRefs : undefined,
          aspectRatio: opts.aspectRatio || '3:4'
        });
        return urls;
      } catch (fluxErr) {
        const errMsg = fluxErr.message || '';
        log(`Flux 2 Pro 오류: ${errMsg.substring(0, 200)}`, 'error');
        throw fluxErr;
      }
    }

    // ========== NinjaChat (다중 모델) ==========
    if (imageProvider === 'ninjaChat') {
      if (!hasNinjaChatKey()) { log('NinjaChat API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
      // NinjaChat supports 1 reference — priority: previous panel > background
      const prevPanelRefs = refs.filter(r => r.description?.toLowerCase().includes('previous panel'));
      const bgRefs = refs.filter(r => r.description?.toLowerCase().includes('background'));
      const njcRefs = prevPanelRefs.length > 0 ? prevPanelRefs.slice(0, 1) : (bgRefs.length > 0 ? bgRefs.slice(0, 1) : []);
      const refCount = njcRefs.length;
      const modelName = ninjaChatModel.split('-').slice(0, 2).join('-');
      console.log(`[NinjaChat] ref 선택: 전체 ${refs.length}개 중 배경 ${bgRefs.length}개 발견, 선택: ${refCount}개`, njcRefs.map(r => ({desc: r.description?.substring(0,50), len: r.image?.length})));

      const njcStyleMode = sp.styleReinforce ? curStyleName : '레퍼런스 추종';
      if (prevPanelRefs.length > 0) {
        log(`NinjaChat ${modelName} 사용 (이전 패널 레퍼런스, ${njcStyleMode})`, 'info');
      } else if (refCount > 0) {
        log(`NinjaChat ${modelName} 사용 (배경 레퍼런스, ${njcStyleMode})`, 'info');
      } else {
        log(`NinjaChat ${modelName} 사용 (텍스트→이미지, ${njcStyleMode})`, 'info');
      }
      try {
        const urls = await callNinjaChat(basePrompt + sp.toneDirective + sp.noTextDirective + sp.styleReinforce, {
          model: ninjaChatModel,
          referenceImages: refCount > 0 ? njcRefs : undefined,
          aspectRatio: opts.aspectRatio || '3:4'
        });
        return urls;
      } catch (njcErr) {
        const errMsg = njcErr.message || '';
        log(`NinjaChat 오류: ${errMsg.substring(0, 200)}`, 'error');
        throw njcErr;
      }
    }

    // ========== Stable Diffusion ==========
    if (imageProvider === 'stableDiffusion') {
      const sdOpts = {aspectRatio: opts.aspectRatio || '3:4'};
      if (refs.length > 0) {
        // Use background asset as init_image for image-to-image if available
        const bgRef = refs.find(r => r.description?.startsWith('background'));
        if (bgRef?.image?.startsWith('data:')) {
          sdOpts.initImage = bgRef.image;
          sdOpts.strength = 0.65;
          log(`SD image-to-image: 배경 asset을 init_image로 활용 (${curStyleName} 스타일)`, 'info');
        }
        // Asset descriptions are already in basePrompt via assetSuffix
        log(`Stable Diffusion 사용 (${curStyleName} 스타일 + asset 설명 ${refs.length}개)`, 'info');
      } else {
        log(`Stable Diffusion 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      return await callStableDiffusion(basePrompt + sp.toneDirective + sp.noTextDirective + sp.styleReinforce, sdOpts);
    }

    // ========== Kie.ai Seedream (3.0 / 4.0 / 4.5 / 5.0 Lite) ==========
    if (imageProvider === 'kieSeedream') {
      let effectiveMode = kieSeedreamMode;
      // Auto-upgrade: if t2i model and refs available, switch to edit/i2i variant
      const autoUpgradeMap = {'4.0-t2i':'4.0-edit', '4.5-t2i':'4.5-edit', '5.0-t2i':'5.0-i2i'};
      if (refs.length > 0 && autoUpgradeMap[effectiveMode]) effectiveMode = autoUpgradeMap[effectiveMode];

    // ========== Siray.AI Seedream 4.0 ==========
    if (imageProvider === 'siraySeedream') {
      // Auto-select sub-model based on reference availability

      if (refs.length > 0 && effectiveSubModel === 't2i') {

      }

      if ((effectiveSubModel === 'ref2i' || effectiveSubModel === 'i2i') && refs.length > 0) {

      }

    }

    // ========== Higgsfield Seedream 4.0 ==========
    if (imageProvider === 'higgsSeedream') {
      // Auto-select edit model when refs available and mode is edit (or auto-upgrade from t2i)
      let effectiveMode = higgsSeedreamMode;
      if (refs.length > 0 && effectiveMode === 't2i') {

      }
      const higgsOpts = {aspectRatio: opts.aspectRatio || '3:4', subModel: effectiveMode};
      if (effectiveMode === 'edit' && refs.length > 0) {
        higgsOpts.referenceImages = refs;

      } else {
        log(`Seedream 4.0 (Higgsfield) 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      return await callHiggsfieldSeedream(basePrompt + sp.toneDirective + sp.noTextDirective + sp.styleReinforce, higgsOpts);
    }

    // ========== Imagen 4 (default) — text-only, use detailed Character Visual ID Cards ==========
    {
      // Use centralized prompt builder (full mode for Imagen4 with detailed ID cards)
      const imagen4Prompt = sp.full;
      const charCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Character')).length;
      const propCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Prop')).length;
      const bgCount = (opts.assetDescriptions || []).filter(d => d.startsWith('[Background')).length;
      if (charCount > 0 || propCount > 0 || bgCount > 0) {
        log(`Imagen 4 사용 (${curStyleName} + 에셋 ID카드: 캐릭터 ${charCount} / 소품 ${propCount} / 배경 ${bgCount})`, 'info');
      } else {
        log(`Imagen 4 사용 (${curStyleName} 스타일 적용)`, 'info');
      }
      return await callImagen(imagen4Prompt, {aspectRatio: opts.aspectRatio || '3:4'});
    }
  }, [imageProvider, artStyle, customStylePrompt, getStylePrefix, log, loraModels, nbVertexModel, grokImageModel, kieSeedreamMode]);

  // LoRA Training: train a character LoRA from reference images
  const trainCharacterLora = async (charId, charName, images) => {
    if (!hasFalKey()) { log('fal.ai API 키가 필요합니다. 설정에서 입력해주세요.', 'error'); return; }
    if (!images || images.length === 0) { log('학습할 캐릭터 이미지가 없습니다.', 'error'); return; }

    setLoraModels(prev => ({...prev, [charId]: {status: 'preparing', triggerWord: charId.replace(/[^a-zA-Z]/g,'') || 'ohwx'}}));
    log(`LoRA 학습 시작: ${charName} (이미지 ${images.length}장)...`, 'info');

    try {
      // 1. Create zip from images
      log(`${charName}: 학습 이미지 패키징 중...`, 'info');
      const zipBlob = await createTrainingZip(images);
      log(`${charName}: ZIP 생성 완료 (${(zipBlob.size/1024).toFixed(0)}KB)`, 'info');

      // 2. Upload zip to fal CDN
      log(`${charName}: 이미지 업로드 중...`, 'info');
      const zipUrl = await uploadTrainingZipToFal(zipBlob);
      log(`${charName}: 업로드 완료`, 'success');

      // 3. Submit training
      const triggerWord = charId.replace(/[^a-zA-Z0-9]/g, '') || 'ohwx';
      log(`${charName}: LoRA 학습 제출 중 (trigger: "${triggerWord}")...`, 'info');
      const submitResult = await submitLoraTraining(zipUrl, triggerWord, {steps: 1000});
      const requestId = submitResult.request_id;
      log(`${charName}: 학습 제출 완료 (ID: ${requestId}). 학습에 5~10분 소요됩니다...`, 'info');

      setLoraModels(prev => ({...prev, [charId]: {status: 'training', triggerWord, requestId}}));

      // 4. Poll for completion
      const result = await pollLoraTraining(requestId, (info) => {
        if (info.logMessage) {
          log(`${charName}: [학습로그] ${info.logMessage}`, 'info');
        } else if (info.status === 'IN_PROGRESS') {
          log(`${charName}: 학습 진행 중...`, 'info');
        } else if (info.status === 'IN_QUEUE') {
          const pos = info.queue_position !== undefined ? ` (위치: ${info.queue_position})` : '';
          log(`${charName}: 대기열에서 대기 중${pos}...`, 'info');
        } else if (info.status === 'POLL_ERROR') {
          log(`${charName}: 상태 확인 실패 (HTTP ${info.httpStatus}), 재시도...`, 'error');
        } else if (info.status === 'POLL_EXCEPTION') {
          log(`${charName}: 폴링 오류: ${info.error}, 재시도...`, 'error');
        } else if (info.status !== 'COMPLETED') {
          log(`${charName}: 상태: ${info.status || JSON.stringify(info).substring(0,100)}`, 'info');
        }
      });

      // 5. Extract LoRA URL
      const loraUrl = result.diffusers_lora_file?.url;
      if (!loraUrl) throw new Error('학습 결과에 LoRA URL이 없습니다');

      const loraData = {url: loraUrl, triggerWord, status: 'ready', requestId, trainedAt: new Date().toISOString()};
      setLoraModels(prev => ({...prev, [charId]: loraData}));

      // 6. Save to Firestore
      if (projectId) {
        try {
          await fbSaveAsset(projectId, 'lora_models', charId, {name: charName, charId, ...loraData});
          log(`${charName}: LoRA 모델 저장 완료`, 'success');
        } catch(e) { log(`LoRA 저장 실패: ${e.message}`, 'error'); }
      }

      log(`${charName}: LoRA 학습 완료! URL: ${loraUrl.substring(0, 60)}...`, 'success');
      return loraData;
    } catch(e) {
      log(`${charName} LoRA 학습 실패: ${e.message}`, 'error');
      setLoraModels(prev => ({...prev, [charId]: {...prev[charId], status: 'failed', error: e.message}}));
    }
  };

  // Load LoRA models from Firestore shared assets
  const loadLoraModels = useCallback(async (pid) => {
    try {
      const db = getDb(); if (!db) return;
      const snap = await db.collection('webtoon_projects').doc(pid).collection('shared_assets').get();
      const loras = {};
      snap.docs.forEach(doc => {
        const d = doc.data();
        if (d.type === 'lora_models' && d.url && d.status === 'ready') {
          loras[d.charId || d.assetId] = {url: d.url, triggerWord: d.triggerWord, status: 'ready', trainedAt: d.trainedAt};

        log(`LoRA 모델 ${Object.keys(loras).length}개 로드 완료`, 'success');
      }
    } catch(e) { /* ignore */ }
  }, []);

  const parseJSON = (text) => {
    if (!text || !text.trim()) throw new Error('빈 응답 수신 — 모델이 텍스트를 반환하지 않았습니다.');
    console.log('[parseJSON] Raw response length:', text.length, '| First 200 chars:', text.substring(0, 200));

    // Step 1: Strip markdown fences, HTML tags, and leading text
    let cleaned = text.replace(/```json\s*/g,'').replace(/```\s*/g,'').trim();
    // Strip any XML-like tags (e.g. <output>, <response>, etc.)
    cleaned = cleaned.replace(/<\/?[a-zA-Z_][a-zA-Z0-9_]*>/g, '').trim();

    const arrStart = cleaned.indexOf('[');
    const objStart = cleaned.indexOf('{');
    if (arrStart < 0 && objStart < 0) {
      console.error('[parseJSON] No [ or { found. Cleaned text:', cleaned.substring(0, 500));
      throw new Error('응답에서 JSON 배열/객체를 찾을 수 없습니다. 응답 첫 100자: ' + cleaned.substring(0, 100));
    }
    if (arrStart >= 0 && (objStart < 0 || arrStart < objStart)) cleaned = cleaned.substring(arrStart);
    else if (objStart >= 0) cleaned = cleaned.substring(objStart);

    // Step 2: Remove truly problematic control characters (keep \n, \r, \t — valid JSON whitespace)
    cleaned = cleaned.replace(/[\x00-\x08\x0B\x0C\x0E-\x1f]/g, '');

    // Step 3: Smart bracket matching that skips string contents
    let depth = 0, end = 0;
    const opener = cleaned[0];
    if (!opener || (opener !== '[' && opener !== '{')) {
      throw new Error('No JSON array or object found in response');
    }
    let inString = false, escaped = false;
    for (let i = 0; i < cleaned.length; i++) {
      const ch = cleaned[i];
      if (escaped) { escaped = false; continue; }
      if (ch === '\\' && inString) { escaped = true; continue; }
      if (ch === '"') { inString = !inString; continue; }
      if (inString) continue;
      if (ch === '{' || ch === '[') depth++;
      else if (ch === '}' || ch === ']') { depth--; if (depth === 0) { end = i + 1; break; } }
    }
    if (end === 0) end = cleaned.length;

    // Step 4: Try parsing
    let jsonStr = cleaned.substring(0, end);
    try {
      return JSON.parse(jsonStr);
    } catch(e) {
      console.warn('[parseJSON] Parse attempt 1 failed:', e.message);
      console.warn('[parseJSON] jsonStr first 300:', jsonStr.substring(0, 300));
      // Step 5: Aggressive repair
      let repaired = jsonStr;
      // 5a: Remove trailing commas before } or ]
      repaired = repaired.replace(/,\s*([\]}])/g, '$1');
      // 5b: Fix unescaped quotes inside string values
      repaired = repaired.replace(/\\\\"/g, '\\"');
      // 5c: Fix single quotes used as string delimiters
      repaired = repaired.replace(/([:\[,]\s*)'([^']*)'/g, '$1"$2"');
      // 5d: Remove any BOM or zero-width chars
      repaired = repaired.replace(/[\uFEFF\u200B\u200C\u200D]/g, '');
      // 5e: Escape raw newlines inside JSON string values (common Gemini issue)
      // Walk through the string, track whether we're inside a JSON string, and escape newlines there
      {
        let result = '', inStr = false, esc = false;
        for (let i = 0; i < repaired.length; i++) {
          const c = repaired[i];
          if (esc) { result += c; esc = false; continue; }
          if (c === '\\' && inStr) { result += c; esc = true; continue; }
          if (c === '"') { inStr = !inStr; result += c; continue; }
          if (inStr && c === '\n') { result += '\\n'; continue; }
          if (inStr && c === '\r') { result += '\\r'; continue; }
          if (inStr && c === '\t') { result += '\\t'; continue; }
          result += c;
        }
        repaired = result;
      }
      // 5f: Remove comments (// style) outside strings
      repaired = repaired.replace(/(?<=[,\{\[\n])\s*\/\/[^\n]*/g, '');
      try {
        return JSON.parse(repaired);
      } catch(e2) {
        console.error('[parseJSON] Parse failed after repair. Error:', e2.message);
        const posMatch = e2.message.match(/position (\d+)/);
        if (posMatch) {
          const pos = parseInt(posMatch[1]);
          console.error('[parseJSON] Around error position:', repaired.substring(Math.max(0, pos - 80), pos + 80));
          console.error('[parseJSON] Char at position:', JSON.stringify(repaired[pos]), 'code:', repaired.charCodeAt(pos));
        }
        console.error('[parseJSON] First 500 chars:', repaired.substring(0, 500));
        throw new Error('JSON 파싱 실패: ' + e.message + ' (자동 수리도 실패). 응답 시작: ' + jsonStr.substring(0, 80));
      }
    }
  };

  // Create new episode
  const createNewEpisode = useCallback(async () => {
    const newEpisodeNum = episodes.length > 0 ? Math.max(...episodes.map(e => e.number)) + 1 : 1;
    setCurrentEpisode(newEpisodeNum);
    setSourceText('');
    setAnalysis(null);
    setReferences({characters:{}, backgrounds:{}});
    setStoryboard([]);
    setPanels([]);
    setCompletedSteps(new Set());
    setStep(0);
    const newEp = {number: newEpisodeNum, title: `${newEpisodeNum}화`, createdAt: new Date().toISOString()};
    setEpisodes(prev => [...prev, newEp]);
    log(`새 화 ${newEpisodeNum}화 생성됨`, 'success');
  }, [episodes, log]);

  // Load episode
  const loadEpisode = useCallback(async (episodeNum, overridePid, overrideAssets) => {
    try {
      const pid = overridePid || projectId;
      const effectiveAssets = overrideAssets || sharedAssets || {characters:{}, backgrounds:{}, props:{}};
      if (!pid) { console.warn('[loadEpisode] no projectId'); return; }

      // Reset editor state when switching episodes
      setBubbleEditorOpen(false);
      setEditorPages([]);
      setCurrentPageIdx(0);
      setSelectedObjectId(null);

      // Auto-save current episode's sourceText before switching
      if (currentEpisode && currentEpisode !== episodeNum && sourceText.trim()) {
        try {
          const existing = await fbLoadPhase(pid, currentEpisode, 'step1_analysis');
          await fbSavePhaseQueued(pid, currentEpisode, 'step1_analysis', {
            analysis: existing?.analysis || analysis,
            sourceText,
            inputMode,
          });
        } catch(e) { /* silent */ }
      }

      log(`${episodeNum}화 로드 중...`);

      // Clear current state before loading
      setSourceText('');
      setAnalysis(null);
      setReferences({characters:{}, backgrounds:{}});
      setStoryboard([]);
      setPanels([]);
      setBubbleOverlays([]);
      setCompletedSteps(new Set());
      setStep(0);

      // Load all phases in PARALLEL for speed
      const detected = new Set();
      let lastStep = 0;

      const [s1, s2, s3, s4] = await Promise.all([
        fbLoadPhase(pid, episodeNum, 'step1_analysis'),
        fbLoadPhase(pid, episodeNum, 'step2_references'),
        fbLoadPhase(pid, episodeNum, 'step3_storyboard'),
        fbLoadPhase(pid, episodeNum, 'step4_panels'),
      ]);
      if (s1) {
        if (s1.sourceText) setSourceText(s1.sourceText);
        if (s1.inputMode) setInputMode(s1.inputMode);
        if (s1.analysis) {
          setAnalysis(s1.analysis);
          detected.add(0);
          lastStep = 1;
          log(`  Step 1 (분석) 로드됨`, 'info');
        } else if (s1.sourceText) {
          log(`  소스 텍스트 로드됨 (분석 미완료)`, 'info');
        }
      }

      if (s2) {
        // Reconstruct references from shared assets if saved as metadata only
        let loadedRefs = s2;
        if (s2.characterIds || s2.backgroundIds) {
          loadedRefs = {characters:{}, backgrounds:{}};
          const curAssets = effectiveAssets;
          console.log(`[loadEpisode] references 복원: effectiveAssets 캐릭터=${Object.keys(curAssets.characters||{}).length}개, 배경=${Object.keys(curAssets.backgrounds||{}).length}개`);
          (s2.characterIds||[]).forEach(id => { if(curAssets.characters[id]?.image) loadedRefs.characters[id] = curAssets.characters[id].image; else console.warn(`[loadEpisode] 캐릭터 "${id}" 이미지 없음 in effectiveAssets`); });
          (s2.backgroundIds||[]).forEach(id => { if(curAssets.backgrounds[id]?.image) loadedRefs.backgrounds[id] = curAssets.backgrounds[id].image; else console.warn(`[loadEpisode] 배경 "${id}" 이미지 없음 in effectiveAssets`); });
        }
        if (Object.keys(loadedRefs.characters || {}).length > 0 || Object.keys(loadedRefs.backgrounds || {}).length > 0) {
          setReferences(loadedRefs);
          detected.add(1);
          lastStep = 2;
          log(`  Step 2 (레퍼런스) 로드됨`, 'info');
        }
      }

      if (s3 && s3.storyboard?.length > 0) {
        const sbLoaded = s3.storyboard;
        sbLoaded.forEach((p, i) => { if (!p._uid) p._uid = 'sb_' + Date.now() + '_' + i; });
        setStoryboard(sbLoaded);
        detected.add(2);
        lastStep = 3;
        log(`  Step 3 (스토리보드) 로드됨: ${s3.storyboard.length}개 패널`, 'info');
      }
      let loadedPanels = [];
      if (s4 && s4.panels?.some(p => p)) {
        // Bidirectional alignment: keep ALL images, pad storyboard if needed
        loadedPanels = s4.panels;
        const sbData = s3?.storyboard || [];
        const sbLen = sbData.length;
        const panelLen = loadedPanels.length;
        if (sbLen > 0 && sbLen !== panelLen) {
          console.warn('[loadEpisode] storyboard/panels length mismatch:', sbLen, 'vs', panelLen, '— aligning');
          if (panelLen < sbLen) {
            // Panels shorter than storyboard: pad panels with null
            loadedPanels = [...loadedPanels, ...new Array(sbLen - panelLen).fill(null)];
          } else {
            // Images > storyboard: pad storyboard with placeholder entries (NEVER truncate images)
            const padded = [...sbData];
            for (let pi = sbLen; pi < panelLen; pi++) {
              padded.push({
                _uid: 'sb_auto_' + Date.now() + '_' + pi,
                panelNumber: pi + 1,
                type: 'action', shotSize: 'medium', cameraAngle: 'eye level', mood: 'neutral',
                description: `(패널 ${pi + 1} - 자동 생성됨)`,
                dialogue: [], narration: '', imagePrompt: '', characters: [], background: '',
              });
            }
            padded.forEach((p, i) => { p.panelNumber = i + 1; });
            setStoryboard(padded);
            log(`  스토리보드 ${sbLen}개 → ${panelLen}개로 확장 (이미지 수에 맞춤)`, 'info');
            // Save expanded storyboard to Firebase
            if (pid && episodeNum) {
              fbSavePhaseQueued(pid, episodeNum, 'step3_storyboard', {storyboard: padded}).catch(() => {});
            }
          }
        }
        setPanels(loadedPanels);

        // Background: convert any external URLs to base64 for reliable export
        const extUrlCount = loadedPanels.filter(p => p && typeof p === 'string' && p.startsWith('http')).length;
        if (extUrlCount > 0) {
          console.log(`[loadEpisode] Converting ${extUrlCount} external URL panels to base64...`);
          (async () => {
            const converted = [...loadedPanels];
            let changed = 0;
            for (let pi = 0; pi < converted.length; pi++) {
              if (converted[pi] && typeof converted[pi] === 'string' && converted[pi].startsWith('http')) {
                try {
                  const b64 = await urlToBase64(converted[pi]);
                  if (b64 && b64.startsWith('data:')) { converted[pi] = b64; changed++; }
                } catch(e) { /* keep original */ }
              }
            }
            if (changed > 0) {
              setPanels(converted);
              console.log(`[loadEpisode] Converted ${changed}/${extUrlCount} panels to base64`);
            }
          })();
        }

        if (s4.bubbleOverlays && Array.isArray(s4.bubbleOverlays)) {
          setBubbleOverlays(s4.bubbleOverlays);
          console.log('[loadEpisode] bubbleOverlays loaded:', s4.bubbleOverlays.length, '개');
        } else if (s4.bubbleOverlays) {
          console.warn('[loadEpisode] bubbleOverlays is not an array:', typeof s4.bubbleOverlays);
          setBubbleOverlays([]);
        }
        const generated = s4.panels.filter(p => p).length;
        const total = s4.panels.length;
        if (generated === total) {
          detected.add(3);
          lastStep = 4;
          log(`  Step 4 (패널 이미지) 로드됨: ${generated}/${total}개 — 완료`, 'info');
        } else {
          lastStep = 3;
          log(`  Step 4 (패널 이미지) 로드됨: ${generated}/${total}개 — 미완료, 이어서 생성 가능`, 'info');
        }
      }

      // Also check episode doc for completedSteps (merge with detected)
      const episodeDoc = episodes.find(e => e.number === episodeNum);
      if (episodeDoc?.completedSteps) {
        episodeDoc.completedSteps.forEach(s => detected.add(s));
      }

      // Outfit management is now via character outfitPresets (project-level), no episode-level loading needed

      setCompletedSteps(detected);
      const restoredStep = episodeDoc?.step !== undefined ? episodeDoc.step : lastStep;
      setStep(restoredStep === 1 ? 2 : restoredStep); // Step 1 UI 제거됨 → 2로 매핑
      setCurrentEpisode(episodeNum);
      clearUndoHistory(); // 에피소드 로드 시 undo 히스토리 초기화

      if (detected.size === 0) {
        log(`${episodeNum}화 로드 완료 (저장된 데이터 없음)`, 'success');
      } else {
        log(`${episodeNum}화 로드 완료 (${detected.size}개 단계 복원됨)`, 'success');
      }
      // Return loaded data so callers can use it directly without waiting for React state
      return { panels: loadedPanels, storyboard: s3?.storyboard || [], episodeNum };
    } catch(e) { log(`${episodeNum}화 로드 실패: ${e.message}`, 'error'); return null; }
  }, [projectId, episodes, sharedAssets, log]);

  // Delete episode
  const deleteEpisode = useCallback(async (episodeNum) => {
    if (!projectId) return;
    const epTitle = episodes.find(e => e.number === episodeNum)?.title || `${episodeNum}화`;
    if (!confirm(`"${epTitle}"을(를) 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.`)) return;
    try {
      log(`${episodeNum}화 삭제 중...`);
      await fbDeleteEpisode(projectId, episodeNum);
      setEpisodes(prev => prev.filter(e => e.number !== episodeNum));
      if (currentEpisode === episodeNum) {
        const remaining = episodes.filter(e => e.number !== episodeNum);
        if (remaining.length > 0) {
          await loadEpisode(remaining[0].number);
        } else {
          setCurrentEpisode(null);
          setSourceText('');
